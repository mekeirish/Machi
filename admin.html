<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Machi – Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        /* ===== STYLES (inchangés) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0a0d1a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            position: relative;
        }
        .glass-card, #mainInterface {
            background: rgba(20,25,45,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.5rem;
            padding: 1rem 0.6rem;
            width: 100%;
            max-width: 480px;
            transition: opacity 0.3s ease;
        }
        #mainInterface { display: none; max-width: 480px; min-height: 60vh; position: relative; padding-bottom: 5rem; }
        #mainInterface.active { display: block; }
        .btn-led {
            background: #1e2a4a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 60px;
            padding: 0.4rem 1rem;
            font-weight: 600;
            font-size: 0.8rem;
            color: #d6eaff;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, opacity 0.2s;
            text-align: center;
            display: inline-block;
            user-select: none;
            touch-action: manipulation;
        }
        .btn-led:hover { background: #2b3b66; color: #fff; }
        .btn-led:active { background: #16203a; }
        .btn-led:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        .btn-led.pulsing {
            animation: pulse 1s ease-in-out infinite;
            background: #00b8b0;
            border-color: #00d4cc;
            color: #fff;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,200,180,0.4); } 70% { box-shadow: 0 0 0 10px rgba(0,200,180,0); } 100% { box-shadow: 0 0 0 0 rgba(0,200,180,0); } }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 0.6rem;
            flex-wrap: wrap;
        }
        .header-actions .btn-logout {
            background: rgba(255,70,70,0.10);
            border: 1px solid rgba(255,70,70,0.15);
            border-radius: 40px;
            padding: 0.15rem 0.6rem;
            color: #ffb0b0;
            font-size: 0.65rem;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
        }
        .header-actions .btn-logout:hover { background: rgba(255,70,70,0.2); }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: rgba(18,24,44,0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1.5rem;
            padding: 1.2rem 0.8rem;
            max-width: 420px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content label { color: #b0c8e8; font-size: 0.75rem; font-weight: 500; margin-top: 0.4rem; display: block; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 0.3rem 0.7rem;
            margin-top: 0.1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: #e8f0ff;
            font-size: 0.85rem;
            outline: none;
            transition: border 0.15s;
        }
        .modal-content input:focus { border-color: #4a8cff; }
        .modal-content input::placeholder { color: #6a7a9a; }
        .btn-validate { background: #00807a; border-color: #00a39a; color: #fff; }
        .btn-validate:hover { background: #00a39a; }
        .btn-cancel { background: rgba(255,70,70,0.12); border-color: rgba(255,70,70,0.2); color: #ffb0b0; }
        .btn-cancel:hover { background: rgba(255,70,70,0.22); }

        .admin-panel { margin-top:0.6rem; }
        .admin-panel .btn-admin {
            background: #1e2a4a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 60px;
            padding: 0.4rem 1rem;
            color: #d6eaff;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            text-align: center;
            font-weight: 600;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
        }
        .admin-panel .btn-admin:hover { background: #2b3b66; }
        .admin-panel .btn-admin.active { background: #2b3b66; border-color: #4a8cff; }
        .admin-list {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 0.6rem;
            padding: 0.4rem;
            margin-top: 0.3rem;
            max-height: 150px;
            overflow-y: auto;
        }
        .admin-list .item {
            display: flex;
            justify-content: space-between;
            padding: 0.2rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.75rem;
            color: #b0c8e8;
            cursor: pointer;
            transition: background 0.2s;
        }
        .admin-list .item:hover { background: rgba(255,255,255,0.05); }
        .admin-list .item:last-child { border-bottom: none; }
        .admin-list .item .email { color: #8aa0c8; font-size: 0.65rem; }

        /* Le conteneur du cropper sera masqué tant que Cropper n'est pas chargé */
        .crop-container { width: 100%; margin: 0.3rem 0; display: none; min-height: 150px; }
        .crop-container img { max-width: 100%; display: block; }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,180,170,0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0,255,200,0.15);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            color: #c0fff0;
            font-weight: 500;
            display: none;
            z-index: 100;
            font-size: 0.8rem;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { display: block; }
        .spinner {
            display: inline-block;
            width: 0.8rem;
            height: 0.8rem;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #00b8b0;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width:480px) {
            body { padding: 0.3rem; }
            .glass-card, #mainInterface { padding: 0.6rem 0.4rem; border-radius: 1rem; }
            .modal-content { padding: 1rem 0.6rem; }
            .header-actions .btn-logout { font-size: 0.6rem; padding: 0.15rem 0.5rem; }
        }

        /* Indicateur de chargement Cropper */
        .cropper-loader {
            display: none;
            text-align: center;
            padding: 1rem;
            color: #8aa0c8;
            font-size: 0.8rem;
        }
        .cropper-loader .spinner {
            width: 1.2rem;
            height: 1.2rem;
        }
    </style>
</head>
<body>
    <div id="mainInterface">
        <div class="header-actions">
            <div class="text-slate-400 text-xs truncate" id="userRoleBadge">Rôle : Admin</div>
            <button id="btnLogout" class="btn-logout">✕ Déconnexion</button>
        </div>
        <h2 id="welcomeMessage" class="text-base font-semibold text-cyan-200 mb-0.5">👋 Bonjour Admin</h2>
        <hr class="border-white/5 my-1.5" />

        <div id="adminPanel" class="admin-panel">
            <button id="btnAdminChauffeurs" class="btn-admin">🚗 Chauffeurs</button>
            <div id="adminChauffeursList" class="admin-list" style="display:none;"></div>
            <button id="btnAdminPassagers" class="btn-admin">🚶 Passagers</button>
            <div id="adminPassagersList" class="admin-list" style="display:none;"></div>
            <button id="btnAdminSpots" class="btn-admin">📍 Spots</button>
            <div id="adminSpotsList" class="admin-list" style="display:none;"></div>
        </div>
    </div>

    <!-- Modale d'édition utilisateur (admin) -->
    <div id="modalAdminEdit" class="modal-overlay" data-modal="adminEdit">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">✏️ Modifier l'utilisateur</h2>
            <div id="adminEditUserInfo" class="text-xs text-slate-400 mb-2">Chargement...</div>
            <label>Nom</label><input type="text" id="adminEditNom" placeholder="Nom" />
            <label>Téléphone</label><input type="tel" id="adminEditTelephone" placeholder="0555 12 34 56" />
            <label>Email (non modifiable)</label><input type="email" id="adminEditEmail" disabled />
            <label>Rôle</label><input type="text" id="adminEditRole" disabled />
            <label>Crédits (Alfrak)</label><input type="number" id="adminEditCredits" placeholder="100" min="0" step="1" />
            <div class="mt-3 border-t border-white/5 pt-2">
                <p class="text-xs text-cyan-200 font-medium mb-1">📸 Photos</p>
                <label class="text-xs">Photo de la voiture (3:2)</label>
                <input type="file" id="adminEditCarPhotoInput" accept="image/*" />
                <div id="adminEditCarCropContainer" class="crop-container"><img id="adminEditCarCropImage" src="#" alt="Rogner" /></div>
                <div id="cropperLoaderCar" class="cropper-loader"><span class="spinner"></span> Chargement de l'éditeur…</div>
                <label class="text-xs mt-2">Photo de profil (1:1)</label>
                <input type="file" id="adminEditProfilePhotoInput" accept="image/*" />
                <div id="adminEditProfileCropContainer" class="crop-container"><img id="adminEditProfileCropImage" src="#" alt="Rogner" /></div>
                <div id="cropperLoaderProfile" class="cropper-loader"><span class="spinner"></span> Chargement de l'éditeur…</div>
            </div>
            <div class="flex gap-2 mt-4">
                <button id="btnAdminEditSave" class="btn-led btn-validate flex-1">💾 Enregistrer</button>
                <button class="btn-led btn-cancel flex-1 modal-close" data-modal="adminEdit">✖ Annuler</button>
            </div>
        </div>
    </div>

    <!-- Modale de gestion des spots -->
    <div id="modalAdminSpots" class="modal-overlay" data-modal="adminSpots">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">📍 Gérer les spots</h2>
            <div id="adminSpotsListContainer" class="admin-list" style="max-height:200px; margin-bottom:0.5rem;"></div>
            <hr class="border-white/5 my-2" />
            <label>Nom du spot</label><input type="text" id="adminSpotNom" placeholder="ex: Aéroport" />
            <div style="text-align:center; margin:0.3rem 0;"><button id="btnGetLocation" class="btn-led btn-validate" style="width:100%;">📍 Me localiser</button></div>
            <label>Latitude</label><input type="text" id="adminSpotLat" placeholder="36.7538" />
            <label>Longitude</label><input type="text" id="adminSpotLon" placeholder="3.0588" />
            <div class="flex gap-2 mt-3">
                <button id="btnAdminSpotAdd" class="btn-led btn-validate flex-1">➕ Ajouter</button>
                <button class="btn-led btn-cancel flex-1 modal-close" data-modal="adminSpots">✖ Fermer</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ========================================================================
        // FIREBASE INIT
        // ========================================================================
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyACgeZXog1KZGU29HpjM4qpKTBt54KbJFg",
            authDomain: "machi-51024.firebaseapp.com",
            projectId: "machi-51024",
            storageBucket: "machi-51024.firebasestorage.app",
            messagingSenderId: "984764801380",
            appId: "1:984764801380:web:c082a0988bba3f899fda71",
            measurementId: "G-EDZXP8QF9Q"
        };
        firebase.initializeApp(FIREBASE_CONFIG);
        const auth = firebase.auth(),
            db = firebase.firestore();
        db.enablePersistence().catch(()=>{});

        // ========================================================================
        // LAZY LOADING DE CROPPER.JS
        // ========================================================================
        let cropperLoaded = false;
        let cropperLoading = false;
        let cropperLoadCallbacks = [];

        function loadCropper() {
            return new Promise((resolve, reject) => {
                // Si déjà chargé, résoudre immédiatement
                if (cropperLoaded) {
                    resolve();
                    return;
                }
                // Si en cours de chargement, mettre en attente
                if (cropperLoading) {
                    cropperLoadCallbacks.push(resolve);
                    return;
                }
                cropperLoading = true;

                // 1. Charger le CSS
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = 'https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css';
                document.head.appendChild(link);

                // 2. Charger le JS
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js';
                script.onload = () => {
                    cropperLoaded = true;
                    cropperLoading = false;
                    resolve();
                    // Résoudre toutes les promesses en attente
                    cropperLoadCallbacks.forEach(cb => cb());
                    cropperLoadCallbacks = [];
                };
                script.onerror = () => {
                    cropperLoading = false;
                    reject(new Error('Impossible de charger Cropper.js'));
                };
                document.body.appendChild(script);
            });
        }

        // ========================================================================
        // DOM REFERENCES
        // ========================================================================
        const $ = id => document.getElementById(id);
        const mainInterface = $('mainInterface'),
            welcomeMessage = $('welcomeMessage'),
            userRoleBadge = $('userRoleBadge'),
            btnLogout = $('btnLogout'),
            btnAdminChauffeurs = $('btnAdminChauffeurs'),
            btnAdminPassagers = $('btnAdminPassagers'),
            btnAdminSpots = $('btnAdminSpots'),
            adminChauffeursList = $('adminChauffeursList'),
            adminPassagersList = $('adminPassagersList'),
            adminSpotsList = $('adminSpotsList'),
            modalAdminEdit = $('modalAdminEdit'),
            adminEditUserInfo = $('adminEditUserInfo'),
            adminEditNom = $('adminEditNom'),
            adminEditTelephone = $('adminEditTelephone'),
            adminEditEmail = $('adminEditEmail'),
            adminEditRole = $('adminEditRole'),
            adminEditCredits = $('adminEditCredits'),
            adminEditCarPhotoInput = $('adminEditCarPhotoInput'),
            adminEditCarCropContainer = $('adminEditCarCropContainer'),
            adminEditCarCropImage = $('adminEditCarCropImage'),
            adminEditProfilePhotoInput = $('adminEditProfilePhotoInput'),
            adminEditProfileCropContainer = $('adminEditProfileCropContainer'),
            adminEditProfileCropImage = $('adminEditProfileCropImage'),
            btnAdminEditSave = $('btnAdminEditSave'),
            modalAdminSpots = $('modalAdminSpots'),
            adminSpotsListContainer = $('adminSpotsListContainer'),
            adminSpotNom = $('adminSpotNom'),
            adminSpotLat = $('adminSpotLat'),
            adminSpotLon = $('adminSpotLon'),
            btnAdminSpotAdd = $('btnAdminSpotAdd'),
            btnGetLocation = $('btnGetLocation'),
            toast = $('toast'),
            cropperLoaderCar = $('cropperLoaderCar'),
            cropperLoaderProfile = $('cropperLoaderProfile');

        // ========================================================================
        // STATE
        // ========================================================================
        let currentUser = null,
            adminEditTargetEmail = null,
            adminEditCarCropper = null,
            adminEditProfileCropper = null;

        // ========================================================================
        // UTILITY
        // ========================================================================
        const showToast = (msg, err = false) => {
            toast.textContent = msg;
            toast.style.borderColor = err ? 'rgba(255,100,100,0.2)' : 'rgba(0,255,200,0.15)';
            toast.style.color = err ? '#ffb0b0' : '#c0fff0';
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
        };
        const showLoader = (btn) => { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; };
        const hideLoader = (btn, txt) => { btn.disabled = false; btn.textContent = txt; };
        const isOnline = () => navigator.onLine;

        const debounceButton = (btn, delay = 800) => {
            if (btn._debounceTimer) return false;
            btn.disabled = true;
            btn._debounceTimer = setTimeout(() => {
                btn.disabled = false;
                btn._debounceTimer = null;
            }, delay);
            return true;
        };

        const closeModal = (modalEl) => { if (modalEl) modalEl.classList.remove('active'); };

        // ========================================================================
        // FIRESTORE HELPERS
        // ========================================================================
        const dbGet = (col, id = null) => {
            if (!isOnline()) throw new Error('Offline');
            const ref = id ? db.collection(col).doc(id) : db.collection(col);
            return ref.get();
        };
        const dbSet = (col, id, data) => {
            if (!isOnline()) throw new Error('Offline');
            return db.collection(col).doc(id).set(data, { merge: true });
        };
        const dbAdd = (col, data) => {
            if (!isOnline()) throw new Error('Offline');
            return db.collection(col).add(data);
        };
        const dbUpdate = (col, id, data) => {
            if (!isOnline()) throw new Error('Offline');
            return db.collection(col).doc(id).update(data);
        };
        const dbDelete = (col, id) => {
            if (!isOnline()) throw new Error('Offline');
            return db.collection(col).doc(id).delete();
        };
        const fetchAll = async (col) => {
            try { const snap = await dbGet(col); const arr = []; snap.forEach(d => arr.push({ id: d.id, ...d.data() })); return arr; } catch { return []; }
        };
        const fetchUsers = () => fetchAll('users');
        const fetchSpots = () => fetchAll('spots');

        // ========================================================================
        // GEOLOCATION
        // ========================================================================
        const getCurrentPos = () => new Promise((res, rej) => {
            if (!navigator.geolocation) rej(new Error('Geo not supported'));
            navigator.geolocation.getCurrentPosition(
                p => res({ lat: p.coords.latitude, lon: p.coords.longitude }),
                e => rej(e), { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
            );
        });

        // ========================================================================
        // RENDER ADMIN LISTS
        // ========================================================================
        const renderAdminLists = async () => {
            try {
                const users = await fetchUsers();
                const chauffeurs = users.filter(u => u.role === 'chauffeur');
                const passagers = users.filter(u => u.role === 'passager');

                adminChauffeursList.innerHTML = chauffeurs.length ?
                    chauffeurs.map(c =>
                        `<div class="item" data-email="${c.email}"><span>${c.nom} (${c.telephone})</span><span class="email">${c.email}</span></div>`
                        ).join('') :
                    '<div class="item">Aucun chauffeur</div>';
                adminPassagersList.innerHTML = passagers.length ?
                    passagers.map(p =>
                        `<div class="item" data-email="${p.email}"><span>${p.nom} (${p.telephone})</span><span class="email">${p.email}</span></div>`
                        ).join('') :
                    '<div class="item">Aucun passager</div>';

                document.querySelectorAll('#adminChauffeursList .item, #adminPassagersList .item').forEach(el => {
                    el.addEventListener('click', () => {
                        const email = el.dataset.email;
                        const user = [...chauffeurs, ...passagers].find(u => u.email === email);
                        if (user) openAdminEdit(user);
                    });
                });

                await renderSpotsList();
            } catch (e) { showToast('❌ Erreur chargement utilisateurs', true);
                console.error(e); }
        };

        const renderSpotsList = async () => {
            try {
                const spots = await fetchSpots();
                adminSpotsList.innerHTML = spots.length ?
                    spots.map(s =>
                        `<div class="item" data-id="${s.id}"><span>${s.nom}</span><span class="email">${s.latitude}, ${s.longitude}</span><button class="spot-delete" style="background:none;border:none;color:#ff6b6b;cursor:pointer">✕</button></div>`
                        ).join('') :
                    '<div class="item">Aucun spot</div>';
                document.querySelectorAll('.spot-delete').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const id = btn.closest('.item').dataset.id;
                        if (confirm('Supprimer ce spot ?')) {
                            try { await dbDelete('spots', id);
                                showToast('🗑️ Spot supprimé');
                                renderSpotsList(); } catch (err) { showToast('❌ Erreur', true);
                                console.error(err); }
                        }
                    });
                });
            } catch (e) { showToast('❌ Erreur chargement spots', true);
                console.error(e); }
        };

        // ========================================================================
        // ADMIN EDIT MODAL (avec lazy loading Cropper)
        // ========================================================================
        const openAdminEdit = async (user) => {
            adminEditTargetEmail = user.email;
            adminEditUserInfo.textContent = `Édition de ${user.nom} (${user.email})`;
            adminEditNom.value = user.nom || '';
            adminEditTelephone.value = user.telephone || '';
            adminEditEmail.value = user.email || '';
            adminEditRole.value = user.role || '';
            adminEditCredits.value = user.credits !== undefined ? user.credits : 100;
            adminEditCarCropContainer.style.display = 'none';
            adminEditProfileCropContainer.style.display = 'none';
            adminEditCarPhotoInput.value = '';
            adminEditProfilePhotoInput.value = '';
            modalAdminEdit.classList.add('active');

            // Charger Cropper.js en arrière-plan (sans bloquer l'ouverture)
            try {
                await loadCropper();
                // Une fois chargé, on peut activer les croppers quand l'utilisateur choisit un fichier
            } catch (e) {
                console.warn('Cropper non disponible:', e);
                showToast('⚠️ Éditeur d\'image non disponible', true);
            }
        };

        // Gestion des uploads avec lazy loading
        adminEditCarPhotoInput.addEventListener('change', async function(e) {
            const file = this.files[0];
            if (!file) return;

            // Afficher le loader
            cropperLoaderCar.style.display = 'block';
            this.disabled = true;

            try {
                // S'assurer que Cropper est chargé
                await loadCropper();
                cropperLoaderCar.style.display = 'none';
                this.disabled = false;

                const reader = new FileReader();
                reader.onload = (ev) => {
                    adminEditCarCropImage.src = ev.target.result;
                    adminEditCarCropContainer.style.display = 'block';
                    if (adminEditCarCropper) adminEditCarCropper.destroy();
                    adminEditCarCropper = new Cropper(adminEditCarCropImage, {
                        aspectRatio: 3 / 2,
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 0.8,
                        restore: false,
                        guides: true,
                        center: true,
                        highlight: false,
                        cropBoxMovable: true,
                        cropBoxResizable: false,
                        toggleDragModeOnDblclick: false,
                        zoomOnWheel: true,
                        zoomOnTouch: true,
                        wheelZoomRatio: 0.1,
                        minContainerWidth: 200,
                        minContainerHeight: 150
                    });
                };
                reader.readAsDataURL(file);
            } catch (err) {
                cropperLoaderCar.style.display = 'none';
                this.disabled = false;
                showToast('❌ Erreur chargement éditeur', true);
                console.error(err);
            }
        });

        adminEditProfilePhotoInput.addEventListener('change', async function(e) {
            const file = this.files[0];
            if (!file) return;

            cropperLoaderProfile.style.display = 'block';
            this.disabled = true;

            try {
                await loadCropper();
                cropperLoaderProfile.style.display = 'none';
                this.disabled = false;

                const reader = new FileReader();
                reader.onload = (ev) => {
                    adminEditProfileCropImage.src = ev.target.result;
                    adminEditProfileCropContainer.style.display = 'block';
                    if (adminEditProfileCropper) adminEditProfileCropper.destroy();
                    adminEditProfileCropper = new Cropper(adminEditProfileCropImage, {
                        aspectRatio: 1 / 1,
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 0.8,
                        restore: false,
                        guides: true,
                        center: true,
                        highlight: false,
                        cropBoxMovable: true,
                        cropBoxResizable: false,
                        toggleDragModeOnDblclick: false,
                        zoomOnWheel: true,
                        zoomOnTouch: true,
                        wheelZoomRatio: 0.1,
                        minContainerWidth: 200,
                        minContainerHeight: 150
                    });
                };
                reader.readAsDataURL(file);
            } catch (err) {
                cropperLoaderProfile.style.display = 'none';
                this.disabled = false;
                showToast('❌ Erreur chargement éditeur', true);
                console.error(err);
            }
        });

        const saveAdminEdit = async () => {
            if (!adminEditTargetEmail) return showToast('⚠️ Aucun utilisateur', true);
            const nom = adminEditNom.value.trim(),
                tel = adminEditTelephone.value.trim(),
                credits = parseInt(adminEditCredits.value);
            if (!nom || !tel || isNaN(credits) || credits < 0) return showToast('⚠️ Nom, téléphone, crédits valides', true);
            const btn = btnAdminEditSave,
                orig = btn.textContent;
            if (!debounceButton(btn)) return;
            showLoader(btn);
            try {
                await dbUpdate('users', adminEditTargetEmail, { nom, telephone: tel, credits });
                let carURL = null,
                    profURL = null;
                if (adminEditCarCropper) {
                    const canvas = adminEditCarCropper.getCroppedCanvas({ width: 800, height: 533, imageSmoothingQuality: 'high' });
                    if (canvas) {
                        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
                        if (blob) {
                            const fd = new FormData();
                            fd.append('file', blob, 'car.jpg');
                            fd.append('upload_preset', 'machikey');
                            fd.append('folder', 'machi');
                            fd.append('cloud_name', 'y6u9peta');
                            const res = await fetch('https://api.cloudinary.com/v1_1/y6u9peta/image/upload', { method: 'POST',
                                body: fd });
                            const data = await res.json();
                            if (res.ok) carURL = data.secure_url;
                        }
                    }
                }
                if (adminEditProfileCropper) {
                    const canvas = adminEditProfileCropper.getCroppedCanvas({ width: 400, height: 400, imageSmoothingQuality: 'high' });
                    if (canvas) {
                        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
                        if (blob) {
                            const fd = new FormData();
                            fd.append('file', blob, 'profile.jpg');
                            fd.append('upload_preset', 'machikey');
                            fd.append('folder', 'machi');
                            fd.append('cloud_name', 'y6u9peta');
                            const res = await fetch('https://api.cloudinary.com/v1_1/y6u9peta/image/upload', { method: 'POST',
                                body: fd });
                            const data = await res.json();
                            if (res.ok) profURL = data.secure_url;
                        }
                    }
                }
                if (carURL) await dbUpdate('users', adminEditTargetEmail, { photoURL: carURL });
                if (profURL) await dbUpdate('users', adminEditTargetEmail, { profilePhotoURL: profURL });
                showToast('✅ Utilisateur mis à jour');
                closeModal(modalAdminEdit);
                renderAdminLists();
            } catch (e) { showToast('❌ Erreur : ' + e.message, true);
                console.error(e); }
            hideLoader(btn, orig);
        };

        // ========================================================================
        // SPOTS MODAL
        // ========================================================================
        const renderSpotsListModal = async () => {
            const container = adminSpotsListContainer;
            const spots = await fetchSpots();
            container.innerHTML = spots.length ?
                spots.map(s =>
                    `<div class="item" data-id="${s.id}"><span>${s.nom}</span><span class="email">${s.latitude}, ${s.longitude}</span><button class="spot-delete-modal" style="background:none;border:none;color:#ff6b6b;cursor:pointer">✕</button></div>`
                    ).join('') :
                '<div class="item">Aucun spot</div>';
            container.querySelectorAll('.spot-delete-modal').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.closest('.item').dataset.id;
                    if (confirm('Supprimer ce spot ?')) {
                        try { await dbDelete('spots', id);
                            showToast('🗑️ Spot supprimé');
                            renderSpotsListModal();
                            renderSpotsList(); } catch (err) { showToast('❌ Erreur', true);
                            console.error(err); }
                    }
                });
            });
        };

        const openSpotsModal = async () => {
            modalAdminSpots.classList.add('active');
            adminSpotNom.value = '';
            adminSpotLat.value = '';
            adminSpotLon.value = '';
            await renderSpotsListModal();
        };

        const addSpot = async () => {
            const nom = adminSpotNom.value.trim(),
                lat = parseFloat(adminSpotLat.value.trim()),
                lon = parseFloat(adminSpotLon.value.trim());
            if (!nom || isNaN(lat) || isNaN(lon)) return showToast('⚠️ Remplissez tous les champs', true);
            const btn = btnAdminSpotAdd;
            if (!debounceButton(btn)) return;
            try {
                await dbAdd('spots', { nom, latitude: lat, longitude: lon });
                showToast('✅ Spot ajouté');
                renderSpotsListModal();
                renderSpotsList();
                adminSpotNom.value = '';
                adminSpotLat.value = '';
                adminSpotLon.value = '';
            } catch (e) { showToast('❌ Erreur : ' + e.message, true);
                console.error(e); }
        };

        btnGetLocation.addEventListener('click', async function() {
            const orig = this.textContent;
            if (!debounceButton(this)) return;
            this.textContent = '⏳ Localisation…';
            this.classList.add('pulsing');
            try {
                const { lat, lon } = await getCurrentPos();
                adminSpotLat.value = lat.toFixed(6);
                adminSpotLon.value = lon.toFixed(6);
                showToast('✅ Coordonnées mises à jour');
            } catch (e) {
                let msg = 'Erreur de géolocalisation';
                if (e.code === 1) msg = 'Permission refusée';
                else if (e.code === 2) msg = 'Position indisponible';
                else if (e.code === 3) msg = 'Délai dépassé';
                else msg = e.message;
                showToast('❌ ' + msg, true);
            } finally {
                this.textContent = orig;
                this.classList.remove('pulsing');
                this.disabled = false;
                this._debounceTimer = null;
            }
        });

        // ========================================================================
        // GESTION CENTRALISÉE DES MODALES
        // ========================================================================
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    if (modal === modalAdminEdit) {
                        if (adminEditCarCropper) { adminEditCarCropper.destroy();
                            adminEditCarCropper = null; }
                        if (adminEditProfileCropper) { adminEditProfileCropper.destroy();
                            adminEditProfileCropper = null; }
                        adminEditCarCropContainer.style.display = 'none';
                        adminEditProfileCropContainer.style.display = 'none';
                        adminEditTargetEmail = null;
                        // Cacher les loaders
                        cropperLoaderCar.style.display = 'none';
                        cropperLoaderProfile.style.display = 'none';
                        adminEditCarPhotoInput.disabled = false;
                        adminEditProfilePhotoInput.disabled = false;
                    }
                    closeModal(modal);
                }
            });
        });

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.modal-close');
            if (!btn) return;
            const modalName = btn.dataset.modal;
            const modal = document.querySelector(`.modal-overlay[data-modal="${modalName}"]`);
            if (modal) {
                if (modal === modalAdminEdit) {
                    if (adminEditCarCropper) { adminEditCarCropper.destroy();
                        adminEditCarCropper = null; }
                    if (adminEditProfileCropper) { adminEditProfileCropper.destroy();
                        adminEditProfileCropper = null; }
                    adminEditCarCropContainer.style.display = 'none';
                    adminEditProfileCropContainer.style.display = 'none';
                    adminEditTargetEmail = null;
                    cropperLoaderCar.style.display = 'none';
                    cropperLoaderProfile.style.display = 'none';
                    adminEditCarPhotoInput.disabled = false;
                    adminEditProfilePhotoInput.disabled = false;
                }
                closeModal(modal);
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const activeModal = document.querySelector('.modal-overlay.active');
                if (activeModal) {
                    if (activeModal === modalAdminEdit) {
                        if (adminEditCarCropper) { adminEditCarCropper.destroy();
                            adminEditCarCropper = null; }
                        if (adminEditProfileCropper) { adminEditProfileCropper.destroy();
                            adminEditProfileCropper = null; }
                        adminEditCarCropContainer.style.display = 'none';
                        adminEditProfileCropContainer.style.display = 'none';
                        adminEditTargetEmail = null;
                        cropperLoaderCar.style.display = 'none';
                        cropperLoaderProfile.style.display = 'none';
                        adminEditCarPhotoInput.disabled = false;
                        adminEditProfilePhotoInput.disabled = false;
                    }
                    closeModal(activeModal);
                }
            }
        });

        // ========================================================================
        // TOGGLE LISTS
        // ========================================================================
        const toggleList = (el) => {
            if (el.style.display === 'block') el.style.display = 'none';
            else { [adminChauffeursList, adminPassagersList, adminSpotsList].forEach(l => l.style.display = 'none');
                el.style.display = 'block'; }
        };

        btnAdminChauffeurs.addEventListener('click', () => { renderAdminLists();
            toggleList(adminChauffeursList); });
        btnAdminPassagers.addEventListener('click', () => { renderAdminLists();
            toggleList(adminPassagersList); });
        btnAdminSpots.addEventListener('click', openSpotsModal);

        // ========================================================================
        // AUTH
        // ========================================================================
        const logout = async () => {
            try {
                await auth.signOut();
                window.location.href = 'index.html';
            } catch (e) { showToast('❌ Erreur déconnexion', true);
                console.error(e); }
        };
        btnLogout.addEventListener('click', logout);

        // ========================================================================
        // SESSION
        // ========================================================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const doc = await dbGet('users', user.email);
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.role !== 'admin') {
                            window.location.href = 'index.html';
                            return;
                        }
                        currentUser = { ...data, email: user.email };
                        welcomeMessage.textContent = `👋 Bonjour ${currentUser.nom}`;
                        userRoleBadge.textContent = 'Rôle : Admin';
                        mainInterface.style.display = 'block';
                        requestAnimationFrame(() => mainInterface.classList.add('active'));
                        renderAdminLists();
                    } else {
                        await auth.signOut();
                        window.location.href = 'index.html';
                    }
                } catch (e) {
                    console.error(e);
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        btnAdminEditSave.addEventListener('click', saveAdminEdit);
        btnAdminSpotAdd.addEventListener('click', addSpot);

        console.log('✅ Machi admin ready (lazy loading Cropper)');
    </script>
</body>
</html>
