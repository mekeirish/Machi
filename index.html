<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Machi – Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0a0d1a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .glass-card, #mainInterface {
            background: rgba(20, 25, 45, 0.6);
            backdrop-filter: blur(12px) saturate(160%);
            -webkit-backdrop-filter: blur(12px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
            padding: 1.5rem 1.2rem;
            width: 100%;
            max-width: 500px;
            transition: opacity 0.3s ease;
        }
        #mainInterface {
            display: none;
            max-width: 500px;
            min-height: 60vh;
            position: relative;
            padding-bottom: 5rem;
        }
        #mainInterface.active { display: block; }

        .btn-led {
            background: #1e2a4a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #d6eaff;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            text-align: center;
            display: inline-block;
        }
        .btn-led:hover { background: #2b3b66; color: #fff; }
        .btn-led:active { background: #16203a; }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .header-actions .btn-logout,
        .header-actions .btn-create {
            background: rgba(255,70,70,0.10);
            border: 1px solid rgba(255,70,70,0.15);
            border-radius: 40px;
            padding: 0.35rem 1.2rem;
            color: #ffb0b0;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .header-actions .btn-create {
            background: rgba(0,180,170,0.10);
            border-color: rgba(0,180,170,0.15);
            color: #a0f0e8;
        }
        .header-actions .btn-logout:hover { background: rgba(255,70,70,0.2); }
        .header-actions .btn-create:hover { background: rgba(0,180,170,0.2); }

        /* --- Modales --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: rgba(18,24,44,0.85);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            max-width: 420px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content label {
            color: #b0c8e8;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 0.75rem;
            display: block;
        }
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 0.6rem 1rem;
            margin-top: 0.2rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: #e8f0ff;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.15s;
        }
        .modal-content input:focus { border-color: #4a8cff; }
        .modal-content input::placeholder { color: #6a7a9a; }
        .modal-content .photo-preview {
            margin-top: 0.5rem;
            width: 100%;
            max-height: 120px;
            object-fit: contain;
            border-radius: 0.8rem;
            background: rgba(255,255,255,0.03);
            border: 1px dashed rgba(255,255,255,0.1);
        }

        .btn-validate { background: #00807a; border-color: #00a39a; color: #fff; }
        .btn-validate:hover { background: #00a39a; }
        .btn-cancel { background: rgba(255,70,70,0.12); border-color: rgba(255,70,70,0.2); color: #ffb0b0; }
        .btn-cancel:hover { background: rgba(255,70,70,0.22); }

        /* --- Liste des trajets --- */
        .courses-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }
        .course-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            width: 100%;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
            position: relative;
        }
        .course-card:hover { background: rgba(255,255,255,0.06); }

        /* --- Ligne d'info --- */
        .course-info {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.4rem 0.6rem;
            margin-bottom: 0.5rem;
        }
        .course-info .titre {
            font-weight: 600;
            font-size: 1rem;
            color: #d6eaff;
            flex: 1 1 auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .course-info .heure {
            font-size: 0.8rem;
            color: #8aa0c8;
            white-space: nowrap;
        }
        .course-info .prix {
            font-size: 0.8rem;
            color: #b0c8e8;
            white-space: nowrap;
            font-weight: 500;
        }

        /* --- Rangée carreaux + photo --- */
        .course-row {
            display: flex;
            align-items: stretch;
            gap: 0.8rem;
            margin-top: 0.3rem;
        }

        /* --- Grille 2x4 pour les carreaux --- */
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.3rem;
            flex: 1;
            min-width: 0;
        }
        .seat {
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.10);
            transition: background 0.2s, border-color 0.2s;
            min-height: 28px;
            cursor: default;
        }
        .seat.driver {
            background: #00b8b0;
            border-color: #00d4cc;
            box-shadow: 0 0 10px rgba(0,200,180,0.2);
            cursor: default;
        }
        .seat.available {
            background: transparent;
            border-color: rgba(255,255,255,0.25);
            cursor: pointer;
        }
        .seat.available:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.5);
        }
        .seat.reserved {
            background: #b44cff;
            border-color: #b44cff;
            box-shadow: 0 0 12px rgba(180,76,255,0.3);
            cursor: pointer;
        }
        .seat.reserved:hover {
            filter: brightness(1.15);
        }
        .seat.disabled {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.05);
            opacity: 0.25;
            cursor: default;
        }

        /* --- Photo de la voiture --- */
        .car-photo {
            width: 70px;
            min-height: 70px;
            max-height: 80px;
            border-radius: 12px;
            object-fit: cover;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
            align-self: center;
        }
        .car-photo.default {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #6a7a9a;
        }

        /* --- Tooltip (inchangé) --- */
        .tooltip-reservation {
            position: fixed;
            background: rgba(18,24,44,0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            color: #e8f0ff;
            font-size: 0.85rem;
            display: none;
            z-index: 60;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            min-width: 150px;
            align-items: center;
            gap: 0.6rem;
            pointer-events: auto;
        }
        .tooltip-reservation .nom { flex: 1; }
        .tooltip-reservation .btn-supprimer {
            background: rgba(255,70,70,0.2);
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            color: #ffb0b0;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .tooltip-reservation .btn-supprimer:hover { background: rgba(255,70,70,0.4); }

        /* --- Admin panel --- */
        .admin-panel { margin-top: 1rem; }
        .admin-panel .btn-admin {
            background: #1e2a4a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 60px;
            padding: 0.6rem 1.5rem;
            color: #d6eaff;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            text-align: center;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .admin-panel .btn-admin:hover { background: #2b3b66; }
        .admin-panel .btn-admin.active { background: #2b3b66; border-color: #4a8cff; }

        .admin-list {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-top: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .admin-list .item {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.85rem;
            color: #b0c8e8;
            cursor: pointer;
            transition: background 0.2s;
        }
        .admin-list .item:hover { background: rgba(255,255,255,0.05); }
        .admin-list .item:last-child { border-bottom: none; }
        .admin-list .item .email { color: #8aa0c8; font-size: 0.75rem; }

        /* --- Toast --- */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,180,170,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,255,200,0.15);
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            color: #c0fff0;
            font-weight: 500;
            display: none;
            z-index: 100;
            font-size: 0.9rem;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { display: block; }

        #homeScreen .btn-led { flex: 1; text-align: center; }

        /* --- Responsive --- */
        @media (max-width: 480px) {
            body { padding: 0.5rem; }
            .glass-card, #mainInterface { padding: 1rem 0.8rem; border-radius: 1.5rem; }
            .modal-content { padding: 1.5rem 1rem; }
            .course-info .titre { font-size: 0.9rem; }
            .seat { min-height: 22px; border-radius: 5px; }
            .car-photo { width: 55px; min-height: 55px; max-height: 65px; }
            .header-actions .btn-logout,
            .header-actions .btn-create { font-size: 0.7rem; padding: 0.25rem 0.9rem; }
        }
        @media (min-width: 600px) {
            #mainInterface, .glass-card { max-width: 550px; }
            .seat { min-height: 32px; }
            .car-photo { width: 80px; min-height: 80px; max-height: 90px; }
        }
    </style>
</head>
<body>

    <!-- ÉCRAN D'ACCUEIL -->
    <div id="homeScreen" class="glass-card">
        <h1 class="text-3xl font-bold text-center text-cyan-200 mb-1">Machi</h1>
        <p class="text-center text-slate-400 text-sm mb-6 tracking-wider">⚡ mobilité en circuit fermé</p>
        <div class="flex flex-col sm:flex-row gap-3">
            <button id="btnInscription" class="btn-led">✨ S'inscrire</button>
            <button id="btnConnexion" class="btn-led">🔐 Se connecter</button>
        </div>
        <div class="mt-5 text-center text-xs text-slate-500">
            <span id="stats">👤 0 inscrits</span>
        </div>
    </div>

    <!-- INTERFACE PRINCIPALE -->
    <div id="mainInterface">
        <div class="header-actions">
            <div class="text-slate-400 text-sm truncate" id="userRoleBadge">Rôle : —</div>
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                <button id="btnCreateCourse" class="btn-create" style="display:none;">➕ Créer</button>
                <button id="btnLogout" class="btn-logout">✕ Déconnexion</button>
            </div>
        </div>

        <h2 id="welcomeMessage" class="text-xl font-semibold text-cyan-200 mb-1">Bienvenue</h2>
        <hr class="border-white/5 my-3" />

        <div id="mainContent">
            <!-- Courses (pour chauffeur et passager) -->
            <div id="coursesContainer">
                <p class="text-slate-500 text-center text-sm" id="noCoursesMsg">Aucune course pour le moment.</p>
                <div id="coursesList" class="courses-list"></div>
            </div>

            <!-- Panneau Admin -->
            <div id="adminPanel" class="admin-panel" style="display:none;">
                <button id="btnAdminChauffeurs" class="btn-admin">🚗 Chauffeurs</button>
                <div id="adminChauffeursList" class="admin-list" style="display:none;"></div>
                <button id="btnAdminPassagers" class="btn-admin">🚶 Passagers</button>
                <div id="adminPassagersList" class="admin-list" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- MODALE ADMIN : attribuer photo -->
    <div id="modalAdminPhoto" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-xl font-semibold text-center text-cyan-200 mb-4">📸 Photo de la voiture</h2>
            <p id="adminPhotoChauffeurNom" class="text-center text-slate-400 text-sm mb-2">Chauffeur : —</p>
            <div style="text-align:center; margin:0.5rem 0;">
                <img id="adminPhotoPreview" class="photo-preview" src="" alt="Aperçu" style="display:none;" />
            </div>
            <label>Choisir une photo</label>
            <input type="file" id="adminPhotoInput" accept="image/*" />
            <div class="flex gap-3 mt-5">
                <button id="btnAdminPhotoValider" class="btn-led btn-validate flex-1">✔ Enregistrer</button>
                <button id="btnAdminPhotoAnnuler" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <!-- TOOLTIP (pour chauffeur) -->
    <div id="tooltipReservation" class="tooltip-reservation">
        <span class="nom">Passager</span>
        <button class="btn-supprimer" id="btnSupprimerResa">✕</button>
    </div>

    <!-- MODALES (inscription / connexion / création course) -->
    <div id="modalInscription" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-xl font-semibold text-center text-cyan-200 mb-4">Créer un compte</h2>
            <label>Je suis</label>
            <select id="role">
                <option value="passager">🚶 Passager</option>
                <option value="chauffeur">🚗 Chauffeur</option>
            </select>
            <label>Nom complet</label>
            <input type="text" id="nom" placeholder="ex: Karim Benali" />
            <label>Téléphone</label>
            <input type="tel" id="telephone" placeholder="0555 12 34 56" />
            <label>Email</label>
            <input type="email" id="email" placeholder="ex: farid@gmail.com" />
            <label>Mot de passe</label>
            <input type="password" id="motDePasse" placeholder="••••••••" />
            <div class="flex gap-3 mt-5">
                <button id="btnValiderInscription" class="btn-led btn-validate flex-1">✔ Valider</button>
                <button id="btnAnnulerInscription" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="modalConnexion" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-xl font-semibold text-center text-cyan-200 mb-4">🔐 Se connecter</h2>
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="ex: farid@gmail.com" />
            <label>Mot de passe</label>
            <input type="password" id="loginPassword" placeholder="••••••••" />
            <div class="flex gap-3 mt-5">
                <button id="btnValiderConnexion" class="btn-led btn-validate flex-1">✔ Se connecter</button>
                <button id="btnAnnulerConnexion" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="modalCreateCourse" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-xl font-semibold text-center text-cyan-200 mb-4">🚗 Nouvelle course</h2>
            <label>Départ</label>
            <input type="text" id="courseDepart" placeholder="ex: Tiaret" />
            <label>Arrivée</label>
            <input type="text" id="courseArrivee" placeholder="ex: Mahdia" />
            <label>Heure de départ</label>
            <input type="time" id="courseHeure" />
            <label>Prix (unités)</label>
            <input type="number" id="coursePrix" placeholder="ex: 12" min="1" />
            <label>Places (hors chauffeur, max 7)</label>
            <input type="number" id="coursePlaces" placeholder="ex: 3" min="1" max="7" />
            <div class="flex gap-3 mt-5">
                <button id="btnValiderCourse" class="btn-led btn-validate flex-1">✔ Confirmer</button>
                <button id="btnAnnulerCourse" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        (function() {
            "use strict";

            // --- DOM ---
            const homeScreen = document.getElementById('homeScreen');
            const mainInterface = document.getElementById('mainInterface');
            const welcomeMessage = document.getElementById('welcomeMessage');
            const userRoleBadge = document.getElementById('userRoleBadge');
            const stats = document.getElementById('stats');
            const coursesList = document.getElementById('coursesList');
            const noCoursesMsg = document.getElementById('noCoursesMsg');
            const coursesContainer = document.getElementById('coursesContainer');
            const adminPanel = document.getElementById('adminPanel');
            const btnAdminChauffeurs = document.getElementById('btnAdminChauffeurs');
            const btnAdminPassagers = document.getElementById('btnAdminPassagers');
            const adminChauffeursList = document.getElementById('adminChauffeursList');
            const adminPassagersList = document.getElementById('adminPassagersList');

            const btnInscription = document.getElementById('btnInscription');
            const btnConnexion = document.getElementById('btnConnexion');

            const modalInscription = document.getElementById('modalInscription');
            const btnValiderInscription = document.getElementById('btnValiderInscription');
            const btnAnnulerInscription = document.getElementById('btnAnnulerInscription');
            const roleSelect = document.getElementById('role');
            const nomInput = document.getElementById('nom');
            const telInput = document.getElementById('telephone');
            const emailInput = document.getElementById('email');
            const pwdInput = document.getElementById('motDePasse');

            const modalConnexion = document.getElementById('modalConnexion');
            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const btnValiderConnexion = document.getElementById('btnValiderConnexion');
            const btnAnnulerConnexion = document.getElementById('btnAnnulerConnexion');

            const btnLogout = document.getElementById('btnLogout');
            const btnCreateCourse = document.getElementById('btnCreateCourse');

            const modalCreateCourse = document.getElementById('modalCreateCourse');
            const courseDepart = document.getElementById('courseDepart');
            const courseArrivee = document.getElementById('courseArrivee');
            const courseHeure = document.getElementById('courseHeure');
            const coursePrix = document.getElementById('coursePrix');
            const coursePlaces = document.getElementById('coursePlaces');
            const btnValiderCourse = document.getElementById('btnValiderCourse');
            const btnAnnulerCourse = document.getElementById('btnAnnulerCourse');

            // Admin photo
            const modalAdminPhoto = document.getElementById('modalAdminPhoto');
            const adminPhotoChauffeurNom = document.getElementById('adminPhotoChauffeurNom');
            const adminPhotoPreview = document.getElementById('adminPhotoPreview');
            const adminPhotoInput = document.getElementById('adminPhotoInput');
            const btnAdminPhotoValider = document.getElementById('btnAdminPhotoValider');
            const btnAdminPhotoAnnuler = document.getElementById('btnAdminPhotoAnnuler');

            const tooltip = document.getElementById('tooltipReservation');
            const btnSupprimerResa = document.getElementById('btnSupprimerResa');
            const toast = document.getElementById('toast');

            let tooltipCourseId = null;
            let tooltipPlaceIndex = null;
            let adminTargetChauffeurEmail = null;
            let adminTempPhotoData = null;

            // --- Clés ---
            const STORAGE_KEY_CHAUFFEURS = 'chauffeurs';
            const STORAGE_KEY_PASSAGERS = 'passagers';
            const STORAGE_KEY_SESSION = 'machi_session';
            const STORAGE_KEY_COURSES = 'courses';
            const STORAGE_KEY_PHOTOS = 'chauffeur_photos'; // { email: base64 }

            // --- Stockage ---
            function getData(key) {
                try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
            }
            function setData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
            function getChauffeurs() { return getData(STORAGE_KEY_CHAUFFEURS); }
            function getPassagers() { return getData(STORAGE_KEY_PASSAGERS); }
            function saveChauffeurs(list) { setData(STORAGE_KEY_CHAUFFEURS, list); }
            function savePassagers(list) { setData(STORAGE_KEY_PASSAGERS, list); }
            function getCourses() { return getData(STORAGE_KEY_COURSES); }
            function saveCourses(list) { setData(STORAGE_KEY_COURSES, list); }
            function getPhotos() { return getData(STORAGE_KEY_PHOTOS); }
            function savePhotos(photos) { setData(STORAGE_KEY_PHOTOS, photos); }

            function getSession() {
                try { return JSON.parse(localStorage.getItem(STORAGE_KEY_SESSION)); } catch { return null; }
            }
            function setSession(user) { localStorage.setItem(STORAGE_KEY_SESSION, JSON.stringify(user)); }
            function clearSession() { localStorage.removeItem(STORAGE_KEY_SESSION); }

            // --- Utilisateurs démo ---
            function seedDefaultUsers() {
                if (getChauffeurs().length === 0 && getPassagers().length === 0) {
                    savePassagers([{ nom: "Farid", telephone: "0000000021", email: "farid@gmail.com", motDePasse: "farid123" }]);
                    saveChauffeurs([{ nom: "Said", telephone: "1111111111111", email: "said@gmail.com", motDePasse: "said123" }]);
                }
            }

            // --- Mise à jour compteur ---
            function updateStats() {
                const nb = getChauffeurs().length + getPassagers().length;
                stats.textContent = `👤 ${nb} inscrit${nb > 1 ? 's' : ''}`;
            }

            // --- Toast ---
            function showToast(message, isError = false) {
                toast.textContent = message;
                toast.style.borderColor = isError ? 'rgba(255,100,100,0.2)' : 'rgba(0,255,200,0.15)';
                toast.style.color = isError ? '#ffb0b0' : '#c0fff0';
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
            }

            // --- Affichage ---
            function showHomeScreen() {
                homeScreen.style.display = 'block';
                mainInterface.classList.remove('active');
                mainInterface.style.display = 'none';
                updateStats();
                tooltip.style.display = 'none';
            }

            function showMainInterface(user) {
                homeScreen.style.display = 'none';
                mainInterface.style.display = 'block';
                requestAnimationFrame(() => mainInterface.classList.add('active'));

                const roleFr = user.role === 'admin' ? 'Admin' : (user.role === 'chauffeur' ? 'Chauffeur' : 'Passager');
                welcomeMessage.textContent = `👋 Bonjour ${user.nom || 'Admin'}`;
                userRoleBadge.textContent = `Rôle : ${roleFr}`;

                btnCreateCourse.style.display = 'none';

                if (user.role === 'admin') {
                    coursesContainer.style.display = 'none';
                    adminPanel.style.display = 'block';
                    renderAdminLists();
                } else {
                    coursesContainer.style.display = 'block';
                    adminPanel.style.display = 'none';
                    if (user.role === 'chauffeur') {
                        btnCreateCourse.style.display = 'inline-block';
                    }
                    renderCourses(user);
                }
            }

            // --- Rendu des courses avec 8 carreaux (2x4) + photo ---
            function renderCourses(user) {
                const allCourses = getCourses();
                const photos = getPhotos();
                let coursesToShow = [];
                if (user.role === 'chauffeur') {
                    coursesToShow = allCourses.filter(c => c.chauffeurEmail === user.email);
                } else {
                    coursesToShow = allCourses;
                }

                coursesList.innerHTML = '';
                if (coursesToShow.length === 0) {
                    noCoursesMsg.style.display = 'block';
                    coursesList.style.display = 'none';
                    return;
                }
                noCoursesMsg.style.display = 'none';
                coursesList.style.display = 'flex';

                coursesToShow.forEach(course => {
                    // Récupérer la photo du chauffeur
                    const photoData = photos[course.chauffeurEmail] || null;

                    const card = document.createElement('div');
                    card.className = 'course-card';
                    card.dataset.courseId = course.id;

                    // Ligne d'info
                    const info = document.createElement('div');
                    info.className = 'course-info';
                    const titre = document.createElement('span');
                    titre.className = 'titre';
                    titre.textContent = `${course.depart} → ${course.arrivee}`;
                    info.appendChild(titre);
                    const heure = document.createElement('span');
                    heure.className = 'heure';
                    heure.textContent = `🕐 ${course.heure}`;
                    info.appendChild(heure);
                    const prix = document.createElement('span');
                    prix.className = 'prix';
                    prix.textContent = `💰 ${course.prix}`;
                    info.appendChild(prix);
                    card.appendChild(info);

                    // Rangée : carreaux + photo
                    const row = document.createElement('div');
                    row.className = 'course-row';

                    // Grille 2x4
                    const seatGrid = document.createElement('div');
                    seatGrid.className = 'seat-grid';

                    // Construire le statut des 8 places (index 0 = chauffeur)
                    const totalPlaces = course.places + 1; // +1 pour le chauffeur
                    const placesEffectives = Math.min(totalPlaces, 8);
                    const disabledCount = 8 - placesEffectives;
                    const reservations = course.reservations || [];

                    const placeStatus = [];
                    placeStatus[0] = 'driver';
                    for (let i = 1; i < placesEffectives; i++) {
                        const resa = reservations.find(r => r.placeIndex === i);
                        if (resa) {
                            placeStatus[i] = { type: 'reserved', email: resa.email, nom: resa.nom };
                        } else {
                            placeStatus[i] = { type: 'available' };
                        }
                    }
                    for (let i = placesEffectives; i < 8; i++) {
                        placeStatus[i] = { type: 'disabled' };
                    }

                    for (let i = 0; i < 8; i++) {
                        const seat = document.createElement('div');
                        seat.className = 'seat';
                        seat.dataset.placeIndex = i;
                        seat.dataset.courseId = course.id;

                        const status = placeStatus[i];
                        if (typeof status === 'string') {
                            if (status === 'driver') {
                                seat.classList.add('driver');
                                seat.dataset.status = 'driver';
                            } else if (status === 'disabled') {
                                seat.classList.add('disabled');
                                seat.dataset.status = 'disabled';
                            }
                        } else if (status.type === 'available') {
                            seat.classList.add('available');
                            seat.dataset.status = 'available';
                        } else if (status.type === 'reserved') {
                            seat.classList.add('reserved');
                            seat.dataset.status = 'reserved';
                            seat.dataset.reservedEmail = status.email;
                            seat.dataset.reservedNom = status.nom;
                        }
                        seatGrid.appendChild(seat);
                    }
                    row.appendChild(seatGrid);

                    // Photo de la voiture
                    const img = document.createElement('img');
                    img.className = 'car-photo' + (photoData ? '' : ' default');
                    if (photoData) {
                        img.src = photoData;
                        img.alt = 'Voiture';
                    } else {
                        img.alt = '🚗';
                        img.textContent = '🚗';
                        // On va utiliser un emoji en fallback via CSS
                        img.style.display = 'flex';
                        img.style.alignItems = 'center';
                        img.style.justifyContent = 'center';
                        img.style.fontSize = '2rem';
                        img.style.color = '#6a7a9a';
                        img.textContent = '🚗';
                    }
                    row.appendChild(img);
                    card.appendChild(row);
                    coursesList.appendChild(card);
                });
            }

            // --- Panneau admin ---
            function renderAdminLists() {
                const chauffeurs = getChauffeurs();
                adminChauffeursList.innerHTML = '';
                if (chauffeurs.length === 0) {
                    adminChauffeursList.innerHTML = '<div class="item">Aucun chauffeur</div>';
                } else {
                    chauffeurs.forEach(c => {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = `<span>${c.nom} (${c.telephone})</span><span class="email">${c.email}</span>`;
                        div.addEventListener('click', () => openAdminPhotoModal(c));
                        adminChauffeursList.appendChild(div);
                    });
                }

                const passagers = getPassagers();
                adminPassagersList.innerHTML = '';
                if (passagers.length === 0) {
                    adminPassagersList.innerHTML = '<div class="item">Aucun passager</div>';
                } else {
                    passagers.forEach(p => {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = `<span>${p.nom} (${p.telephone})</span><span class="email">${p.email}</span>`;
                        adminPassagersList.appendChild(div);
                    });
                }
            }

            // --- Admin : modale photo ---
            function openAdminPhotoModal(chauffeur) {
                adminTargetChauffeurEmail = chauffeur.email;
                adminPhotoChauffeurNom.textContent = `Chauffeur : ${chauffeur.nom} (${chauffeur.email})`;
                adminPhotoPreview.style.display = 'none';
                adminPhotoPreview.src = '';
                adminTempPhotoData = null;
                adminPhotoInput.value = '';
                modalAdminPhoto.classList.add('active');
            }

            function closeAdminPhotoModal() {
                modalAdminPhoto.classList.remove('active');
                adminTargetChauffeurEmail = null;
                adminTempPhotoData = null;
            }

            // --- Gestion de l'upload photo ---
            adminPhotoInput.addEventListener('change', function(e) {
                const file = this.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    adminTempPhotoData = ev.target.result;
                    adminPhotoPreview.src = ev.target.result;
                    adminPhotoPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            });

            function saveChauffeurPhoto() {
                if (!adminTargetChauffeurEmail) return;
                if (!adminTempPhotoData) {
                    showToast('⚠️ Veuillez choisir une photo', true);
                    return;
                }
                const photos = getPhotos();
                photos[adminTargetChauffeurEmail] = adminTempPhotoData;
                savePhotos(photos);
                showToast('✅ Photo enregistrée !');
                closeAdminPhotoModal();
                // Rafraîchir l'affichage
                const session = getSession();
                if (session && session.role === 'admin') {
                    renderAdminLists();
                } else if (session) {
                    renderCourses(session);
                }
            }

            btnAdminPhotoValider.addEventListener('click', saveChauffeurPhoto);
            btnAdminPhotoAnnuler.addEventListener('click', closeAdminPhotoModal);
            modalAdminPhoto.addEventListener('click', (e) => {
                if (e.target === modalAdminPhoto) closeAdminPhotoModal();
            });

            // --- Gestion des clics sur les places ---
            function handleSeatClick(e) {
                const seat = e.target.closest('.seat');
                if (!seat) return;
                const status = seat.dataset.status;
                const courseId = seat.dataset.courseId;
                const placeIndex = parseInt(seat.dataset.placeIndex);
                const session = getSession();
                if (!session) return;
                if (session.role === 'admin') return;

                if (session.role === 'chauffeur') {
                    if (status === 'reserved') {
                        const nom = seat.dataset.reservedNom;
                        if (nom) {
                            tooltipCourseId = courseId;
                            tooltipPlaceIndex = placeIndex;
                            const rect = seat.getBoundingClientRect();
                            tooltip.style.left = (rect.left + rect.width / 2 - 75) + 'px';
                            tooltip.style.top = (rect.top - 10) + 'px';
                            tooltip.style.display = 'flex';
                            tooltip.querySelector('.nom').textContent = `👤 ${nom}`;
                        } else {
                            tooltip.style.display = 'none';
                        }
                    } else {
                        tooltip.style.display = 'none';
                    }
                } else if (session.role === 'passager') {
                    if (status === 'available') {
                        const courses = getCourses();
                        const course = courses.find(c => c.id === courseId);
                        if (!course) return;
                        const reservations = course.reservations || [];
                        const dejaReserve = reservations.some(r => r.email === session.email);
                        if (dejaReserve) {
                            showToast('❌ Vous avez déjà réservé une place dans ce trajet', true);
                            return;
                        }
                        reservations.push({ email: session.email, nom: session.nom, placeIndex });
                        course.reservations = reservations;
                        saveCourses(courses);
                        showToast(`✅ Place réservée pour ${session.nom}`);
                        renderCourses(session);
                    } else if (status === 'reserved') {
                        const reservedEmail = seat.dataset.reservedEmail;
                        if (reservedEmail === session.email) {
                            const courses = getCourses();
                            const course = courses.find(c => c.id === courseId);
                            if (!course) return;
                            const reservations = course.reservations || [];
                            const idx = reservations.findIndex(r => r.placeIndex === placeIndex && r.email === session.email);
                            if (idx !== -1) {
                                reservations.splice(idx, 1);
                                course.reservations = reservations;
                                saveCourses(courses);
                                showToast('🗑️ Réservation annulée');
                                renderCourses(session);
                            }
                        } else {
                            showToast('ℹ️ Cette place est réservée par un autre passager', false);
                        }
                    }
                }
            }

            // --- Supprimer réservation (chauffeur) ---
            function handleSupprimerResa() {
                if (!tooltipCourseId || tooltipPlaceIndex === null) return;
                const courses = getCourses();
                const course = courses.find(c => c.id === tooltipCourseId);
                if (!course) return;
                const reservations = course.reservations || [];
                const idx = reservations.findIndex(r => r.placeIndex === tooltipPlaceIndex);
                if (idx !== -1) {
                    reservations.splice(idx, 1);
                    course.reservations = reservations;
                    saveCourses(courses);
                    showToast('🗑️ Place libérée');
                    tooltip.style.display = 'none';
                    const session = getSession();
                    if (session) renderCourses(session);
                } else {
                    tooltip.style.display = 'none';
                }
            }

            // --- Admin : toggles listes ---
            function toggleAdminList(listElement) {
                if (listElement.style.display === 'block') {
                    listElement.style.display = 'none';
                } else {
                    adminChauffeursList.style.display = 'none';
                    adminPassagersList.style.display = 'none';
                    listElement.style.display = 'block';
                }
            }

            btnAdminChauffeurs.addEventListener('click', () => {
                renderAdminLists();
                toggleAdminList(adminChauffeursList);
            });
            btnAdminPassagers.addEventListener('click', () => {
                renderAdminLists();
                toggleAdminList(adminPassagersList);
            });

            // --- Connexion (avec admin) ---
            function handleLogin() {
                const email = loginEmail.value.trim();
                const password = loginPassword.value.trim();
                if (!email || !password) { showToast('⚠️ Remplissez tous les champs', true); return; }

                if (email === 'admin@gmail.com' && password === 'admin123') {
                    const adminUser = { nom: 'Admin', email: 'admin@gmail.com', role: 'admin' };
                    showToast('✅ Bienvenue Admin');
                    setSession(adminUser);
                    closeModalConnexion();
                    showMainInterface(adminUser);
                    return;
                }

                const chauffeurs = getChauffeurs();
                const passagers = getPassagers();
                let foundUser = null;
                for (let u of chauffeurs) {
                    if (u.email === email && u.motDePasse === password) {
                        foundUser = { ...u, role: 'chauffeur' };
                        break;
                    }
                }
                if (!foundUser) {
                    for (let u of passagers) {
                        if (u.email === email && u.motDePasse === password) {
                            foundUser = { ...u, role: 'passager' };
                            break;
                        }
                    }
                }
                if (!foundUser) { showToast('❌ Email ou mot de passe incorrect', true); return; }

                showToast(`✅ Bienvenue ${foundUser.nom}`);
                setSession(foundUser);
                closeModalConnexion();
                showMainInterface(foundUser);
            }

            function logout() {
                clearSession();
                showHomeScreen();
                showToast('🔓 Déconnecté');
                tooltip.style.display = 'none';
            }

            // --- Inscription ---
            function handleInscription() {
                const role = roleSelect.value;
                const nom = nomInput.value.trim();
                const tel = telInput.value.trim();
                const email = emailInput.value.trim();
                const motDePasse = pwdInput.value.trim();
                if (!nom || !tel || !email || !motDePasse) {
                    showToast('⚠️ Tous les champs sont obligatoires', true);
                    return;
                }
                if (!/^\d[\d\s]{7,}$/.test(tel.replace(/\s/g, ''))) {
                    showToast('📞 Téléphone invalide (8+ chiffres)', true);
                    return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showToast('✉️ Email invalide', true);
                    return;
                }
                if (motDePasse.length < 4) {
                    showToast('🔒 Mot de passe : au moins 4 caractères', true);
                    return;
                }
                const allUsers = [...getChauffeurs(), ...getPassagers()];
                if (allUsers.some(u => u.email === email)) {
                    showToast('❌ Cet email est déjà utilisé', true);
                    return;
                }

                const utilisateur = { nom, telephone: tel, email, motDePasse, dateInscription: new Date().toISOString() };
                if (role === 'chauffeur') {
                    const list = getChauffeurs();
                    list.push(utilisateur);
                    saveChauffeurs(list);
                    showToast(`🚗 Chauffeur « ${nom} » enregistré !`);
                } else {
                    const list = getPassagers();
                    list.push(utilisateur);
                    savePassagers(list);
                    showToast(`🚶 Passager « ${nom} » enregistré !`);
                }
                updateStats();
                closeModalInscription();
            }

            // --- Création course (max 7 places passagers) ---
            function handleCreateCourse() {
                const depart = courseDepart.value.trim();
                const arrivee = courseArrivee.value.trim();
                const heure = courseHeure.value;
                const prix = parseInt(coursePrix.value);
                const places = parseInt(coursePlaces.value);

                if (!depart || !arrivee || !heure || isNaN(prix) || isNaN(places)) {
                    showToast('⚠️ Tous les champs sont requis', true);
                    return;
                }
                if (prix < 1) { showToast('💰 Prix invalide', true); return; }
                if (places < 1 || places > 7) { showToast('👥 Places entre 1 et 7', true); return; }

                const session = getSession();
                if (!session) { showToast('❌ Vous devez être connecté', true); return; }

                const nouvelleCourse = {
                    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                    chauffeurEmail: session.email,
                    depart,
                    arrivee,
                    heure,
                    prix,
                    places,
                    reservations: [],
                    dateCreation: new Date().toISOString()
                };

                const courses = getCourses();
                courses.push(nouvelleCourse);
                saveCourses(courses);
                showToast(`✅ Course créée : ${depart} → ${arrivee}`);
                closeModalCreateCourse();
                renderCourses(session);
            }

            // --- Modales ---
            function openModalInscription() {
                modalInscription.classList.add('active');
                nomInput.value = ''; telInput.value = ''; emailInput.value = ''; pwdInput.value = '';
                roleSelect.value = 'passager';
                nomInput.focus();
            }
            function closeModalInscription() { modalInscription.classList.remove('active'); }

            function openModalConnexion() {
                modalConnexion.classList.add('active');
                loginEmail.value = ''; loginPassword.value = '';
                loginEmail.focus();
            }
            function closeModalConnexion() { modalConnexion.classList.remove('active'); }

            function openModalCreateCourse() {
                modalCreateCourse.classList.add('active');
                courseDepart.value = ''; courseArrivee.value = ''; courseHeure.value = ''; coursePrix.value = ''; coursePlaces.value = '';
                courseDepart.focus();
            }
            function closeModalCreateCourse() { modalCreateCourse.classList.remove('active'); }

            // --- Session au chargement ---
            function checkSession() {
                const session = getSession();
                if (session) {
                    if (session.role === 'admin') {
                        showMainInterface(session);
                        return;
                    }
                    const allUsers = [...getChauffeurs(), ...getPassagers()];
                    const exists = allUsers.some(u => u.email === session.email);
                    if (exists) {
                        showMainInterface(session);
                        return;
                    } else {
                        clearSession();
                    }
                }
                showHomeScreen();
            }

            // --- Événements ---
            btnInscription.addEventListener('click', openModalInscription);
            btnConnexion.addEventListener('click', openModalConnexion);

            btnValiderInscription.addEventListener('click', handleInscription);
            btnAnnulerInscription.addEventListener('click', closeModalInscription);
            modalInscription.addEventListener('click', (e) => { if (e.target === modalInscription) closeModalInscription(); });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalInscription.classList.contains('active')) closeModalInscription();
            });
            [nomInput, telInput, emailInput, pwdInput, roleSelect].forEach(el => {
                el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleInscription(); });
            });

            btnValiderConnexion.addEventListener('click', handleLogin);
            btnAnnulerConnexion.addEventListener('click', closeModalConnexion);
            modalConnexion.addEventListener('click', (e) => { if (e.target === modalConnexion) closeModalConnexion(); });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalConnexion.classList.contains('active')) closeModalConnexion();
            });
            [loginEmail, loginPassword].forEach(el => {
                el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
            });

            btnLogout.addEventListener('click', logout);

            btnCreateCourse.addEventListener('click', openModalCreateCourse);
            btnValiderCourse.addEventListener('click', handleCreateCourse);
            btnAnnulerCourse.addEventListener('click', closeModalCreateCourse);
            modalCreateCourse.addEventListener('click', (e) => { if (e.target === modalCreateCourse) closeModalCreateCourse(); });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalCreateCourse.classList.contains('active')) closeModalCreateCourse();
            });
            [courseDepart, courseArrivee, courseHeure, coursePrix, coursePlaces].forEach(el => {
                el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleCreateCourse(); });
            });

            // Clic sur les places
            coursesList.addEventListener('click', handleSeatClick);

            // Tooltip
            btnSupprimerResa.addEventListener('click', handleSupprimerResa);

            // --- Initialisation ---
            seedDefaultUsers();
            checkSession();
        })();
    </script>

</body>
</html>
