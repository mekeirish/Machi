<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Machi – Accueil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        /* --- Reset & fond uni --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0d1a;
            position: relative;
        }

        /* --- Carte glass (accueil) --- */
        .glass-card {
            background: rgba(20, 25, 45, 0.6);
            backdrop-filter: blur(12px) saturate(160%);
            -webkit-backdrop-filter: blur(12px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 440px;
            transition: opacity 0.3s ease;
        }

        /* --- Interface principale (dashboard) --- */
        #mainInterface {
            display: none;
            width: 100%;
            max-width: 800px;
            min-height: 70vh;
            background: rgba(20, 25, 45, 0.6);
            backdrop-filter: blur(12px) saturate(160%);
            -webkit-backdrop-filter: blur(12px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
            padding: 2rem;
            position: relative;
        }
        #mainInterface.active {
            display: block;
        }

        /* --- Bouton déconnexion (top-right) --- */
        .btn-logout {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            background: rgba(255, 70, 70, 0.12);
            border: 1px solid rgba(255, 70, 70, 0.2);
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            color: #ffb0b0;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-logout:hover {
            background: rgba(255, 70, 70, 0.25);
        }

        /* --- Boutons plats (accueil) --- */
        .btn-led {
            background: #1e2a4a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 0.9rem 1.8rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: #d6eaff;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            flex: 1;
            text-align: center;
        }
        .btn-led:hover {
            background: #2b3b66;
            color: #ffffff;
        }
        .btn-led:active {
            background: #16203a;
        }

        /* --- Modale (inscription / connexion) --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: rgba(18, 24, 44, 0.85);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            max-width: 400px;
            width: 90%;
        }
        .modal-content label {
            color: #b0c8e8;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            margin-top: 0.75rem;
            display: block;
        }
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 0.7rem 1rem;
            margin-top: 0.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: #e8f0ff;
            font-size: 1rem;
            outline: none;
            transition: border 0.15s;
        }
        .modal-content input:focus,
        .modal-content select:focus {
            border-color: #4a8cff;
        }
        .modal-content input::placeholder {
            color: #6a7a9a;
        }
        .modal-content select option {
            background: #1a2340;
        }

        .btn-validate {
            background: #00807a;
            border-color: #00a39a;
            color: #ffffff;
        }
        .btn-validate:hover {
            background: #00a39a;
        }

        .btn-cancel {
            background: rgba(255, 70, 70, 0.12);
            border-color: rgba(255, 70, 70, 0.2);
            color: #ffb0b0;
        }
        .btn-cancel:hover {
            background: rgba(255, 70, 70, 0.22);
        }

        /* --- Toast --- */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 180, 170, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 200, 0.15);
            padding: 0.8rem 2rem;
            border-radius: 60px;
            color: #c0fff0;
            font-weight: 500;
            display: none;
            z-index: 100;
        }
        .toast.show {
            display: block;
        }

        /* --- Responsive --- */
        @media (max-width: 480px) {
            .glass-card { padding: 1.8rem 1.2rem; }
            .btn-led { font-size: 1rem; padding: 0.7rem 1.2rem; }
            #mainInterface { padding: 1.2rem; min-height: 50vh; }
            .btn-logout { top: 0.8rem; right: 1rem; padding: 0.3rem 1rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <!-- ========== ÉCRAN D'ACCUEIL (connexion / inscription) ========== -->
    <div id="homeScreen" class="glass-card">
        <h1 class="text-3xl font-bold text-center text-cyan-200 mb-2">Machi</h1>
        <p class="text-center text-slate-400 text-sm mb-8 tracking-wider">⚡ mobilité en circuit fermé</p>

        <div class="flex flex-col sm:flex-row gap-4">
            <button id="btnInscription" class="btn-led">✨ S’inscrire</button>
            <button id="btnConnexion" class="btn-led">🔐 Se connecter</button>
        </div>

        <div class="mt-6 text-center text-xs text-slate-500">
            <span id="stats">👤 0 inscrits</span>
        </div>
    </div>

    <!-- ========== INTERFACE PRINCIPALE (connecté) ========== -->
    <div id="mainInterface">
        <button id="btnLogout" class="btn-logout">✕ Déconnexion</button>

        <div class="mt-2">
            <h2 id="welcomeMessage" class="text-2xl font-semibold text-cyan-200 mb-2">Bienvenue</h2>
            <p id="userRoleBadge" class="text-sm text-slate-400 mb-6">Rôle : —</p>

            <!-- Contenu vide pour l'instant (futur dashboard) -->
            <div class="border-t border-white/5 pt-6 mt-2 text-slate-500 text-center">
                <p class="text-lg">🚧 Interface principale</p>
                <p class="text-sm">(les fonctionnalités arrivent bientôt)</p>
            </div>
        </div>
    </div>

    <!-- ========== MODALE INSCRIPTION ========== -->
    <div id="modalInscription" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-2xl font-semibold text-center text-cyan-200 mb-5">Créer un compte</h2>

            <label for="role">Je suis</label>
            <select id="role" class="mb-1">
                <option value="passager">🚶 Passager</option>
                <option value="chauffeur">🚗 Chauffeur</option>
            </select>

            <label for="nom">Nom complet</label>
            <input type="text" id="nom" placeholder="ex: Karim Benali" />

            <label for="telephone">Téléphone</label>
            <input type="tel" id="telephone" placeholder="0555 12 34 56" />

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="ex: farid@gmail.com" />

            <label for="motDePasse">Mot de passe</label>
            <input type="password" id="motDePasse" placeholder="••••••••" />

            <div class="flex gap-3 mt-6">
                <button id="btnValiderInscription" class="btn-led btn-validate flex-1">✔ Valider</button>
                <button id="btnAnnulerInscription" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <!-- ========== MODALE CONNEXION ========== -->
    <div id="modalConnexion" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-2xl font-semibold text-center text-cyan-200 mb-5">🔐 Se connecter</h2>

            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="ex: farid@gmail.com" />

            <label for="loginPassword">Mot de passe</label>
            <input type="password" id="loginPassword" placeholder="••••••••" />

            <div class="flex gap-3 mt-6">
                <button id="btnValiderConnexion" class="btn-led btn-validate flex-1">✔ Se connecter</button>
                <button id="btnAnnulerConnexion" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        (function() {
            "use strict";

            // --- Éléments DOM ---
            const homeScreen = document.getElementById('homeScreen');
            const mainInterface = document.getElementById('mainInterface');
            const welcomeMessage = document.getElementById('welcomeMessage');
            const userRoleBadge = document.getElementById('userRoleBadge');
            const stats = document.getElementById('stats');

            // Boutons écran accueil
            const btnInscription = document.getElementById('btnInscription');
            const btnConnexion = document.getElementById('btnConnexion');

            // Modale inscription
            const modalInscription = document.getElementById('modalInscription');
            const btnValiderInscription = document.getElementById('btnValiderInscription');
            const btnAnnulerInscription = document.getElementById('btnAnnulerInscription');
            const roleSelect = document.getElementById('role');
            const nomInput = document.getElementById('nom');
            const telInput = document.getElementById('telephone');
            const emailInput = document.getElementById('email');
            const pwdInput = document.getElementById('motDePasse');

            // Modale connexion
            const modalConnexion = document.getElementById('modalConnexion');
            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const btnValiderConnexion = document.getElementById('btnValiderConnexion');
            const btnAnnulerConnexion = document.getElementById('btnAnnulerConnexion');

            // Déconnexion
            const btnLogout = document.getElementById('btnLogout');

            // Toast
            const toast = document.getElementById('toast');

            // --- Clés localStorage ---
            const STORAGE_KEY_CHAUFFEURS = 'chauffeurs';
            const STORAGE_KEY_PASSAGERS = 'passagers';
            const STORAGE_KEY_SESSION = 'machi_session';

            // --- Fonctions stockage ---
            function getData(key) {
                try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
            }
            function setData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
            function getChauffeurs() { return getData(STORAGE_KEY_CHAUFFEURS); }
            function getPassagers() { return getData(STORAGE_KEY_PASSAGERS); }
            function saveChauffeurs(list) { setData(STORAGE_KEY_CHAUFFEURS, list); }
            function savePassagers(list) { setData(STORAGE_KEY_PASSAGERS, list); }

            function getSession() {
                try { return JSON.parse(localStorage.getItem(STORAGE_KEY_SESSION)); } catch { return null; }
            }
            function setSession(user) {
                localStorage.setItem(STORAGE_KEY_SESSION, JSON.stringify(user));
            }
            function clearSession() {
                localStorage.removeItem(STORAGE_KEY_SESSION);
            }

            // --- Amorçage des données de démonstration (Farid & Said) ---
            function seedDefaultUsers() {
                if (getChauffeurs().length === 0 && getPassagers().length === 0) {
                    const passagers = [{
                        nom: "Farid",
                        telephone: "0000000021",
                        email: "farid@gmail.com",
                        motDePasse: "farid123"
                    }];
                    const chauffeurs = [{
                        nom: "Said",
                        telephone: "1111111111111",
                        email: "said@gmail.com",
                        motDePasse: "said123"
                    }];
                    savePassagers(passagers);
                    saveChauffeurs(chauffeurs);
                    console.log('🌱 Utilisateurs de démonstration : Farid (passager) et Said (chauffeur)');
                }
            }

            // --- Mise à jour compteur ---
            function updateStats() {
                const nb = getChauffeurs().length + getPassagers().length;
                stats.textContent = `👤 ${nb} inscrit${nb > 1 ? 's' : ''}`;
            }

            // --- Toast ---
            function showToast(message, isError = false) {
                toast.textContent = message;
                toast.style.borderColor = isError ? 'rgba(255,100,100,0.2)' : 'rgba(0,255,200,0.15)';
                toast.style.color = isError ? '#ffb0b0' : '#c0fff0';
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
            }

            // --- Afficher / masquer les écrans ---
            function showHomeScreen() {
                homeScreen.style.display = 'block';
                mainInterface.classList.remove('active');
                mainInterface.style.display = 'none';
                updateStats();
            }

            function showMainInterface(user) {
                homeScreen.style.display = 'none';
                mainInterface.style.display = 'block';
                // Petite astuce pour forcer l'affichage après display:block
                requestAnimationFrame(() => mainInterface.classList.add('active'));

                // Mettre à jour le message de bienvenue
                const roleFr = user.role === 'chauffeur' ? 'Chauffeur' : 'Passager';
                welcomeMessage.textContent = `👋 Bonjour ${user.nom}`;
                userRoleBadge.textContent = `Rôle : ${roleFr}`;
            }

            // --- Connexion ---
            function handleLogin() {
                const email = loginEmail.value.trim();
                const password = loginPassword.value.trim();

                if (!email || !password) {
                    showToast('⚠️ Veuillez remplir tous les champs', true);
                    return;
                }

                // Chercher dans les deux listes
                const chauffeurs = getChauffeurs();
                const passagers = getPassagers();

                let foundUser = null;
                let role = '';

                // Chercher parmi les chauffeurs
                for (let u of chauffeurs) {
                    if (u.email === email && u.motDePasse === password) {
                        foundUser = { ...u, role: 'chauffeur' };
                        break;
                    }
                }
                // Chercher parmi les passagers
                if (!foundUser) {
                    for (let u of passagers) {
                        if (u.email === email && u.motDePasse === password) {
                            foundUser = { ...u, role: 'passager' };
                            break;
                        }
                    }
                }

                if (!foundUser) {
                    showToast('❌ Email ou mot de passe incorrect', true);
                    return;
                }

                // Succès
                showToast(`✅ Bienvenue ${foundUser.nom} !`);
                setSession(foundUser);
                closeModalConnexion();
                showMainInterface(foundUser);
            }

            // --- Déconnexion ---
            function logout() {
                clearSession();
                showHomeScreen();
                showToast('🔓 Vous êtes déconnecté');
            }

            // --- Modales : Inscription ---
            function openModalInscription() {
                modalInscription.classList.add('active');
                nomInput.value = '';
                telInput.value = '';
                emailInput.value = '';
                pwdInput.value = '';
                roleSelect.value = 'passager';
                nomInput.focus();
            }
            function closeModalInscription() { modalInscription.classList.remove('active'); }

            // --- Modales : Connexion ---
            function openModalConnexion() {
                modalConnexion.classList.add('active');
                loginEmail.value = '';
                loginPassword.value = '';
                loginEmail.focus();
            }
            function closeModalConnexion() { modalConnexion.classList.remove('active'); }

            // --- Validation inscription (avec email & mot de passe) ---
            function handleInscription() {
                const role = roleSelect.value;
                const nom = nomInput.value.trim();
                const tel = telInput.value.trim();
                const email = emailInput.value.trim();
                const motDePasse = pwdInput.value.trim();

                if (!nom || !tel || !email || !motDePasse) {
                    showToast('⚠️ Tous les champs sont obligatoires', true);
                    return;
                }
                if (!/^\d[\d\s]{7,}$/.test(tel.replace(/\s/g, ''))) {
                    showToast('📞 Téléphone invalide (8+ chiffres)', true);
                    return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showToast('✉️ Email invalide', true);
                    return;
                }
                if (motDePasse.length < 4) {
                    showToast('🔒 Mot de passe : au moins 4 caractères', true);
                    return;
                }

                // Vérifier doublon (tous rôles confondus)
                const allUsers = [...getChauffeurs(), ...getPassagers()];
                if (allUsers.some(u => u.email === email)) {
                    showToast('❌ Cet email est déjà utilisé', true);
                    return;
                }

                const utilisateur = {
                    nom: nom,
                    telephone: tel,
                    email: email,
                    motDePasse: motDePasse,
                    dateInscription: new Date().toISOString()
                };

                if (role === 'chauffeur') {
                    const list = getChauffeurs();
                    list.push(utilisateur);
                    saveChauffeurs(list);
                    showToast(`🚗 Chauffeur « ${nom} » enregistré !`);
                } else {
                    const list = getPassagers();
                    list.push(utilisateur);
                    savePassagers(list);
                    showToast(`🚶 Passager « ${nom} » enregistré !`);
                }

                updateStats();
                closeModalInscription();
                console.log('📦 Données :', { chauffeurs: getChauffeurs(), passagers: getPassagers() });
            }

            // --- Vérification de session au chargement ---
            function checkSession() {
                const session = getSession();
                if (session) {
                    // Vérifier que l'utilisateur existe toujours (au cas où)
                    const allUsers = [...getChauffeurs(), ...getPassagers()];
                    const exists = allUsers.some(u => u.email === session.email);
                    if (exists) {
                        showMainInterface(session);
                        return;
                    } else {
                        clearSession(); // nettoyer session obsolète
                    }
                }
                showHomeScreen();
            }

            // --- Événements ---

            // Accueil
            btnInscription.addEventListener('click', openModalInscription);
            btnConnexion.addEventListener('click', openModalConnexion);

            // Inscription
            btnValiderInscription.addEventListener('click', handleInscription);
            btnAnnulerInscription.addEventListener('click', closeModalInscription);
            modalInscription.addEventListener('click', (e) => { if (e.target === modalInscription) closeModalInscription(); });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalInscription.classList.contains('active')) closeModalInscription();
            });
            [nomInput, telInput, emailInput, pwdInput, roleSelect].forEach(el => {
                el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleInscription(); });
            });

            // Connexion
            btnValiderConnexion.addEventListener('click', handleLogin);
            btnAnnulerConnexion.addEventListener('click', closeModalConnexion);
            modalConnexion.addEventListener('click', (e) => { if (e.target === modalConnexion) closeModalConnexion(); });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalConnexion.classList.contains('active')) closeModalConnexion();
            });
            [loginEmail, loginPassword].forEach(el => {
                el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
            });

            // Déconnexion
            btnLogout.addEventListener('click', logout);

            // --- Initialisation ---
            seedDefaultUsers();
            checkSession(); // Affiche le bon écran selon la session
        })();
    </script>

</body>
</html>
