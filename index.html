<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Machi – Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0a0d1a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* --- Cartes glass --- */
        .glass-card, #mainInterface {
            background: rgba(20, 25, 45, 0.6);
            backdrop-filter: blur(12px) saturate(160%);
            -webkit-backdrop-filter: blur(12px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
            padding: 1.5rem 1.2rem;
            width: 100%;
            max-width: 500px;
            transition: opacity 0.3s ease;
        }
        #mainInterface {
            display: none;
            max-width: 500px;
            min-height: 60vh;
            position: relative;
            padding-bottom: 5rem;
        }
        #mainInterface.active { display: block; }

        /* --- Boutons (plats, sans dégradé ni ombre) --- */
        .btn-led {
            background: #1e2a4a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: #d6eaff;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            text-align: center;
            display: inline-block;
        }
        .btn-led:hover { background: #2b3b66; color: #fff; }
        .btn-led:active { background: #16203a; }

        /* --- En-tête avec boutons --- */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .header-actions .btn-logout,
        .header-actions .btn-create {
            background: rgba(255,70,70,0.10);
            border: 1px solid rgba(255,70,70,0.15);
            border-radius: 40px;
            padding: 0.35rem 1.2rem;
            color: #ffb0b0;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .header-actions .btn-create {
            background: rgba(0,180,170,0.10);
            border-color: rgba(0,180,170,0.15);
            color: #a0f0e8;
        }
        .header-actions .btn-logout:hover { background: rgba(255,70,70,0.2); }
        .header-actions .btn-create:hover { background: rgba(0,180,170,0.2); }

        /* --- Modales --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: rgba(18,24,44,0.85);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            max-width: 420px;
            width: 90%;
        }
        .modal-content label {
            color: #b0c8e8;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 0.75rem;
            display: block;
        }
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 0.6rem 1rem;
            margin-top: 0.2rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: #e8f0ff;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.15s;
        }
        .modal-content input:focus { border-color: #4a8cff; }
        .modal-content input::placeholder { color: #6a7a9a; }

        .btn-validate { background: #00807a; border-color: #00a39a; color: #fff; }
        .btn-validate:hover { background: #00a39a; }
        .btn-cancel { background: rgba(255,70,70,0.12); border-color: rgba(255,70,70,0.2); color: #ffb0b0; }
        .btn-cancel:hover { background: rgba(255,70,70,0.22); }

        /* --- Liste des trajets (verticale, pleine largeur) --- */
        .courses-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }
        .course-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1.2rem;
            padding: 0.8rem 1rem;
            width: 100%;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }
        .course-card:hover { background: rgba(255,255,255,0.06); }

        /* --- Ligne d'info : trajet, heure, prix --- */
        .course-info {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.4rem 0.6rem;
            margin-bottom: 0.5rem;
        }
        .course-info .titre {
            font-weight: 600;
            font-size: 1rem;
            color: #d6eaff;
            flex: 1 1 auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .course-info .heure {
            font-size: 0.8rem;
            color: #8aa0c8;
            white-space: nowrap;
        }
        .course-info .prix {
            font-size: 0.8rem;
            color: #b0c8e8;
            white-space: nowrap;
            font-weight: 500;
        }

        /* --- Les 7 carreaux (pleine largeur) --- */
        .seat-grid {
            display: flex;
            justify-content: space-between;
            gap: 0.3rem;
            margin-top: 0.3rem;
            width: 100%;
        }
        .seat {
            flex: 1;
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.10);
            transition: background 0.2s;
            min-height: 28px;
        }
        .seat.driver {
            background: #00b8b0;
            border-color: #00d4cc;
            box-shadow: 0 0 10px rgba(0,200,180,0.2);
        }
        .seat.available {
            background: transparent;
            border-color: rgba(255,255,255,0.25);
        }
        .seat.disabled {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.05);
            opacity: 0.25;
        }

        /* --- Toast --- */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,180,170,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,255,200,0.15);
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            color: #c0fff0;
            font-weight: 500;
            display: none;
            z-index: 100;
            font-size: 0.9rem;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { display: block; }

        /* --- Accueil --- */
        #homeScreen .btn-led {
            flex: 1;
            text-align: center;
        }

        /* --- Responsive --- */
        @media (max-width: 480px) {
            body { padding: 0.5rem; }
            .glass-card, #mainInterface { padding: 1rem 0.8rem; border-radius: 1.5rem; }
            .modal-content { padding: 1.5rem 1rem; }
            .course-info .titre { font-size: 0.9rem; }
            .seat { min-height: 24px; border-radius: 6px; }
            .header-actions .btn-logout,
            .header-actions .btn-create { font-size: 0.7rem; padding: 0.25rem 0.9rem; }
        }
        @media (min-width: 600px) {
            #mainInterface, .glass-card { max-width: 550px; }
            .seat { min-height: 32px; }
        }
    </style>
</head>
<body>

    <!-- ÉCRAN D'ACCUEIL -->
    <div id="homeScreen" class="glass-card">
        <h1 class="text-3xl font-bold text-center text-cyan-200 mb-1">Machi</h1>
        <p class="text-center text-slate-400 text-sm mb-6 tracking-wider">⚡ mobilité en circuit fermé</p>
        <div class="flex flex-col sm:flex-row gap-3">
            <button id="btnInscription" class="btn-led">✨ S'inscrire</button>
            <button id="btnConnexion" class="btn-led">🔐 Se connecter</button>
        </div>
        <div class="mt-5 text-center text-xs text-slate-500">
            <span id="stats">👤 0 inscrits</span>
        </div>
    </div>

    <!-- INTERFACE PRINCIPALE -->
    <div id="mainInterface">
        <!-- En-tête avec boutons -->
        <div class="header-actions">
            <div class="text-slate-400 text-sm truncate" id="userRoleBadge">Rôle : —</div>
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                <button id="btnCreateCourse" class="btn-create" style="display:none;">➕ Créer</button>
                <button id="btnLogout" class="btn-logout">✕ Déconnexion</button>
            </div>
        </div>

        <h2 id="welcomeMessage" class="text-xl font-semibold text-cyan-200 mb-1">Bienvenue</h2>
        <hr class="border-white/5 my-3" />

        <div id="coursesContainer">
            <p class="text-slate-500 text-center text-sm" id="noCoursesMsg">Aucune course pour le moment.</p>
            <div id="coursesList" class="courses-list"></div>
        </div>
    </div>

    <!-- MODALE INSCRIPTION -->
    <div id="modalInscription" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-xl font-semibold text-center text-cyan-200 mb-4">Créer un compte</h2>
            <label>Je suis</label>
            <select id="role">
                <option value="passager">🚶 Passager</option>
                <option value="chauffeur">🚗 Chauffeur</option>
            </select>
            <label>Nom complet</label>
            <input type="text" id="nom" placeholder="ex: Karim Benali" />
            <label>Téléphone</label>
            <input type="tel" id="telephone" placeholder="0555 12 34 56" />
            <label>Email</label>
            <input type="email" id="email" placeholder="ex: farid@gmail.com" />
            <label>Mot de passe</label>
            <input type="password" id="motDePasse" placeholder="••••••••" />
            <div class="flex gap-3 mt-5">
                <button id="btnValiderInscription" class="btn-led btn-validate flex-1">✔ Valider</button>
                <button id="btnAnnulerInscription" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <!-- MODALE CONNEXION -->
    <div id="modalConnexion" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-xl font-semibold text-center text-cyan-200 mb-4">🔐 Se connecter</h2>
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="ex: farid@gmail.com" />
            <label>Mot de passe</label>
            <input type="password" id="loginPassword" placeholder="••••••••" />
            <div class="flex gap-3 mt-5">
                <button id="btnValiderConnexion" class="btn-led btn-validate flex-1">✔ Se connecter</button>
                <button id="btnAnnulerConnexion" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <!-- MODALE CRÉATION COURSE -->
    <div id="modalCreateCourse" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-xl font-semibold text-center text-cyan-200 mb-4">🚗 Nouvelle course</h2>
            <label>Départ</label>
            <input type="text" id="courseDepart" placeholder="ex: Tiaret" />
            <label>Arrivée</label>
            <input type="text" id="courseArrivee" placeholder="ex: Mahdia" />
            <label>Heure de départ</label>
            <input type="time" id="courseHeure" />
            <label>Prix (unités)</label>
            <input type="number" id="coursePrix" placeholder="ex: 12" min="1" />
            <label>Places (hors chauffeur)</label>
            <input type="number" id="coursePlaces" placeholder="ex: 3" min="1" max="6" />
            <div class="flex gap-3 mt-5">
                <button id="btnValiderCourse" class="btn-led btn-validate flex-1">✔ Confirmer</button>
                <button id="btnAnnulerCourse" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        (function() {
            "use strict";

            // --- DOM ---
            const homeScreen = document.getElementById('homeScreen');
            const mainInterface = document.getElementById('mainInterface');
            const welcomeMessage = document.getElementById('welcomeMessage');
            const userRoleBadge = document.getElementById('userRoleBadge');
            const stats = document.getElementById('stats');
            const coursesList = document.getElementById('coursesList');
            const noCoursesMsg = document.getElementById('noCoursesMsg');

            const btnInscription = document.getElementById('btnInscription');
            const btnConnexion = document.getElementById('btnConnexion');

            const modalInscription = document.getElementById('modalInscription');
            const btnValiderInscription = document.getElementById('btnValiderInscription');
            const btnAnnulerInscription = document.getElementById('btnAnnulerInscription');
            const roleSelect = document.getElementById('role');
            const nomInput = document.getElementById('nom');
            const telInput = document.getElementById('telephone');
            const emailInput = document.getElementById('email');
            const pwdInput = document.getElementById('motDePasse');

            const modalConnexion = document.getElementById('modalConnexion');
            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const btnValiderConnexion = document.getElementById('btnValiderConnexion');
            const btnAnnulerConnexion = document.getElementById('btnAnnulerConnexion');

            const btnLogout = document.getElementById('btnLogout');
            const btnCreateCourse = document.getElementById('btnCreateCourse');

            const modalCreateCourse = document.getElementById('modalCreateCourse');
            const courseDepart = document.getElementById('courseDepart');
            const courseArrivee = document.getElementById('courseArrivee');
            const courseHeure = document.getElementById('courseHeure');
            const coursePrix = document.getElementById('coursePrix');
            const coursePlaces = document.getElementById('coursePlaces');
            const btnValiderCourse = document.getElementById('btnValiderCourse');
            const btnAnnulerCourse = document.getElementById('btnAnnulerCourse');

            const toast = document.getElementById('toast');

            // --- Clés ---
            const STORAGE_KEY_CHAUFFEURS = 'chauffeurs';
            const STORAGE_KEY_PASSAGERS = 'passagers';
            const STORAGE_KEY_SESSION = 'machi_session';
            const STORAGE_KEY_COURSES = 'courses';

            // --- Stockage ---
            function getData(key) {
                try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
            }
            function setData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
            function getChauffeurs() { return getData(STORAGE_KEY_CHAUFFEURS); }
            function getPassagers() { return getData(STORAGE_KEY_PASSAGERS); }
            function saveChauffeurs(list) { setData(STORAGE_KEY_CHAUFFEURS, list); }
            function savePassagers(list) { setData(STORAGE_KEY_PASSAGERS, list); }
            function getCourses() { return getData(STORAGE_KEY_COURSES); }
            function saveCourses(list) { setData(STORAGE_KEY_COURSES, list); }

            function getSession() {
                try { return JSON.parse(localStorage.getItem(STORAGE_KEY_SESSION)); } catch { return null; }
            }
            function setSession(user) { localStorage.setItem(STORAGE_KEY_SESSION, JSON.stringify(user)); }
            function clearSession() { localStorage.removeItem(STORAGE_KEY_SESSION); }

            // --- Amorçage utilisateurs ---
            function seedDefaultUsers() {
                if (getChauffeurs().length === 0 && getPassagers().length === 0) {
                    savePassagers([{ nom: "Farid", telephone: "0000000021", email: "farid@gmail.com", motDePasse: "farid123" }]);
                    saveChauffeurs([{ nom: "Said", telephone: "1111111111111", email: "said@gmail.com", motDePasse: "said123" }]);
                }
            }

            // --- Mise à jour compteur ---
            function updateStats() {
                const nb = getChauffeurs().length + getPassagers().length;
                stats.textContent = `👤 ${nb} inscrit${nb > 1 ? 's' : ''}`;
            }

            // --- Toast ---
            function showToast(message, isError = false) {
                toast.textContent = message;
                toast.style.borderColor = isError ? 'rgba(255,100,100,0.2)' : 'rgba(0,255,200,0.15)';
                toast.style.color = isError ? '#ffb0b0' : '#c0fff0';
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
            }

            // --- Affichage ---
            function showHomeScreen() {
                homeScreen.style.display = 'block';
                mainInterface.classList.remove('active');
                mainInterface.style.display = 'none';
                updateStats();
            }

            function showMainInterface(user) {
                homeScreen.style.display = 'none';
                mainInterface.style.display = 'block';
                requestAnimationFrame(() => mainInterface.classList.add('active'));

                const roleFr = user.role === 'chauffeur' ? 'Chauffeur' : 'Passager';
                welcomeMessage.textContent = `👋 Bonjour ${user.nom}`;
                userRoleBadge.textContent = `Rôle : ${roleFr}`;

                if (user.role === 'chauffeur') {
                    btnCreateCourse.style.display = 'inline-block';
                } else {
                    btnCreateCourse.style.display = 'none';
                }

                renderCourses(user);
            }

            // --- Rendu des courses (liste verticale) ---
            function renderCourses(user) {
                const allCourses = getCourses();
                let coursesToShow = [];
                if (user.role === 'chauffeur') {
                    coursesToShow = allCourses.filter(c => c.chauffeurEmail === user.email);
                } else {
                    coursesToShow = allCourses;
                }

                coursesList.innerHTML = '';
                if (coursesToShow.length === 0) {
                    noCoursesMsg.style.display = 'block';
                    coursesList.style.display = 'none';
                    return;
                }
                noCoursesMsg.style.display = 'none';
                coursesList.style.display = 'flex';

                coursesToShow.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'course-card';

                    // --- Ligne d'info : trajet + heure + prix ---
                    const info = document.createElement('div');
                    info.className = 'course-info';

                    const titre = document.createElement('span');
                    titre.className = 'titre';
                    titre.textContent = `${c.depart} → ${c.arrivee}`;
                    info.appendChild(titre);

                    const heure = document.createElement('span');
                    heure.className = 'heure';
                    heure.textContent = `🕐 ${c.heure}`;
                    info.appendChild(heure);

                    const prix = document.createElement('span');
                    prix.className = 'prix';
                    prix.textContent = `💰 ${c.prix}`;
                    info.appendChild(prix);

                    card.appendChild(info);

                    // --- 7 carreaux ---
                    const seatGrid = document.createElement('div');
                    seatGrid.className = 'seat-grid';

                    const totalPlaces = c.places + 1;
                    const placesEffectives = Math.min(totalPlaces, 7);
                    const disabledCount = 7 - placesEffectives;

                    // Chauffeur (1er)
                    const driverSeat = document.createElement('div');
                    driverSeat.className = 'seat driver';
                    seatGrid.appendChild(driverSeat);

                    // Places disponibles
                    for (let i = 0; i < c.places; i++) {
                        const seat = document.createElement('div');
                        seat.className = 'seat available';
                        seatGrid.appendChild(seat);
                    }

                    // Désactivés
                    for (let i = 0; i < disabledCount; i++) {
                        const seat = document.createElement('div');
                        seat.className = 'seat disabled';
                        seatGrid.appendChild(seat);
                    }

                    card.appendChild(seatGrid);
                    coursesList.appendChild(card);
                });
            }

            // --- Connexion ---
            function handleLogin() {
                const email = loginEmail.value.trim();
                const password = loginPassword.value.trim();
                if (!email || !password) { showToast('⚠️ Remplissez tous les champs', true); return; }

                const chauffeurs = getChauffeurs();
                const passagers = getPassagers();
                let foundUser = null;

                for (let u of chauffeurs) {
                    if (u.email === email && u.motDePasse === password) {
                        foundUser = { ...u, role: 'chauffeur' };
                        break;
                    }
                }
                if (!foundUser) {
                    for (let u of passagers) {
                        if (u.email === email && u.motDePasse === password) {
                            foundUser = { ...u, role: 'passager' };
                            break;
                        }
                    }
                }
                if (!foundUser) { showToast('❌ Email ou mot de passe incorrect', true); return; }

                showToast(`✅ Bienvenue ${foundUser.nom}`);
                setSession(foundUser);
                closeModalConnexion();
                showMainInterface(foundUser);
            }

            function logout() {
                clearSession();
                showHomeScreen();
                showToast('🔓 Déconnecté');
            }

            // --- Inscription ---
            function handleInscription() {
                const role = roleSelect.value;
                const nom = nomInput.value.trim();
                const tel = telInput.value.trim();
                const email = emailInput.value.trim();
                const motDePasse = pwdInput.value.trim();
                if (!nom || !tel || !email || !motDePasse) {
                    showToast('⚠️ Tous les champs sont obligatoires', true);
                    return;
                }
                if (!/^\d[\d\s]{7,}$/.test(tel.replace(/\s/g, ''))) {
                    showToast('📞 Téléphone invalide (8+ chiffres)', true);
                    return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    showToast('✉️ Email invalide', true);
                    return;
                }
                if (motDePasse.length < 4) {
                    showToast('🔒 Mot de passe : au moins 4 caractères', true);
                    return;
                }
                const allUsers = [...getChauffeurs(), ...getPassagers()];
                if (allUsers.some(u => u.email === email)) {
                    showToast('❌ Cet email est déjà utilisé', true);
                    return;
                }

                const utilisateur = { nom, telephone: tel, email, motDePasse, dateInscription: new Date().toISOString() };
                if (role === 'chauffeur') {
                    const list = getChauffeurs();
                    list.push(utilisateur);
                    saveChauffeurs(list);
                    showToast(`🚗 Chauffeur « ${nom} » enregistré !`);
                } else {
                    const list = getPassagers();
                    list.push(utilisateur);
                    savePassagers(list);
                    showToast(`🚶 Passager « ${nom} » enregistré !`);
                }
                updateStats();
                closeModalInscription();
            }

            // --- Création course ---
            function handleCreateCourse() {
                const depart = courseDepart.value.trim();
                const arrivee = courseArrivee.value.trim();
                const heure = courseHeure.value;
                const prix = parseInt(coursePrix.value);
                const places = parseInt(coursePlaces.value);

                if (!depart || !arrivee || !heure || isNaN(prix) || isNaN(places)) {
                    showToast('⚠️ Tous les champs sont requis', true);
                    return;
                }
                if (prix < 1) { showToast('💰 Prix invalide', true); return; }
                if (places < 1 || places > 6) { showToast('👥 Places entre 1 et 6', true); return; }

                const session = getSession();
                if (!session) { showToast('❌ Vous devez être connecté', true); return; }

                const nouvelleCourse = {
                    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
                    chauffeurEmail: session.email,
                    depart,
                    arrivee,
                    heure,
                    prix,
                    places,
                    dateCreation: new Date().toISOString()
                };

                const courses = getCourses();
                courses.push(nouvelleCourse);
                saveCourses(courses);
                showToast(`✅ Course créée : ${depart} → ${arrivee}`);
                closeModalCreateCourse();
                renderCourses(session);
            }

            // --- Modales ---
            function openModalInscription() {
                modalInscription.classList.add('active');
                nomInput.value = ''; telInput.value = ''; emailInput.value = ''; pwdInput.value = '';
                roleSelect.value = 'passager';
                nomInput.focus();
            }
            function closeModalInscription() { modalInscription.classList.remove('active'); }

            function openModalConnexion() {
                modalConnexion.classList.add('active');
                loginEmail.value = ''; loginPassword.value = '';
                loginEmail.focus();
            }
            function closeModalConnexion() { modalConnexion.classList.remove('active'); }

            function openModalCreateCourse() {
                modalCreateCourse.classList.add('active');
                courseDepart.value = ''; courseArrivee.value = ''; courseHeure.value = ''; coursePrix.value = ''; coursePlaces.value = '';
                courseDepart.focus();
            }
            function closeModalCreateCourse() { modalCreateCourse.classList.remove('active'); }

            // --- Session au chargement ---
            function checkSession() {
                const session = getSession();
                if (session) {
                    const allUsers = [...getChauffeurs(), ...getPassagers()];
                    const exists = allUsers.some(u => u.email === session.email);
                    if (exists) {
                        showMainInterface(session);
                        return;
                    } else {
                        clearSession();
                    }
                }
                showHomeScreen();
            }

            // --- Événements ---
            btnInscription.addEventListener('click', openModalInscription);
            btnConnexion.addEventListener('click', openModalConnexion);

            btnValiderInscription.addEventListener('click', handleInscription);
            btnAnnulerInscription.addEventListener('click', closeModalInscription);
            modalInscription.addEventListener('click', (e) => { if (e.target === modalInscription) closeModalInscription(); });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalInscription.classList.contains('active')) closeModalInscription();
            });
            [nomInput, telInput, emailInput, pwdInput, roleSelect].forEach(el => {
                el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleInscription(); });
            });

            btnValiderConnexion.addEventListener('click', handleLogin);
            btnAnnulerConnexion.addEventListener('click', closeModalConnexion);
            modalConnexion.addEventListener('click', (e) => { if (e.target === modalConnexion) closeModalConnexion(); });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalConnexion.classList.contains('active')) closeModalConnexion();
            });
            [loginEmail, loginPassword].forEach(el => {
                el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
            });

            btnLogout.addEventListener('click', logout);

            btnCreateCourse.addEventListener('click', openModalCreateCourse);
            btnValiderCourse.addEventListener('click', handleCreateCourse);
            btnAnnulerCourse.addEventListener('click', closeModalCreateCourse);
            modalCreateCourse.addEventListener('click', (e) => { if (e.target === modalCreateCourse) closeModalCreateCourse(); });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalCreateCourse.classList.contains('active')) closeModalCreateCourse();
            });
            [courseDepart, courseArrivee, courseHeure, coursePrix, coursePlaces].forEach(el => {
                el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleCreateCourse(); });
            });

            // --- Lancement ---
            seedDefaultUsers();
            checkSession();
        })();
    </script>

</body>
</html>
