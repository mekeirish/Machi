<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Machi – Mobile</title>

    <!-- === STYLES (refactorisés, plus compacts) === -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
    <style>
        /* --- Variables --- */
        :root {
            --bg-dark: #0a0d1a;
            --glass-bg: rgba(20,25,45,0.6);
            --border-glass: rgba(255,255,255,0.08);
            --text-light: #d6eaff;
            --text-muted: #8aa0c8;
            --gold: #ffd700;
            --blue-light: #60c0f0;
            --green: #00b8b0;
            --purple: #b44cff;
            --radius: 1.5rem;
            --radius-sm: 0.8rem;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            min-height:100vh;
            background:var(--bg-dark);
            display:flex;
            align-items:center;
            justify-content:center;
            padding:0.5rem;
        }
        .glass-card, #mainInterface {
            background:var(--glass-bg);
            backdrop-filter:blur(12px) saturate(160%);
            border:1px solid var(--border-glass);
            border-radius:var(--radius);
            padding:1rem 0.6rem;
            width:100%;
            max-width:480px;
            transition:opacity 0.3s;
        }
        #mainInterface { display:none; min-height:60vh; padding-bottom:5rem; }
        #mainInterface.active { display:block; }

        /* --- Boutons --- */
        .btn-led {
            background:#1e2a4a;
            border:1px solid rgba(255,255,255,0.06);
            border-radius:60px;
            padding:0.4rem 1rem;
            font-weight:600;
            font-size:0.8rem;
            color:var(--text-light);
            cursor:pointer;
            transition:background 0.2s;
            text-align:center;
            display:inline-block;
        }
        .btn-led:hover { background:#2b3b66; color:#fff; }
        .btn-led:active { background:#16203a; }
        .btn-validate { background:#00807a; border-color:#00a39a; color:#fff; }
        .btn-validate:hover { background:#00a39a; }
        .btn-cancel { background:rgba(255,70,70,0.12); border-color:rgba(255,70,70,0.2); color:#ffb0b0; }
        .btn-cancel:hover { background:rgba(255,70,70,0.22); }

        .header-actions {
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:0.3rem;
            margin-bottom:0.6rem;
            flex-wrap:wrap;
        }
        .header-actions .btn-logout,
        .header-actions .btn-create {
            background:rgba(255,70,70,0.10);
            border:1px solid rgba(255,70,70,0.15);
            border-radius:40px;
            padding:0.15rem 0.6rem;
            color:#ffb0b0;
            font-size:0.65rem;
            cursor:pointer;
            transition:background 0.2s;
            display:inline-flex;
            align-items:center;
            gap:0.2rem;
        }
        .header-actions .btn-create {
            background:rgba(0,180,170,0.10);
            border-color:rgba(0,180,170,0.15);
            color:#a0f0e8;
        }
        .header-actions .btn-logout:hover { background:rgba(255,70,70,0.2); }
        .header-actions .btn-create:hover { background:rgba(0,180,170,0.2); }

        /* --- Modales --- */
        .modal-overlay {
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.6);
            backdrop-filter:blur(4px);
            z-index:50;
            align-items:center;
            justify-content:center;
        }
        .modal-overlay.active { display:flex; }
        .modal-content {
            background:rgba(18,24,44,0.85);
            backdrop-filter:blur(16px) saturate(180%);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:var(--radius);
            padding:1.2rem 0.8rem;
            max-width:420px;
            width:90%;
            max-height:90vh;
            overflow-y:auto;
        }
        .modal-content label {
            color:#b0c8e8;
            font-size:0.75rem;
            font-weight:500;
            margin-top:0.4rem;
            display:block;
        }
        .modal-content input,
        .modal-content select {
            width:100%;
            padding:0.3rem 0.7rem;
            margin-top:0.1rem;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:40px;
            color:#e8f0ff;
            font-size:0.85rem;
            outline:none;
            transition:border 0.15s;
        }
        .modal-content input:focus { border-color:#4a8cff; }
        .modal-content input::placeholder { color:#6a7a9a; }
        .modal-content input:disabled { opacity:0.5; cursor:not-allowed; }

        /* --- Liste des courses --- */
        .courses-list {
            display:flex;
            flex-direction:column;
            gap:0.6rem;
            margin-top:0.6rem;
        }
        .course-card {
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:var(--radius-sm);
            padding:0.4rem 0.6rem;
            width:100%;
            backdrop-filter:blur(4px);
            transition:background 0.2s;
        }
        .course-card:hover { background:rgba(255,255,255,0.06); }
        .course-info {
            display:flex;
            flex-wrap:wrap;
            align-items:baseline;
            gap:0.2rem 0.4rem;
            margin-bottom:0.2rem;
        }
        .course-info .titre {
            font-weight:600;
            font-size:0.8rem;
            color:var(--text-light);
            flex:1 1 auto;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .course-info .heure { font-size:0.65rem; color:var(--text-muted); }
        .course-info .temps-restant { font-size:0.65rem; color:var(--gold); }
        .course-info .places-restantes { font-size:0.65rem; color:var(--blue-light); }
        .course-info .prix { font-size:0.65rem; color:var(--gold); font-weight:500; }

        /* --- Rangée carreaux + image --- */
        .course-row {
            display:flex;
            flex-direction:row;
            gap:1rem;
            width:100%;
        }
        .seat-grid {
            display:grid;
            grid-template-columns:repeat(4,1fr);
            grid-template-rows:repeat(2,1fr);
            gap:0.15rem;
            flex:4;
            grid-auto-flow:column;
        }
        .seat {
            aspect-ratio:1/1;
            border-radius:4px;
            border:1.5px solid rgba(255,255,255,0.10);
            width:100%;
            cursor:default;
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            position:relative;
        }
        .seat.driver { background-color:var(--green); border-color:#00d4cc; box-shadow:0 0 6px rgba(0,200,180,0.2); }
        .seat.driver.has-profile { background-color:transparent; border-color:#00d4cc; }
        .seat.available { background:transparent; border-color:rgba(255,255,255,0.25); cursor:pointer; }
        .seat.available:hover { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.5); }
        .seat.reserved { background:var(--purple); border-color:var(--purple); box-shadow:0 0 6px rgba(180,76,255,0.3); cursor:pointer; }
        .seat.reserved:hover { filter:brightness(1.15); }
        .seat.disabled { background:rgba(255,255,255,0.015); border-color:rgba(255,255,255,0.02); opacity:0.15; cursor:default; }

        .car-photo {
            flex:3;
            border-radius:6px;
            overflow:hidden;
            background:rgba(255,255,255,0.03);
            border:1.5px solid rgba(255,255,255,0.06);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:1.6rem;
            color:#6a7a9a;
            cursor:default;
            position:relative;
            min-height:40px;
        }
        .car-photo img { width:100%; height:100%; object-fit:cover; display:block; }
        .car-photo.default { font-size:1.6rem; background:rgba(255,255,255,0.02); }
        @media (max-width:380px) {
            .car-photo { font-size:1.2rem; }
            .course-row { gap:0.6rem; }
            .seat-grid { gap:0.1rem; }
            .seat { border-width:1px; }
        }

        /* --- Admin --- */
        .admin-panel { margin-top:0.6rem; }
        .admin-panel .btn-admin {
            background:#1e2a4a;
            border:1px solid rgba(255,255,255,0.06);
            border-radius:60px;
            padding:0.4rem 1rem;
            color:var(--text-light);
            cursor:pointer;
            transition:background 0.2s;
            width:100%;
            text-align:center;
            font-weight:600;
            margin-bottom:0.3rem;
            font-size:0.85rem;
        }
        .admin-panel .btn-admin:hover { background:#2b3b66; }
        .admin-panel .btn-admin.active { background:#2b3b66; border-color:#4a8cff; }
        .admin-list {
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:0.6rem;
            padding:0.4rem;
            margin-top:0.3rem;
            max-height:150px;
            overflow-y:auto;
        }
        .admin-list .item {
            display:flex;
            justify-content:space-between;
            padding:0.2rem 0;
            border-bottom:1px solid rgba(255,255,255,0.04);
            font-size:0.75rem;
            color:#b0c8e8;
            cursor:pointer;
            transition:background 0.2s;
        }
        .admin-list .item:hover { background:rgba(255,255,255,0.05); }
        .admin-list .item:last-child { border-bottom:none; }
        .admin-list .item .email { color:var(--text-muted); font-size:0.65rem; }

        /* --- Cropper --- */
        .crop-container { width:100%; margin:0.3rem 0; display:none; min-height:150px; }
        .crop-container img { max-width:100%; display:block; }

        /* --- Tooltip --- */
        .tooltip-reservation {
            position:fixed;
            background:rgba(18,24,44,0.95);
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:1rem;
            padding:0.4rem 0.6rem;
            color:#e8f0ff;
            font-size:0.75rem;
            display:none;
            z-index:60;
            box-shadow:0 10px 30px rgba(0,0,0,0.6);
            min-width:120px;
            align-items:center;
            gap:0.4rem;
            pointer-events:auto;
        }
        .tooltip-reservation .nom { flex:1; }
        .tooltip-reservation .btn-supprimer {
            background:rgba(255,70,70,0.2);
            border:none;
            border-radius:50%;
            width:20px; height:20px;
            color:#ffb0b0;
            font-size:0.75rem;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            transition:background 0.2s;
        }
        .tooltip-reservation .btn-supprimer:hover { background:rgba(255,70,70,0.4); }

        /* --- Toast --- */
        .toast {
            position:fixed;
            bottom:1.5rem;
            left:50%;
            transform:translateX(-50%);
            background:rgba(0,180,170,0.15);
            backdrop-filter:blur(8px);
            border:1px solid rgba(0,255,200,0.15);
            padding:0.4rem 1.2rem;
            border-radius:60px;
            color:#c0fff0;
            font-weight:500;
            display:none;
            z-index:100;
            font-size:0.8rem;
            max-width:90%;
            text-align:center;
        }
        .toast.show { display:block; }

        /* --- Utilitaires --- */
        #homeScreen .btn-led { flex:1; text-align:center; }
        .spinner {
            display:inline-block;
            width:0.8rem;
            height:0.8rem;
            border:2px solid rgba(255,255,255,0.1);
            border-top-color:#00b8b0;
            border-radius:50%;
            animation:spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        @media (max-width:480px) {
            body { padding:0.3rem; }
            .glass-card, #mainInterface { padding:0.6rem 0.4rem; border-radius:1rem; }
            .modal-content { padding:1rem 0.6rem; }
            .course-info .titre { font-size:0.75rem; }
            .header-actions .btn-logout,
            .header-actions .btn-create { font-size:0.6rem; padding:0.15rem 0.5rem; }
        }
    </style>
</head>
<body>

    <!-- ==================== ÉCRAN D'ACCUEIL ==================== -->
    <div id="homeScreen" class="glass-card">
        <h1 class="text-xl font-bold text-center text-cyan-200 mb-0.5">Machi</h1>
        <p class="text-center text-slate-400 text-xs mb-4 tracking-wider">⚡ mobilité en circuit fermé</p>
        <div class="flex flex-col sm:flex-row gap-2">
            <button id="btnInscription" class="btn-led">✨ S'inscrire</button>
            <button id="btnConnexion" class="btn-led">🔐 Se connecter</button>
        </div>
        <div class="mt-3 text-center text-xs text-slate-500"><span id="stats">👤 0 inscrits</span></div>
    </div>

    <!-- ==================== INTERFACE PRINCIPALE ==================== -->
    <div id="mainInterface">
        <div class="header-actions">
            <span class="text-slate-400 text-xs truncate" id="userRoleBadge">Rôle : —</span>
            <div style="display:flex; gap:0.3rem; flex-wrap:wrap;">
                <button id="btnCreateCourse" class="btn-create" style="display:none;">➕ Créer</button>
                <button id="btnLogout" class="btn-logout">✕ Déconnexion</button>
            </div>
        </div>
        <h2 id="welcomeMessage" class="text-base font-semibold text-cyan-200 mb-0.5">Bienvenue</h2>
        <hr class="border-white/5 my-1.5" />
        <div id="mainContent">
            <div id="coursesContainer">
                <p class="text-slate-500 text-center text-xs" id="noCoursesMsg">Aucune course pour le moment.</p>
                <div id="coursesList" class="courses-list"></div>
            </div>
            <div id="adminPanel" class="admin-panel" style="display:none;">
                <button id="btnAdminChauffeurs" class="btn-admin">🚗 Chauffeurs</button>
                <div id="adminChauffeursList" class="admin-list" style="display:none;"></div>
                <button id="btnAdminPassagers" class="btn-admin">🚶 Passagers</button>
                <div id="adminPassagersList" class="admin-list" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- ==================== MODALE ADMIN ÉDITION ==================== -->
    <div id="modalAdminEdit" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">✏️ Modifier l'utilisateur</h2>
            <div id="adminEditUserInfo" class="text-xs text-slate-400 mb-2">Chargement...</div>
            <label>Nom</label><input type="text" id="adminEditNom" placeholder="Nom" />
            <label>Téléphone</label><input type="tel" id="adminEditTelephone" placeholder="0555 12 34 56" />
            <label>Email (non modifiable)</label><input type="email" id="adminEditEmail" disabled />
            <label>Rôle</label><input type="text" id="adminEditRole" disabled />
            <div class="mt-3 border-t border-white/5 pt-2">
                <p class="text-xs text-cyan-200 font-medium mb-1">📸 Photos</p>
                <label class="text-xs">Photo de la voiture (3:2)</label>
                <input type="file" id="adminEditCarPhotoInput" accept="image/*" />
                <div id="adminEditCarCropContainer" class="crop-container">
                    <img id="adminEditCarCropImage" src="#" alt="Rogner" />
                </div>
                <label class="text-xs mt-2">Photo de profil (1:1)</label>
                <input type="file" id="adminEditProfilePhotoInput" accept="image/*" />
                <div id="adminEditProfileCropContainer" class="crop-container">
                    <img id="adminEditProfileCropImage" src="#" alt="Rogner" />
                </div>
            </div>
            <div class="flex gap-2 mt-4">
                <button id="btnAdminEditSave" class="btn-led btn-validate flex-1">💾 Enregistrer</button>
                <button id="btnAdminEditCancel" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <!-- ==================== TOOLTIP ==================== -->
    <div id="tooltipReservation" class="tooltip-reservation">
        <span class="nom">Passager</span>
        <button class="btn-supprimer" id="btnSupprimerResa">✕</button>
    </div>

    <!-- ==================== MODALES AUTH & COURSES ==================== -->
    <div id="modalInscription" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">Créer un compte</h2>
            <label>Je suis</label>
            <select id="role"><option value="passager">🚶 Passager</option><option value="chauffeur">🚗 Chauffeur</option></select>
            <label>Nom complet</label><input type="text" id="nom" placeholder="ex: Karim Benali" />
            <label>Téléphone</label><input type="tel" id="telephone" placeholder="0555 12 34 56" />
            <label>Email</label><input type="email" id="email" placeholder="ex: farid@gmail.com" />
            <label>Mot de passe</label><input type="password" id="motDePasse" placeholder="••••••••" />
            <div class="flex gap-2 mt-3">
                <button id="btnValiderInscription" class="btn-led btn-validate flex-1">✔ Valider</button>
                <button id="btnAnnulerInscription" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="modalConnexion" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">🔐 Se connecter</h2>
            <label>Email</label><input type="email" id="loginEmail" placeholder="ex: farid@gmail.com" />
            <label>Mot de passe</label><input type="password" id="loginPassword" placeholder="••••••••" />
            <div class="flex gap-2 mt-3">
                <button id="btnValiderConnexion" class="btn-led btn-validate flex-1">✔ Se connecter</button>
                <button id="btnAnnulerConnexion" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="modalCreateCourse" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">🚗 Nouvelle course</h2>
            <label>Départ</label><input type="text" id="courseDepart" placeholder="ex: Tiaret" />
            <label>Arrivée</label><input type="text" id="courseArrivee" placeholder="ex: Mahdia" />
            <label>Heure de départ</label><input type="time" id="courseHeure" />
            <label>Prix (unités)</label><input type="number" id="coursePrix" placeholder="ex: 12" min="1" />
            <label>Places (hors chauffeur, max 7)</label><input type="number" id="coursePlaces" placeholder="ex: 3" min="1" max="7" />
            <div class="flex gap-2 mt-3">
                <button id="btnValiderCourse" class="btn-led btn-validate flex-1">✔ Confirmer</button>
                <button id="btnAnnulerCourse" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- ============================================================== -->
    <!-- ==================== JAVASCRIPT (refactorisé) ================== -->
    <!-- ============================================================== -->
    <script>
        (function() {
            "use strict";

            // ----------------------------
            // 1. FIREBASE INIT
            // ----------------------------
            const firebaseConfig = {
                apiKey: "AIzaSyACgeZXog1KZGU29HpjM4qpKTBt54KbJFg",
                authDomain: "machi-51024.firebaseapp.com",
                projectId: "machi-51024",
                storageBucket: "machi-51024.firebasestorage.app",
                messagingSenderId: "984764801380",
                appId: "1:984764801380:web:c082a0988bba3f899fda71",
                measurementId: "G-EDZXP8QF9Q"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            db.enablePersistence().catch(() => {});

            // ----------------------------
            // 2. DOM REFERENCES (regroupées)
            // ----------------------------
            const $ = id => document.getElementById(id);
            const DOM = {
                // Home
                homeScreen: $('homeScreen'),
                stats: $('stats'),
                btnInscription: $('btnInscription'),
                btnConnexion: $('btnConnexion'),
                // Main
                mainInterface: $('mainInterface'),
                userRoleBadge: $('userRoleBadge'),
                welcomeMessage: $('welcomeMessage'),
                btnLogout: $('btnLogout'),
                btnCreateCourse: $('btnCreateCourse'),
                coursesContainer: $('coursesContainer'),
                coursesList: $('coursesList'),
                noCoursesMsg: $('noCoursesMsg'),
                // Admin
                adminPanel: $('adminPanel'),
                btnAdminChauffeurs: $('btnAdminChauffeurs'),
                btnAdminPassagers: $('btnAdminPassagers'),
                adminChauffeursList: $('adminChauffeursList'),
                adminPassagersList: $('adminPassagersList'),
                // Modales
                modalInscription: $('modalInscription'),
                btnValiderInscription: $('btnValiderInscription'),
                btnAnnulerInscription: $('btnAnnulerInscription'),
                role: $('role'),
                nom: $('nom'),
                telephone: $('telephone'),
                email: $('email'),
                motDePasse: $('motDePasse'),
                modalConnexion: $('modalConnexion'),
                loginEmail: $('loginEmail'),
                loginPassword: $('loginPassword'),
                btnValiderConnexion: $('btnValiderConnexion'),
                btnAnnulerConnexion: $('btnAnnulerConnexion'),
                modalCreateCourse: $('modalCreateCourse'),
                courseDepart: $('courseDepart'),
                courseArrivee: $('courseArrivee'),
                courseHeure: $('courseHeure'),
                coursePrix: $('coursePrix'),
                coursePlaces: $('coursePlaces'),
                btnValiderCourse: $('btnValiderCourse'),
                btnAnnulerCourse: $('btnAnnulerCourse'),
                // Admin edit
                modalAdminEdit: $('modalAdminEdit'),
                adminEditUserInfo: $('adminEditUserInfo'),
                adminEditNom: $('adminEditNom'),
                adminEditTelephone: $('adminEditTelephone'),
                adminEditEmail: $('adminEditEmail'),
                adminEditRole: $('adminEditRole'),
                adminEditCarPhotoInput: $('adminEditCarPhotoInput'),
                adminEditCarCropContainer: $('adminEditCarCropContainer'),
                adminEditCarCropImage: $('adminEditCarCropImage'),
                adminEditProfilePhotoInput: $('adminEditProfilePhotoInput'),
                adminEditProfileCropContainer: $('adminEditProfileCropContainer'),
                adminEditProfileCropImage: $('adminEditProfileCropImage'),
                btnAdminEditSave: $('btnAdminEditSave'),
                btnAdminEditCancel: $('btnAdminEditCancel'),
                // Tooltip
                tooltip: $('tooltipReservation'),
                btnSupprimerResa: $('btnSupprimerResa'),
                toast: $('toast'),
            };

            // ----------------------------
            // 3. STATE
            // ----------------------------
            let currentUser = null;
            let adminEditTargetEmail = null;
            let adminEditCarCropper = null;
            let adminEditProfileCropper = null;
            let tooltipCourseId = null;
            let tooltipPlaceIndex = null;

            // ----------------------------
            // 4. UTILITY FUNCTIONS
            // ----------------------------
            function showToast(msg, isError = false) {
                const t = DOM.toast;
                t.textContent = msg;
                t.style.borderColor = isError ? 'rgba(255,100,100,0.2)' : 'rgba(0,255,200,0.15)';
                t.style.color = isError ? '#ffb0b0' : '#c0fff0';
                t.classList.add('show');
                clearTimeout(t._timer);
                t._timer = setTimeout(() => t.classList.remove('show'), 3000);
            }

            function showLoader(btn) { btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>'; }

            function hideLoader(btn, txt) { btn.disabled = false;
                btn.textContent = txt; }

            function isOnline() { return navigator.onLine; }

            function closeModal(id) { if (id) id.classList.remove('active'); }

            function openModal(id) { if (id) id.classList.add('active'); }

            // ----------------------------
            // 5. FIRESTORE HELPERS
            // ----------------------------
            async function fsGet(collection, docId = null) {
                if (!isOnline()) throw new Error('Hors ligne');
                const ref = docId ? db.collection(collection).doc(docId) : db.collection(collection);
                return await ref.get();
            }

            async function fsSet(collection, docId, data) {
                if (!isOnline()) throw new Error('Hors ligne');
                await db.collection(collection).doc(docId).set(data, { merge: true });
            }

            async function fsAdd(collection, data) {
                if (!isOnline()) throw new Error('Hors ligne');
                const ref = await db.collection(collection).add(data);
                return ref.id;
            }

            async function fsUpdate(collection, docId, data) {
                if (!isOnline()) throw new Error('Hors ligne');
                await db.collection(collection).doc(docId).update(data);
            }

            async function fsDelete(collection, docId) {
                if (!isOnline()) throw new Error('Hors ligne');
                await db.collection(collection).doc(docId).delete();
            }

            async function fetchUsers() {
                try { const snap = await fsGet('users'); const users = [];
                    snap.forEach(d => users.push({ id: d.id, ...d.data() })); return users; } catch { return []; }
            }

            async function fetchRides() {
                try { const snap = await fsGet('rides'); const rides = [];
                    snap.forEach(d => rides.push({ id: d.id, ...d.data() })); return rides; } catch { return []; }
            }

            // ----------------------------
            // 7. RENDU DES COURSES
            // ----------------------------
            async function renderCourses(user) {
                try {
                    const allRides = await fetchRides();
                    const allUsers = await fetchUsers();
                    const userMap = {};
                    allUsers.forEach(u => { userMap[u.email] = u; });

                    let ridesToShow = user.role === 'chauffeur' ?
                        allRides.filter(r => r.chauffeurEmail === user.email) :
                        allRides;

                    // Vérifier si le chauffeur a un trajet actif (heure > maintenant)
                    let hasActiveRide = false;
                    if (user.role === 'chauffeur') {
                        const now = new Date();
                        const nowMin = now.getHours() * 60 + now.getMinutes();
                        for (let r of ridesToShow) {
                            if (r.heure) {
                                const [h, m] = r.heure.split(':').map(Number);
                                if (h * 60 + m > nowMin) { hasActiveRide = true; break; }
                            }
                        }
                    }
                    DOM.btnCreateCourse.style.display = (user.role === 'chauffeur' && hasActiveRide) ? 'none' : (user.role ===
                        'chauffeur' ? 'inline-block' : 'none');

                    DOM.coursesList.innerHTML = '';
                    if (ridesToShow.length === 0) {
                        DOM.noCoursesMsg.style.display = 'block';
                        DOM.coursesList.style.display = 'none';
                        return;
                    }
                    DOM.noCoursesMsg.style.display = 'none';
                    DOM.coursesList.style.display = 'flex';

                    const now = new Date();
                    const nowMin = now.getHours() * 60 + now.getMinutes();

                    ridesToShow.forEach(course => {
                        const cData = userMap[course.chauffeurEmail] || {};
                        const carPhotoURL = cData.photoURL || null;
                        const profilePhotoURL = cData.profilePhotoURL || null;
                        const reservations = course.reservations || [];

                        // Temps restant
                        let tempsRestant = '';
                        if (course.heure) {
                            const [h, m] = course.heure.split(':').map(Number);
                            const diff = h * 60 + m - nowMin;
                            if (diff > 0) {
                                tempsRestant = diff < 60 ? ` (dans ${diff} min)` :
                                    ` (dans ${Math.floor(diff/60)}h${diff%60>0?diff%60+'min':''})`;
                            } else if (diff === 0) tempsRestant = ' (maintenant)';
                            else tempsRestant = ' (passé)';
                        }

                        // Places restantes
                        const reservedCount = reservations.length;
                        const available = Math.max(0, course.places - reservedCount);
                        const placesRestantes = ` (${available} place${available>1?'s':''} restante${available>1?'s':''})`;

                        // Carte
                        const card = document.createElement('div');
                        card.className = 'course-card';
                        card.dataset.courseId = course.id;

                        // Info
                        const info = document.createElement('div');
                        info.className = 'course-info';
                        const titre = document.createElement('span');
                        titre.className = 'titre';
                        titre.textContent = `${course.depart} → ${course.arrivee}`;
                        info.appendChild(titre);

                        const heureSpan = document.createElement('span');
                        heureSpan.className = 'heure';
                        heureSpan.textContent = `🕐 ${course.heure}`;
                        info.appendChild(heureSpan);

                        if (tempsRestant) {
                            const tr = document.createElement('span');
                            tr.className = 'temps-restant';
                            tr.textContent = tempsRestant;
                            info.appendChild(tr);
                        }

                        const pr = document.createElement('span');
                        pr.className = 'places-restantes';
                        pr.textContent = placesRestantes;
                        info.appendChild(pr);

                        const prixSpan = document.createElement('span');
                        prixSpan.className = 'prix';
                        prixSpan.textContent = `🪙 ${course.prix}`;
                        info.appendChild(prixSpan);

                        card.appendChild(info);

                        // Ligne des places
                        const row = document.createElement('div');
                        row.className = 'course-row';

                        const grid = document.createElement('div');
                        grid.className = 'seat-grid';

                        const totalSeats = 8;
                        const placesEffectives = Math.min(course.places + 1, totalSeats);
                        const status = [];
                        status[0] = 'driver';
                        for (let i = 1; i < placesEffectives; i++) {
                            const resa = reservations.find(r => r.placeIndex === i);
                            status[i] = resa ? { type: 'reserved', email: resa.email, nom: resa.nom } : { type: 'available' };
                        }
                        for (let i = placesEffectives; i < totalSeats; i++) { status[i] = { type: 'disabled' }; }

                        const order = [0, 1, 2, 3, 4, 5, 6, 7];
                        for (let idx of order) {
                            const seat = document.createElement('div');
                            seat.className = 'seat';
                            seat.dataset.placeIndex = idx;
                            seat.dataset.courseId = course.id;
                            const s = status[idx];

                            if (idx === 0 && profilePhotoURL) {
                                seat.classList.add('driver', 'has-profile');
                                seat.style.backgroundImage = `url(${profilePhotoURL})`;
                                seat.style.backgroundColor = 'rgba(0,0,0,0.3)';
                                seat.dataset.status = 'driver';
                            } else if (typeof s === 'string') {
                                if (s === 'driver') { seat.classList.add('driver');
                                    seat.dataset.status = 'driver'; } else if (s === 'disabled') { seat.classList.add('disabled');
                                    seat.dataset.status = 'disabled'; }
                            } else if (s.type === 'available') {
                                seat.classList.add('available');
                                seat.dataset.status = 'available';
                            } else if (s.type === 'reserved') {
                                seat.classList.add('reserved');
                                seat.dataset.status = 'reserved';
                                seat.dataset.reservedEmail = s.email;
                                seat.dataset.reservedNom = s.nom;
                            }
                            grid.appendChild(seat);
                        }
                        row.appendChild(grid);

                        // Image voiture + long-press
                        const photo = document.createElement('div');
                        photo.className = 'car-photo' + (carPhotoURL ? '' : ' default');
                        photo.dataset.courseId = course.id;
                        if (carPhotoURL) {
                            const img = document.createElement('img');
                            img.src = carPhotoURL;
                            img.alt = 'Voiture';
                            photo.appendChild(img);
                        } else {
                            photo.textContent = '🚗';
                        }

                        // Long-press
                        let timer = null;
                        const start = () => { timer = setTimeout(() => handleLongPress(course.id), 600); };
                        const cancel = () => { if (timer) { clearTimeout(timer);
                                timer = null; } };
                        photo.addEventListener('mousedown', start);
                        photo.addEventListener('mouseup', cancel);
                        photo.addEventListener('mouseleave', cancel);
                        photo.addEventListener('touchstart', start, { passive: true });
                        photo.addEventListener('touchend', cancel, { passive: true });
                        photo.addEventListener('touchmove', cancel, { passive: true });
                        photo.addEventListener('contextmenu', e => e.preventDefault());

                        row.appendChild(photo);
                        card.appendChild(row);
                        DOM.coursesList.appendChild(card);
                    });
                } catch (e) {
                    showToast('❌ Erreur chargement des courses', true);
                    console.error(e);
                }
            }

            }

            async function handleSeatClick(e) {
                const seat = e.target.closest('.seat');
                if (!seat) return;
                const status = seat.dataset.status,
                    courseId = seat.dataset.courseId,
                    idx = parseInt(seat.dataset.placeIndex);
                if (!currentUser || currentUser.role === 'admin') return;

                if (currentUser.role === 'chauffeur') {
                    if (status === 'reserved') {
                        const nom = seat.dataset.reservedNom;
                        if (nom) {
                            tooltipCourseId = courseId;
                            tooltipPlaceIndex = idx;
                            const rect = seat.getBoundingClientRect();
                            DOM.tooltip.style.left = (rect.left + rect.width / 2 - 75) + 'px';
                            DOM.tooltip.style.top = (rect.top - 10) + 'px';
                            DOM.tooltip.style.display = 'flex';
                            DOM.tooltip.querySelector('.nom').textContent = `👤 ${nom}`;
                        } else { DOM.tooltip.style.display = 'none'; }
                    } else { DOM.tooltip.style.display = 'none'; }
                } else if (currentUser.role === 'passager') {
                    if (status === 'available') {
                        try {
                            const rides = await fetchRides();
                            const course = rides.find(r => r.id === courseId);
                            if (!course) return;
                            const reservations = course.reservations || [];
                            if (reservations.some(r => r.email === currentUser.email)) {
                                showToast('❌ Vous avez déjà réservé une place dans ce trajet', true);
                                return;
                            }
                            reservations.push({ email: currentUser.email, nom: currentUser.nom, placeIndex: idx });
                            await fsUpdate('rides', courseId, { reservations });
                            showToast(`✅ Place réservée pour ${currentUser.nom}`);
                            renderCourses(currentUser);
                        } catch (e) { showToast('❌ Erreur réservation', true);
                            console.error(e); }
                    } else if (status === 'reserved') {
                        const reservedEmail = seat.dataset.reservedEmail;
                        if (reservedEmail === currentUser.email) {
                            try {
                                const rides = await fetchRides();
                                const course = rides.find(r => r.id === courseId);
                                if (!course) return;
                                const reservations = course.reservations || [];
                                const i = reservations.findIndex(r => r.placeIndex === idx && r.email === currentUser.email);
                                if (i !== -1) {
                                    reservations.splice(i, 1);
                                    await fsUpdate('rides', courseId, { reservations });
                                    showToast('🗑️ Réservation annulée');
                                    renderCourses(currentUser);
                                }
                            } catch (e) { showToast('❌ Erreur annulation', true);
                                console.error(e); }
                        } else {
                            showToast('ℹ️ Cette place est réservée par un autre passager', false);
                        }
                    }
                }
            }

            async function handleInscription() {
                const role = DOM.role.value,
                    nom = DOM.nom.value.trim(),
                    tel = DOM.telephone.value.trim(),
                    email = DOM.email.value.trim(),
                    pass = DOM.motDePasse.value.trim();
                if (!nom || !tel || !email || !pass) { showToast('⚠️ Tous les champs sont obligatoires', true); return; }
                if (!/^\d[\d\s]{7,}$/.test(tel.replace(/\s/g, ''))) { showToast('📞 Téléphone invalide', true); return; }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('✉️ Email invalide', true); return; }
                if (pass.length < 4) { showToast('🔒 Mot de passe : min 4 caractères', true); return; }
                if (!isOnline()) { showToast('📡 Pas de connexion Internet.', true); return; }

                const btn = DOM.btnValiderInscription,
                    orig = btn.textContent;
                showLoader(btn);
                try {
                    await auth.createUserWithEmailAndPassword(email, pass);
                    await fsSet('users', email, { nom, telephone: tel, email, role, dateInscription: new Date().toISOString() });
                    showToast(`✅ Compte ${role} « ${nom} » créé !`);
                    closeModal(DOM.modalInscription);
                } catch (e) {
                    let msg = e.message;
                    if (e.code === 'auth/email-already-in-use') msg = 'Cet email est déjà utilisé.';
                    else if (e.code === 'auth/weak-password') msg = 'Mot de passe trop faible (min 6 caractères).';
                    else if (e.message.includes('network')) msg = 'Problème de connexion réseau.';
                    showToast(`❌ ${msg}`, true);
                    console.error(e);
                }
                hideLoader(btn, orig);
            }

            }

            async function handleCreateCourse() {
                const depart = DOM.courseDepart.value.trim(),
                    arrivee = DOM.courseArrivee.value.trim(),
                    heure = DOM.courseHeure.value,
                    prix = parseInt(DOM.coursePrix.value),
                    places = parseInt(DOM.coursePlaces.value);
                if (!depart || !arrivee || !heure || isNaN(prix) || isNaN(places)) {
                    showToast('⚠️ Tous les champs sont requis', true);
                    return;
                }
                if (prix < 1) { showToast('💰 Prix invalide', true); return; }
                if (places < 1 || places > 7) { showToast('👥 Places entre 1 et 7', true); return; }
                if (!currentUser) { showToast('❌ Vous devez être connecté', true); return; }
                if (!isOnline()) { showToast('📡 Pas de connexion Internet.', true); return; }

                const btn = DOM.btnValiderCourse,
                    orig = btn.textContent;
                showLoader(btn);
                try {
                    await fsAdd('rides', {
                        chauffeurEmail: currentUser.email,
                        depart,
                        arrivee,
                        heure,
                        prix,
                        places,
                        reservations: [],
                        dateCreation: new Date().toISOString()
                    });
                    showToast(`✅ Course créée : ${depart} → ${arrivee}`);
                    closeModal(DOM.modalCreateCourse);
                    renderCourses(currentUser);
                } catch (e) { showToast('❌ Erreur création', true);
                    console.error(e); }
                hideLoader(btn, orig);
            }

            // ----------------------------
            // 12. SESSION (onAuthStateChanged)
            // ----------------------------
            auth.onAuthStateChanged(async (fbUser) => {
                if (fbUser) {
                    try {
                        const doc = await fsGet('users', fbUser.email);
                        if (doc.exists) {
                            const data = doc.data();
                            currentUser = { ...data, email: fbUser.email };
                            showMainInterface(currentUser);
                        } else {
                            await auth.signOut();
                            currentUser = null;
                            showHomeScreen();
                            showToast('❌ Utilisateur introuvable dans la base', true);
                        }
                    } catch (e) {
                        console.error('Erreur récupération utilisateur:', e);
                        currentUser = { email: fbUser.email, nom: fbUser.displayName || 'Utilisateur', role: 'passager' };
                        showMainInterface(currentUser);
                        showToast('📡 Profil minimal (hors ligne)', false);
                    }
                } else {
                    currentUser = null;
                    showHomeScreen();
                }
            });

            // ----------------------------
            // 13. ÉVÉNEMENTS
            // ----------------------------
            // Inscription
            DOM.btnInscription.addEventListener('click', () => { openModal(DOM.modalInscription);
                DOM.nom.focus(); });
            DOM.btnAnnulerInscription.addEventListener('click', () => closeModal(DOM.modalInscription));
            DOM.modalInscription.addEventListener('click', (e) => { if (e.target === DOM.modalInscription) closeModal(DOM
                    .modalInscription); });
            [DOM.nom, DOM.telephone, DOM.email, DOM.motDePasse, DOM.role].forEach(el => {
                el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleInscription(); });
            });
            DOM.btnValiderInscription.addEventListener('click', handleInscription);

            // Connexion
            DOM.btnConnexion.addEventListener('click', () => { openModal(DOM.modalConnexion);
                DOM.loginEmail.focus(); });
            DOM.btnAnnulerConnexion.addEventListener('click', () => closeModal(DOM.modalConnexion));
            DOM.modalConnexion.addEventListener('click', (e) => { if (e.target === DOM.modalConnexion) closeModal(DOM
                    .modalConnexion); });
            [DOM.loginEmail, DOM.loginPassword].forEach(el => {
                el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
            });
            DOM.btnValiderConnexion.addEventListener('click', handleLogin);

            // Déconnexion
            DOM.btnLogout.addEventListener('click', logout);

            // Créer course
            DOM.btnCreateCourse.addEventListener('click', () => {
                openModal(DOM.modalCreateCourse);
                DOM.courseDepart.focus();
            });
            DOM.btnAnnulerCourse.addEventListener('click', () => closeModal(DOM.modalCreateCourse));
            DOM.modalCreateCourse.addEventListener('click', (e) => { if (e.target === DOM.modalCreateCourse) closeModal(DOM
                    .modalCreateCourse); });
            [DOM.courseDepart, DOM.courseArrivee, DOM.courseHeure, DOM.coursePrix, DOM.coursePlaces].forEach(el => {
                el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleCreateCourse(); });
            });
            DOM.btnValiderCourse.addEventListener('click', handleCreateCourse);

            // Admin edit
            DOM.btnAdminEditSave.addEventListener('click', saveAdminEdit);
            DOM.btnAdminEditCancel.addEventListener('click', () => closeModal(DOM.modalAdminEdit));
            DOM.modalAdminEdit.addEventListener('click', (e) => { if (e.target === DOM.modalAdminEdit) closeModal(DOM
                    .modalAdminEdit); });

            // Clics sur places
            DOM.coursesList.addEventListener('click', handleSeatClick);
            DOM.btnSupprimerResa.addEventListener('click', handleSupprimerResa);

            // Admin toggles
            DOM.btnAdminChauffeurs.addEventListener('click', () => {
                renderAdminLists();
                const el = DOM.adminChauffeursList;
                el.style.display = el.style.display === 'block' ? 'none' : 'block';
                DOM.adminPassagersList.style.display = 'none';
            });
            DOM.btnAdminPassagers.addEventListener('click', () => {
                renderAdminLists();
                const el = DOM.adminPassagersList;
                el.style.display = el.style.display === 'block' ? 'none' : 'block';
                DOM.adminChauffeursList.style.display = 'none';
            });

            // Échap
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (DOM.modalInscription.classList.contains('active')) closeModal(DOM.modalInscription);
                    else if (DOM.modalConnexion.classList.contains('active')) closeModal(DOM.modalConnexion);
                    else if (DOM.modalCreateCourse.classList.contains('active')) closeModal(DOM.modalCreateCourse);
                    else if (DOM.modalAdminEdit.classList.contains('active')) closeModal(DOM.modalAdminEdit);
                }
            });

            // Seeding & stats
            seedDemoUsers().catch(err => console.warn('Demo users:', err));
            setInterval(updateStats, 30000);

            // ----------------------------
            // 14. SEED DEMO USERS (optionnel)
            // ----------------------------
            async function seedDemoUsers() {
                const users = [
                    { email: 'chauffeur@gmail.com', password: 'chauffeur123', nom: 'Chauffeur Test',
                        telephone: '0555000001', role: 'chauffeur' },
                    { email: 'passager@gmail.com', password: 'passager123', nom: 'Passager Test',
                        telephone: '0555000002', role: 'passager' }
                ];
                for (const u of users) {
                    try {
                        const doc = await fsGet('users', u.email);
                        if (doc.exists) continue;
                        await auth.createUserWithEmailAndPassword(u.email, u.password);
                        await fsSet('users', u.email, { nom: u.nom, telephone: u.telephone, email: u.email, role: u.role,
                            dateInscription: new Date().toISOString() });
                    } catch (e) {
                        if (e.code === 'auth/email-already-in-use') {
                            const doc = await fsGet('users', u.email);
                            if (!doc.exists) {
                                await fsSet('users', u.email, { nom: u.nom, telephone: u.telephone, email: u.email,
                                    role: u.role, dateInscription: new Date().toISOString() });
                            }
                        }
                    }
                }
            }

            console.log('✅ Machi prêt – version refactorisée');
        })();
    </script>
</body>
</html>
