<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Machi – Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0a0d1a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            position: relative;
        }
        .glass-card, #mainInterface {
            background: rgba(20,25,45,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.5rem;
            padding: 1rem 0.6rem;
            width: 100%;
            max-width: 480px;
            transition: opacity 0.3s ease;
        }
        #mainInterface { display: none; max-width: 480px; min-height: 60vh; position: relative; padding-bottom: 5rem; }
        #mainInterface.active { display: block; }
        .btn-led {
            background: #1e2a4a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 60px;
            padding: 0.4rem 1rem;
            font-weight: 600;
            font-size: 0.8rem;
            color: #d6eaff;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, opacity 0.2s;
            text-align: center;
            display: inline-block;
            user-select: none;
            touch-action: manipulation;
        }
        .btn-led:hover { background: #2b3b66; color: #fff; }
        .btn-led:active { background: #16203a; }
        .btn-led:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        .btn-led.pulsing {
            animation: pulse 1s ease-in-out infinite;
            background: #00b8b0;
            border-color: #00d4cc;
            color: #fff;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,200,180,0.4); } 70% { box-shadow: 0 0 0 10px rgba(0,200,180,0); } 100% { box-shadow: 0 0 0 0 rgba(0,200,180,0); } }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 0.6rem;
            flex-wrap: wrap;
        }
        .header-actions .btn-logout, .header-actions .btn-create {
            background: rgba(255,70,70,0.10);
            border: 1px solid rgba(255,70,70,0.15);
            border-radius: 40px;
            padding: 0.15rem 0.6rem;
            color: #ffb0b0;
            font-size: 0.65rem;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
        }
        .header-actions .btn-create {
            background: rgba(0,180,170,0.10);
            border-color: rgba(0,180,170,0.15);
            color: #a0f0e8;
        }
        .header-actions .btn-logout:hover { background: rgba(255,70,70,0.2); }
        .header-actions .btn-create:hover { background: rgba(0,180,170,0.2); }
        .credits-badge {
            background: rgba(255,215,0,0.15);
            border: 1px solid rgba(255,215,0,0.3);
            color: #ffd700;
            padding: 0.1rem 0.5rem;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: rgba(18,24,44,0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1.5rem;
            padding: 1.2rem 0.8rem;
            max-width: 420px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content label { color: #b0c8e8; font-size: 0.75rem; font-weight: 500; margin-top: 0.4rem; display: block; }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 0.3rem 0.7rem;
            margin-top: 0.1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: #e8f0ff;
            font-size: 0.85rem;
            outline: none;
            transition: border 0.15s;
        }
        .modal-content input:focus { border-color: #4a8cff; }
        .modal-content input::placeholder { color: #6a7a9a; }
        .btn-validate { background: #00807a; border-color: #00a39a; color: #fff; }
        .btn-validate:hover { background: #00a39a; }
        .btn-cancel { background: rgba(255,70,70,0.12); border-color: rgba(255,70,70,0.2); color: #ffb0b0; }
        .btn-cancel:hover { background: rgba(255,70,70,0.22); }
        .courses-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-top: 0.6rem;
        }
        .course-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 0.8rem;
            padding: 0.4rem 0.6rem;
            width: 100%;
            transition: background 0.2s, border-color 0.3s, box-shadow 0.3s;
            position: relative;
        }
        .course-card:hover { background: rgba(255,255,255,0.06); }
        .course-started {
            animation: blinkRed 1s ease-in-out infinite;
            border-color: #ff4444 !important;
        }
        @keyframes blinkRed { 0% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); border-color: #ff4444; } 50% { box-shadow: 0 0 20px 5px rgba(255,68,68,0.6); border-color: #ff0000; } 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); border-color: #ff4444; } }
        .course-info {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.2rem 0.4rem;
            margin-bottom: 0.2rem;
        }
        .course-info .titre { font-weight: 600; font-size: 0.8rem; color: #d6eaff; flex: 1 1 auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .course-info .heure { font-size: 0.65rem; color: #8aa0c8; white-space: nowrap; }
        .course-info .temps-restant { font-size: 0.65rem; color: #f0c060; white-space: nowrap; }
        .course-info .places-restantes { font-size: 0.65rem; color: #60c0f0; white-space: nowrap; }
        .course-info .prix { font-size: 0.65rem; color: #ffd700; white-space: nowrap; font-weight: 500; }
        .course-row {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            width: 100%;
        }
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            grid-template-rows: repeat(2,1fr);
            gap: 0.15rem;
            flex: 4;
            grid-auto-flow: column;
        }
        .seat {
            aspect-ratio: 1/1;
            border-radius: 4px;
            border: 1.5px solid rgba(255,255,255,0.10);
            width: 100%;
            cursor: default;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        .seat.driver { background-color: #00b8b0; border-color: #00d4cc; box-shadow: 0 0 6px rgba(0,200,180,0.2); cursor: default; }
        .seat.driver.has-profile { background-color: transparent; border-color: #00d4cc; }
        .seat.available { background: transparent; border-color: rgba(255,255,255,0.25); cursor: pointer; }
        .seat.available:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.5); }
        .seat.reserved { background: #b44cff; border-color: #b44cff; box-shadow: 0 0 6px rgba(180,76,255,0.3); cursor: pointer; }
        .seat.reserved:hover { filter: brightness(1.15); }
        .seat.disabled { background: rgba(255,255,255,0.015); border-color: rgba(255,255,255,0.02); opacity: 0.15; cursor: default; }
        .car-photo {
            flex: 3;
            border-radius: 6px;
            overflow: hidden;
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #6a7a9a;
            cursor: default;
            position: relative;
            min-height: 40px;
        }
        .car-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .car-photo.default { font-size: 1.6rem; background: rgba(255,255,255,0.02); }
        @media (max-width:380px) { .car-photo { font-size:1.2rem; } .course-row { gap:0.6rem; } .seat-grid { gap:0.1rem; } .seat { border-width:1px; } }
        .tooltip-reservation {
            position: fixed;
            background: rgba(18,24,44,0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.4rem 0.6rem;
            color: #e8f0ff;
            font-size: 0.75rem;
            display: none;
            z-index: 60;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            min-width: 120px;
            align-items: center;
            gap: 0.4rem;
            pointer-events: auto;
        }
        .tooltip-reservation .nom { flex: 1; }
        .tooltip-reservation .btn-supprimer {
            background: rgba(255,70,70,0.2);
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            color: #ffb0b0;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .tooltip-reservation .btn-supprimer:hover { background: rgba(255,70,70,0.4); }
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,180,170,0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0,255,200,0.15);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            color: #c0fff0;
            font-weight: 500;
            display: none;
            z-index: 100;
            font-size: 0.8rem;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { display: block; }
        .btn-start-ride {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #00b8b0;
            color: #fff;
            border: none;
            border-radius: 60px;
            padding: 0.8rem 2rem;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 0 30px rgba(0,200,180,0.5);
            z-index: 70;
            display: none;
            cursor: pointer;
            animation: pulseButton 1.5s ease-in-out infinite;
            transition: transform 0.2s;
        }
        .btn-start-ride:hover { background: #00d4cc; transform: translateX(-50%) scale(1.02); }
        @keyframes pulseButton { 0% { box-shadow: 0 0 0 0 rgba(0,200,180,0.5); } 70% { box-shadow: 0 0 20px 10px rgba(0,200,180,0); } 100% { box-shadow: 0 0 0 0 rgba(0,200,180,0); } }
        #homeScreen .btn-led { flex: 1; text-align: center; }
        .spinner {
            display: inline-block;
            width: 0.8rem;
            height: 0.8rem;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #00b8b0;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .admin-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.15);
            text-decoration: none;
            transition: color 0.2s;
        }
        .admin-link:hover { color: rgba(255,255,255,0.4); }
        @media (max-width:480px) {
            body { padding: 0.3rem; }
            .glass-card, #mainInterface { padding: 0.6rem 0.4rem; border-radius: 1rem; }
            .modal-content { padding: 1rem 0.6rem; }
            .course-info .titre { font-size: 0.75rem; }
            .header-actions .btn-logout, .header-actions .btn-create { font-size: 0.6rem; padding: 0.15rem 0.5rem; }
            .btn-start-ride { padding: 0.6rem 1.5rem; font-size: 0.9rem; bottom: 1.5rem; }
        }
    </style>
</head>
<body>
    <div id="homeScreen" class="glass-card">
        <h1 class="text-xl font-bold text-center text-cyan-200 mb-0.5">Machi</h1>
        <p class="text-center text-slate-400 text-xs mb-4 tracking-wider">⚡ mobilité en circuit fermé</p>
        <div class="flex flex-col sm:flex-row gap-2">
            <button id="btnInscription" class="btn-led">✨ S'inscrire</button>
            <button id="btnConnexion" class="btn-led">🔐 Se connecter</button>
        </div>
        <div class="mt-3 text-center text-xs text-slate-500"><span id="stats">👤 0 inscrits</span></div>
    </div>

    <div id="mainInterface">
        <div class="header-actions">
            <div class="text-slate-400 text-xs truncate" id="userRoleBadge">Rôle : —</div>
            <div style="display:flex; align-items:center; gap:0.3rem; flex-wrap:wrap;">
                <span id="creditsBadge" class="credits-badge">🪙 0</span>
                <button id="btnCreateCourse" class="btn-create" style="display:none;">➕ Créer</button>
                <button id="btnLogout" class="btn-logout">✕ Déconnexion</button>
            </div>
        </div>
        <h2 id="welcomeMessage" class="text-base font-semibold text-cyan-200 mb-0.5">Bienvenue</h2>
        <hr class="border-white/5 my-1.5" />
        <div id="mainContent">
            <div id="coursesContainer">
                <p class="text-slate-500 text-center text-xs" id="noCoursesMsg">Aucune course pour le moment.</p>
                <div id="coursesList" class="courses-list"></div>
            </div>
        </div>
        <!-- Lien vers l'admin (visible uniquement si le rôle est admin) -->
        <a href="admin.html" id="adminLink" class="admin-link" style="display:none;">⚙️ Administration</a>
    </div>

    <button id="btnStartRide" class="btn-start-ride">🚀 Commencer le trajet</button>

    <!-- Modales -->
    <div id="modalInscription" class="modal-overlay" data-modal="inscription">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">Créer un compte</h2>
            <label>Je suis</label><select id="role"><option value="passager">🚶 Passager</option><option value="chauffeur">🚗 Chauffeur</option></select>
            <label>Nom complet</label><input type="text" id="nom" placeholder="ex: Karim Benali" />
            <label>Téléphone</label><input type="tel" id="telephone" placeholder="0555 12 34 56" />
            <label>Email</label><input type="email" id="email" placeholder="ex: farid@gmail.com" />
            <label>Mot de passe</label><input type="password" id="motDePasse" placeholder="••••••••" />
            <div class="flex gap-2 mt-3">
                <button id="btnValiderInscription" class="btn-led btn-validate flex-1">✔ Valider</button>
                <button class="btn-led btn-cancel flex-1 modal-close" data-modal="inscription">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="modalConnexion" class="modal-overlay" data-modal="connexion">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">🔐 Se connecter</h2>
            <label>Email</label><input type="email" id="loginEmail" placeholder="ex: farid@gmail.com" />
            <label>Mot de passe</label><input type="password" id="loginPassword" placeholder="••••••••" />
            <div class="flex gap-2 mt-3">
                <button id="btnValiderConnexion" class="btn-led btn-validate flex-1">✔ Se connecter</button>
                <button class="btn-led btn-cancel flex-1 modal-close" data-modal="connexion">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="modalCreateCourse" class="modal-overlay" data-modal="createCourse">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">🚗 Nouvelle course</h2>
            <label>Départ</label><select id="courseDepart"><option value="">-- Choisir un départ --</option></select>
            <label>Arrivée</label><select id="courseArrivee"><option value="">-- Choisir une arrivée --</option></select>
            <label>Heure de départ</label><input type="time" id="courseHeure" />
            <label>Prix (unités)</label><input type="number" id="coursePrix" placeholder="ex: 12" min="1" />
            <label>Places (hors chauffeur, max 7)</label><input type="number" id="coursePlaces" placeholder="ex: 3" min="1" max="7" />
            <div class="flex gap-2 mt-3">
                <button id="btnValiderCourse" class="btn-led btn-validate flex-1">✔ Confirmer</button>
                <button class="btn-led btn-cancel flex-1 modal-close" data-modal="createCourse">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="tooltipReservation" class="tooltip-reservation"><span class="nom">Passager</span><button class="btn-supprimer" id="btnSupprimerResa">✕</button></div>
    <div id="toast" class="toast"></div>

    <script>
        // ========================================================================
        // FIREBASE INIT
        // ========================================================================
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyACgeZXog1KZGU29HpjM4qpKTBt54KbJFg",
            authDomain: "machi-51024.firebaseapp.com",
            projectId: "machi-51024",
            storageBucket: "machi-51024.firebasestorage.app",
            messagingSenderId: "984764801380",
            appId: "1:984764801380:web:c082a0988bba3f899fda71",
            measurementId: "G-EDZXP8QF9Q"
        };
        firebase.initializeApp(FIREBASE_CONFIG);
        const auth = firebase.auth(),
            db = firebase.firestore();
        db.enablePersistence().catch(()=>{});

        // ========================================================================
        // DOM REFERENCES
        // ========================================================================
        const $ = id => document.getElementById(id);
        const homeScreen = $('homeScreen'),
            mainInterface = $('mainInterface'),
            welcomeMessage = $('welcomeMessage'),
            userRoleBadge = $('userRoleBadge'),
            creditsBadge = $('creditsBadge'),
            stats = $('stats'),
            coursesList = $('coursesList'),
            noCoursesMsg = $('noCoursesMsg'),
            coursesContainer = $('coursesContainer'),
            btnInscription = $('btnInscription'),
            btnConnexion = $('btnConnexion'),
            btnLogout = $('btnLogout'),
            btnCreateCourse = $('btnCreateCourse'),
            btnStartRide = $('btnStartRide'),
            modalInscription = $('modalInscription'),
            btnValiderInscription = $('btnValiderInscription'),
            roleSelect = $('role'),
            nomInput = $('nom'),
            telInput = $('telephone'),
            emailInput = $('email'),
            pwdInput = $('motDePasse'),
            modalConnexion = $('modalConnexion'),
            loginEmail = $('loginEmail'),
            loginPassword = $('loginPassword'),
            btnValiderConnexion = $('btnValiderConnexion'),
            modalCreateCourse = $('modalCreateCourse'),
            courseDepart = $('courseDepart'),
            courseArrivee = $('courseArrivee'),
            courseHeure = $('courseHeure'),
            coursePrix = $('coursePrix'),
            coursePlaces = $('coursePlaces'),
            btnValiderCourse = $('btnValiderCourse'),
            tooltip = $('tooltipReservation'),
            btnSupprimerResa = $('btnSupprimerResa'),
            toast = $('toast'),
            adminLink = $('adminLink');

        // ========================================================================
        // STATE & UTILITY
        // ========================================================================
        let currentUser = null,
            watchId = null,
            tooltipCourseId = null,
            tooltipPlaceIndex = null;

        const longPressTimers = new Map();

        const showToast = (msg, err = false) => {
            toast.textContent = msg;
            toast.style.borderColor = err ? 'rgba(255,100,100,0.2)' : 'rgba(0,255,200,0.15)';
            toast.style.color = err ? '#ffb0b0' : '#c0fff0';
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
        };
        const showLoader = (btn) => { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; };
        const hideLoader = (btn, txt) => { btn.disabled = false; btn.textContent = txt; };
        const isOnline = () => navigator.onLine;

        const debounceButton = (btn, delay = 800) => {
            if (btn._debounceTimer) return false;
            btn.disabled = true;
            btn._debounceTimer = setTimeout(() => {
                btn.disabled = false;
                btn._debounceTimer = null;
            }, delay);
            return true;
        };

        const closeModal = (modalEl) => { if (modalEl) modalEl.classList.remove('active'); };
        const closeAllModals = () => {
            document.querySelectorAll('.modal-overlay.active').forEach(m => closeModal(m));
        };

        const showHome = () => {
            homeScreen.style.display = 'block';
            mainInterface.classList.remove('active');
            mainInterface.style.display = 'none';
            updateStats();
            tooltip.style.display = 'none';
            btnStartRide.style.display = 'none';
            if (watchId) { navigator.geolocation.clearWatch(watchId);
                watchId = null; }
        };

        const showMain = (user) => {
            homeScreen.style.display = 'none';
            mainInterface.style.display = 'block';
            requestAnimationFrame(() => mainInterface.classList.add('active'));
            const roleFr = user.role === 'admin' ? 'Admin' : (user.role === 'chauffeur' ? 'Chauffeur' : 'Passager');
            welcomeMessage.textContent = `👋 Bonjour ${user.nom || 'Admin'}`;
            userRoleBadge.textContent = `Rôle : ${roleFr}`;
            creditsBadge.textContent = `🪙 ${user.credits || 0}`;
            btnCreateCourse.style.display = 'none';

            // Afficher le lien admin uniquement si l'utilisateur est admin
            if (user.role === 'admin') {
                adminLink.style.display = 'block';
            } else {
                adminLink.style.display = 'none';
            }

            renderCourses(user);
        };

        // ========================================================================
        // FIRESTORE HELPERS
        // ========================================================================
        const dbGet = (col, id = null) => {
            if (!isOnline()) throw new Error('Offline');
            const ref = id ? db.collection(col).doc(id) : db.collection(col);
            return ref.get();
        };
        const dbSet = (col, id, data) => {
            if (!isOnline()) throw new Error('Offline');
            return db.collection(col).doc(id).set(data, { merge: true });
        };

        const getCurrentPos = () => new Promise((res, rej) => {
            if (!navigator.geolocation) rej(new Error('Geo not supported'));
            navigator.geolocation.getCurrentPosition(
                p => res({ lat: p.coords.latitude, lon: p.coords.longitude }),
                e => rej(e), { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
            );
        });
        const updateUserLocation = async (email) => {
            try { const { lat, lon } = await getCurrentPos(); await dbUpdate('users', email, { lastLatitude: lat, lastLongitude: lon, lastLocationUpdate: new Date().toISOString() }); } catch (e) { console.warn('Geo fail:', e.message); }
        };
        const haversine = (lat1, lon1, lat2, lon2) => {
            const R = 6371000,
                dLat = (lat2 - lat1) * Math.PI / 180,
                dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

                    if (course.heure) {

                    const total = course.places + 1;

                    const seats = [];

                    }

            loginPassword.value = '';
            loginEmail.focus(); });
        [loginEmail, loginPassword].forEach(el => el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); }));
        btnValiderConnexion.addEventListener('click', handleLogin);

        btnLogout.addEventListener('click', logout);

        [courseHeure, coursePrix, coursePlaces, courseDepart, courseArrivee].forEach(el => el.addEventListener('keydown', (e) => { if (
                e.key === 'Enter') handleCreateCourse(); }));
        btnValiderCourse.addEventListener('click', handleCreateCourse);

        setInterval(updateStats, 30000);
        console.log('✅ Machi index ready (light version)');
    </script>
</body>
</html>
