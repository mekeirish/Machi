<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Machi – Mobile</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0d1a'/%3E%3Ctext x='50' y='68' font-family='Arial, sans-serif' font-size='60' font-weight='bold' text-anchor='middle' fill='%2300d4cc'%3EM%3C/text%3E%3C/svg%3E" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0d1a'/%3E%3Ctext x='50' y='68' font-family='Arial, sans-serif' font-size='60' font-weight='bold' text-anchor='middle' fill='%2300d4cc'%3EM%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;min-height:100vh;background:#0a0d1a;display:flex;align-items:center;justify-content:center;padding:.5rem;position:relative}
        .glass-card,#mainInterface{background:rgba(20,25,45,.6);backdrop-filter:blur(12px) saturate(160%);-webkit-backdrop-filter:blur(12px) saturate(160%);border:1px solid rgba(255,255,255,.08);border-radius:1.5rem;padding:1rem .6rem;width:100%;max-width:480px;transition:opacity .3s ease}
        #mainInterface{display:none;max-width:480px;min-height:60vh;position:relative;padding-bottom:5rem}
        #mainInterface.active{display:block}
        .btn-led{background:#1e2a4a;border:1px solid rgba(255,255,255,.06);border-radius:60px;padding:.4rem 1rem;font-weight:600;font-size:.8rem;color:#d6eaff;cursor:pointer;transition:background .2s,color .2s;text-align:center;display:inline-block}
        .btn-led:hover{background:#2b3b66;color:#fff}
        .btn-led:active{background:#16203a}
        .btn-led.pulsing{animation:pulse 1s ease-in-out infinite;background:#00b8b0;border-color:#00d4cc;color:#fff}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,200,180,.4)}70%{box-shadow:0 0 0 10px rgba(0,200,180,0)}100%{box-shadow:0 0 0 0 rgba(0,200,180,0)}}
        .header-actions{display:flex;justify-content:space-between;align-items:center;gap:.3rem;margin-bottom:.6rem;flex-wrap:wrap}
        .header-actions .btn-logout,.header-actions .btn-create{background:rgba(255,70,70,.1);border:1px solid rgba(255,70,70,.15);border-radius:40px;padding:.15rem .6rem;color:#ffb0b0;font-size:.65rem;cursor:pointer;transition:background .2s;display:inline-flex;align-items:center;gap:.2rem}
        .header-actions .btn-create{background:rgba(0,180,170,.1);border-color:rgba(0,180,170,.15);color:#a0f0e8}
        .header-actions .btn-logout:hover{background:rgba(255,70,70,.2)}
        .header-actions .btn-create:hover{background:rgba(0,180,170,.2)}
        .credits-badge{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);color:#ffd700;padding:.1rem .5rem;border-radius:40px;font-size:.65rem;font-weight:600;white-space:nowrap}
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:50;align-items:center;justify-content:center}
        .modal-overlay.active{display:flex}
        .modal-content{background:rgba(18,24,44,.85);backdrop-filter:blur(16px) saturate(180%);border:1px solid rgba(255,255,255,.06);border-radius:1.5rem;padding:1.2rem .8rem;max-width:420px;width:90%;max-height:90vh;overflow-y:auto}
        .modal-content label{color:#b0c8e8;font-size:.75rem;font-weight:500;margin-top:.4rem;display:block}
        .modal-content input,.modal-content select{width:100%;padding:.3rem .7rem;margin-top:.1rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:40px;color:#e8f0ff;font-size:.85rem;outline:none;transition:border .15s}
        .modal-content input:focus{border-color:#4a8cff}
        .modal-content input::placeholder{color:#6a7a9a}
        .btn-validate{background:#00807a;border-color:#00a39a;color:#fff}
        .btn-validate:hover{background:#00a39a}
        .btn-cancel{background:rgba(255,70,70,.12);border-color:rgba(255,70,70,.2);color:#ffb0b0}
        .btn-cancel:hover{background:rgba(255,70,70,.22)}
        .courses-list{display:flex;flex-direction:column;gap:.6rem;margin-top:.6rem}
        .course-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:.8rem;padding:.4rem .6rem;width:100%;backdrop-filter:blur(4px);transition:background .2s,border-color .3s,box-shadow .3s;position:relative}
        .course-card:hover{background:rgba(255,255,255,.06)}
        .course-started{animation:blinkRed 1s ease-in-out infinite;border-color:#ff4444!important}
        @keyframes blinkRed{0%{box-shadow:0 0 0 0 rgba(255,68,68,.4);border-color:#ff4444}50%{box-shadow:0 0 20px 5px rgba(255,68,68,.6);border-color:#ff0000}100%{box-shadow:0 0 0 0 rgba(255,68,68,.4);border-color:#ff4444}}
        .course-info{display:flex;flex-wrap:wrap;align-items:baseline;gap:.2rem .4rem;margin-bottom:.2rem}
        .course-info .titre{font-weight:600;font-size:.8rem;color:#d6eaff;flex:1 1 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .course-info .heure{font-size:.65rem;color:#8aa0c8;white-space:nowrap}
        .course-info .temps-restant{font-size:.65rem;color:#f0c060;white-space:nowrap}
        .course-info .places-restantes{font-size:.65rem;color:#60c0f0;white-space:nowrap}
        .course-info .prix{font-size:.65rem;color:#ffd700;white-space:nowrap;font-weight:500}
        .course-row{display:flex;flex-direction:row;gap:1rem;width:100%}
        .seat-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:.15rem;flex:4;grid-auto-flow:column}
        .seat{aspect-ratio:1/1;border-radius:4px;border:1.5px solid rgba(255,255,255,.1);width:100%;cursor:default;background-size:cover;background-position:center;background-repeat:no-repeat;position:relative}
        .seat.driver{background-color:#00b8b0;border-color:#00d4cc;box-shadow:0 0 6px rgba(0,200,180,.2);cursor:default}
        .seat.driver.has-profile{background-color:transparent;border-color:#00d4cc}
        .seat.available{background:transparent;border-color:rgba(255,255,255,.25);cursor:pointer}
        .seat.available:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.5)}
        .seat.reserved{background:#b44cff;border-color:#b44cff;box-shadow:0 0 6px rgba(180,76,255,.3);cursor:pointer}
        .seat.reserved:hover{filter:brightness(1.15)}
        .seat.disabled{background:rgba(255,255,255,.015);border-color:rgba(255,255,255,.02);opacity:.15;cursor:default}
        .car-photo{flex:3;border-radius:6px;overflow:hidden;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:#6a7a9a;cursor:default;position:relative;min-height:40px}
        .car-photo img{width:100%;height:100%;object-fit:cover;display:block}
        .car-photo.default{font-size:1.6rem;background:rgba(255,255,255,.02)}
        @media(max-width:380px){.car-photo{font-size:1.2rem}.course-row{gap:.6rem}.seat-grid{gap:.1rem}.seat{border-width:1px}}
        .admin-panel{margin-top:.6rem}
        .admin-panel .btn-admin{background:#1e2a4a;border:1px solid rgba(255,255,255,.06);border-radius:60px;padding:.4rem 1rem;color:#d6eaff;cursor:pointer;transition:background .2s;width:100%;text-align:center;font-weight:600;margin-bottom:.3rem;font-size:.85rem}
        .admin-panel .btn-admin:hover{background:#2b3b66}
        .admin-panel .btn-admin.active{background:#2b3b66;border-color:#4a8cff}
        .admin-list{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:.6rem;padding:.4rem;margin-top:.3rem;max-height:150px;overflow-y:auto}
        .admin-list .item{display:flex;justify-content:space-between;padding:.2rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.75rem;color:#b0c8e8;cursor:pointer;transition:background .2s}
        .admin-list .item:hover{background:rgba(255,255,255,.05)}
        .admin-list .item:last-child{border-bottom:none}
        .admin-list .item .email{color:#8aa0c8;font-size:.65rem}
        .crop-container{width:100%;margin:.3rem 0;display:none;min-height:150px}
        .crop-container img{max-width:100%;display:block}
        .tooltip-reservation{position:fixed;background:rgba(18,24,44,.95);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:1rem;padding:.4rem .6rem;color:#e8f0ff;font-size:.75rem;display:none;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,.6);min-width:120px;align-items:center;gap:.4rem;pointer-events:auto}
        .tooltip-reservation .nom{flex:1}
        .tooltip-reservation .btn-supprimer{background:rgba(255,70,70,.2);border:none;border-radius:50%;width:20px;height:20px;color:#ffb0b0;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
        .tooltip-reservation .btn-supprimer:hover{background:rgba(255,70,70,.4)}
        .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:rgba(0,180,170,.15);backdrop-filter:blur(8px);border:1px solid rgba(0,255,200,.15);padding:.4rem 1.2rem;border-radius:60px;color:#c0fff0;font-weight:500;display:none;z-index:100;font-size:.8rem;max-width:90%;text-align:center}
        .toast.show{display:block}
        .btn-start-ride{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#00b8b0;color:#fff;border:none;border-radius:60px;padding:.8rem 2rem;font-weight:700;font-size:1rem;box-shadow:0 0 30px rgba(0,200,180,.5);z-index:70;display:none;cursor:pointer;animation:pulseButton 1.5s ease-in-out infinite}
        .btn-start-ride:hover{background:#00d4cc;transform:translateX(-50%) scale(1.02)}
        @keyframes pulseButton{0%{box-shadow:0 0 0 0 rgba(0,200,180,.5)}70%{box-shadow:0 0 20px 10px rgba(0,200,180,0)}100%{box-shadow:0 0 0 0 rgba(0,200,180,0)}}
        #homeScreen .btn-led{flex:1;text-align:center}
        .spinner{display:inline-block;width:.8rem;height:.8rem;border:2px solid rgba(255,255,255,.1);border-top-color:#00b8b0;border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        @media(max-width:480px){body{padding:.3rem}.glass-card,#mainInterface{padding:.6rem .4rem;border-radius:1rem}.modal-content{padding:1rem .6rem}.course-info .titre{font-size:.75rem}.header-actions .btn-logout,.header-actions .btn-create{font-size:.6rem;padding:.15rem .5rem}.btn-start-ride{padding:.6rem 1.5rem;font-size:.9rem;bottom:1.5rem}}
    </style>
</head>
<body>
    <!-- ===== HOME ===== -->
    <div id="homeScreen" class="glass-card">
        <h1 class="text-xl font-bold text-center text-cyan-200 mb-0.5">Machi</h1>
        <p class="text-center text-slate-400 text-xs mb-4 tracking-wider">⚡ mobilité en circuit fermé</p>
        <div class="flex flex-col sm:flex-row gap-2">
            <button id="btnInscription" class="btn-led">✨ S'inscrire</button>
            <button id="btnConnexion" class="btn-led">🔐 Se connecter</button>
        </div>
        <div class="mt-3 text-center text-xs text-slate-500"><span id="stats">👤 0 inscrits</span></div>
    </div>

    <!-- ===== MAIN INTERFACE ===== -->
    <div id="mainInterface">
        <div class="header-actions">
            <div class="text-slate-400 text-xs truncate" id="userRoleBadge">Rôle : —</div>
            <div style="display:flex; align-items:center; gap:.3rem; flex-wrap:wrap;">
                <span id="creditsBadge" class="credits-badge">🪙 0</span>
                <button id="btnCreateCourse" class="btn-create" style="display:none;">➕ Créer</button>
                <button id="btnLogout" class="btn-logout">✕ Déconnexion</button>
            </div>
        </div>
        <h2 id="welcomeMessage" class="text-base font-semibold text-cyan-200 mb-0.5">Bienvenue</h2>
        <hr class="border-white/5 my-1.5" />
        <div id="mainContent">
            <div id="coursesContainer">
                <p class="text-slate-500 text-center text-xs" id="noCoursesMsg">Aucune course pour le moment.</p>
                <div id="coursesList" class="courses-list"></div>
            </div>
            <div id="adminPanel" class="admin-panel" style="display:none;">
                <button id="btnAdminChauffeurs" class="btn-admin">🚗 Chauffeurs</button>
                <div id="adminChauffeursList" class="admin-list" style="display:none;"></div>
                <button id="btnAdminPassagers" class="btn-admin">🚶 Passagers</button>
                <div id="adminPassagersList" class="admin-list" style="display:none;"></div>
                <button id="btnAdminSpots" class="btn-admin">📍 Spots</button>
                <div id="adminSpotsList" class="admin-list" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- ===== START RIDE BUTTON ===== -->
    <button id="btnStartRide" class="btn-start-ride">🚀 Commencer le trajet</button>

    <!-- ===== MODALS ===== -->
    <div id="modalAdminEdit" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">✏️ Modifier l'utilisateur</h2>
            <div id="adminEditUserInfo" class="text-xs text-slate-400 mb-2">Chargement...</div>
            <label>Nom</label><input type="text" id="adminEditNom" placeholder="Nom" />
            <label>Téléphone</label><input type="tel" id="adminEditTelephone" placeholder="0555 12 34 56" />
            <label>Email (non modifiable)</label><input type="email" id="adminEditEmail" disabled />
            <label>Rôle</label><input type="text" id="adminEditRole" disabled />
            <label>Crédits (Alfrak)</label><input type="number" id="adminEditCredits" placeholder="100" min="0" step="1" />
            <div class="mt-3 border-t border-white/5 pt-2">
                <p class="text-xs text-cyan-200 font-medium mb-1">📸 Photos</p>
                <label class="text-xs">Photo de la voiture (3:2)</label>
                <input type="file" id="adminEditCarPhotoInput" accept="image/*" />
                <div id="adminEditCarCropContainer" class="crop-container"><img id="adminEditCarCropImage" src="#" alt="Rogner" /></div>
                <label class="text-xs mt-2">Photo de profil (1:1)</label>
                <input type="file" id="adminEditProfilePhotoInput" accept="image/*" />
                <div id="adminEditProfileCropContainer" class="crop-container"><img id="adminEditProfileCropImage" src="#" alt="Rogner" /></div>
            </div>
            <div class="flex gap-2 mt-4">
                <button id="btnAdminEditSave" class="btn-led btn-validate flex-1">💾 Enregistrer</button>
                <button id="btnAdminEditCancel" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="modalAdminSpots" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">📍 Gérer les spots</h2>
            <div id="adminSpotsListContainer" class="admin-list" style="max-height:200px; margin-bottom:.5rem;"></div>
            <hr class="border-white/5 my-2" />
            <label>Nom du spot</label><input type="text" id="adminSpotNom" placeholder="ex: Aéroport" />
            <div style="text-align:center; margin:.3rem 0;"><button id="btnGetLocation" class="btn-led btn-validate" style="width:100%;">📍 Me localiser</button></div>
            <label>Latitude</label><input type="text" id="adminSpotLat" placeholder="36.7538" />
            <label>Longitude</label><input type="text" id="adminSpotLon" placeholder="3.0588" />
            <div class="flex gap-2 mt-3">
                <button id="btnAdminSpotAdd" class="btn-led btn-validate flex-1">➕ Ajouter</button>
                <button id="btnAdminSpotCancel" class="btn-led btn-cancel flex-1">✖ Fermer</button>
            </div>
        </div>
    </div>

    <div id="tooltipReservation" class="tooltip-reservation"><span class="nom">Passager</span><button class="btn-supprimer" id="btnSupprimerResa">✕</button></div>

    <div id="modalInscription" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">Créer un compte</h2>
            <label>Je suis</label><select id="role"><option value="passager">🚶 Passager</option><option value="chauffeur">🚗 Chauffeur</option></select>
            <label>Nom complet</label><input type="text" id="nom" placeholder="ex: Karim Benali" />
            <label>Téléphone</label><input type="tel" id="telephone" placeholder="0555 12 34 56" />
            <label>Email</label><input type="email" id="email" placeholder="ex: farid@gmail.com" />
            <label>Mot de passe</label><input type="password" id="motDePasse" placeholder="••••••••" />
            <div class="flex gap-2 mt-3"><button id="btnValiderInscription" class="btn-led btn-validate flex-1">✔ Valider</button><button id="btnAnnulerInscription" class="btn-led btn-cancel flex-1">✖ Annuler</button></div>
        </div>
    </div>

    <div id="modalConnexion" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">🔐 Se connecter</h2>
            <label>Email</label><input type="email" id="loginEmail" placeholder="ex: farid@gmail.com" />
            <label>Mot de passe</label><input type="password" id="loginPassword" placeholder="••••••••" />
            <div class="flex gap-2 mt-3"><button id="btnValiderConnexion" class="btn-led btn-validate flex-1">✔ Se connecter</button><button id="btnAnnulerConnexion" class="btn-led btn-cancel flex-1">✖ Annuler</button></div>
        </div>
    </div>

    <!-- MODALE CRÉATION COURSE (avec date) -->
    <div id="modalCreateCourse" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">🚗 Nouvelle course</h2>
            <label>Date</label><input type="date" id="courseDate" />
            <label>Départ</label><select id="courseDepart"><option value="">-- Choisir un départ --</option></select>
            <label>Arrivée</label><select id="courseArrivee"><option value="">-- Choisir une arrivée --</option></select>
            <label>Heure de départ</label><input type="time" id="courseHeure" />
            <label>Prix (unités)</label><input type="number" id="coursePrix" placeholder="ex: 12" min="1" />
            <label>Places (hors chauffeur, max 7)</label><input type="number" id="coursePlaces" placeholder="ex: 3" min="1" max="7" />
            <div class="flex gap-2 mt-3"><button id="btnValiderCourse" class="btn-led btn-validate flex-1">✔ Confirmer</button><button id="btnAnnulerCourse" class="btn-led btn-cancel flex-1">✖ Annuler</button></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ============================================================
        // 1. FIREBASE CONFIG
        // ============================================================
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyACgeZXog1KZGU29HpjM4qpKTBt54KbJFg",

        const auth = firebase.auth(),

        // ============================================================

        // ============================================================
        const $ = id => document.getElementById(id);
        const homeScreen = $('homeScreen'),
            mainInterface = $('mainInterface'),
            welcomeMessage = $('welcomeMessage'),
            userRoleBadge = $('userRoleBadge'),
            creditsBadge = $('creditsBadge'),
            stats = $('stats'),
            coursesList = $('coursesList'),
            noCoursesMsg = $('noCoursesMsg'),

            btnAdminSpots = $('btnAdminSpots'),

            adminPassagersList = $('adminPassagersList'),
            adminSpotsList = $('adminSpotsList'),
            btnInscription = $('btnInscription'),
            btnConnexion = $('btnConnexion'),

            btnCreateCourse = $('btnCreateCourse'),
            btnStartRide = $('btnStartRide'),
            modalInscription = $('modalInscription'),
            btnValiderInscription = $('btnValiderInscription'),
            btnAnnulerInscription = $('btnAnnulerInscription'),
            roleSelect = $('role'),
            nomInput = $('nom'),
            telInput = $('telephone'),
            emailInput = $('email'),
            pwdInput = $('motDePasse'),
            modalConnexion = $('modalConnexion'),
            loginEmail = $('loginEmail'),
            loginPassword = $('loginPassword'),
            btnValiderConnexion = $('btnValiderConnexion'),

            modalCreateCourse = $('modalCreateCourse'),
            courseDate = $('courseDate'),
            courseDepart = $('courseDepart'),
            courseArrivee = $('courseArrivee'),
            courseHeure = $('courseHeure'),
            coursePrix = $('coursePrix'),
            coursePlaces = $('coursePlaces'),
            btnValiderCourse = $('btnValiderCourse'),
            btnAnnulerCourse = $('btnAnnulerCourse'),
            modalAdminEdit = $('modalAdminEdit'),
            adminEditUserInfo = $('adminEditUserInfo'),
            adminEditNom = $('adminEditNom'),
            adminEditTelephone = $('adminEditTelephone'),
            adminEditEmail = $('adminEditEmail'),
            adminEditRole = $('adminEditRole'),
            adminEditCredits = $('adminEditCredits'),
            adminEditCarPhotoInput = $('adminEditCarPhotoInput'),
            adminEditCarCropContainer = $('adminEditCarCropContainer'),
            adminEditCarCropImage = $('adminEditCarCropImage'),
            adminEditProfilePhotoInput = $('adminEditProfilePhotoInput'),
            adminEditProfileCropContainer = $('adminEditProfileCropContainer'),
            adminEditProfileCropImage = $('adminEditProfileCropImage'),
            btnAdminEditSave = $('btnAdminEditSave'),
            btnAdminEditCancel = $('btnAdminEditCancel'),
            modalAdminSpots = $('modalAdminSpots'),
            adminSpotsListContainer = $('adminSpotsListContainer'),
            adminSpotNom = $('adminSpotNom'),
            adminSpotLat = $('adminSpotLat'),
            adminSpotLon = $('adminSpotLon'),
            btnAdminSpotAdd = $('btnAdminSpotAdd'),
            btnAdminSpotCancel = $('btnAdminSpotCancel'),
            btnGetLocation = $('btnGetLocation'),
            tooltip = $('tooltipReservation'),
            btnSupprimerResa = $('btnSupprimerResa'),
            toast = $('toast');

        // ============================================================
        // 3. STATE
        // ============================================================
        let currentUser = null,
            watchId = null,
            tooltipCourseId = null,
            tooltipPlaceIndex = null,
            adminEditTargetEmail = null,
            adminEditCarCropper = null,
            adminEditProfileCropper = null,
            ridesUnsubscribe = null,
            usersUnsubscribe = null;

        // ============================================================
        // 4. UTILITY FUNCTIONS
        // ============================================================
        const showToast = (msg, err = false) => {
            toast.textContent = msg;
            toast.style.borderColor = err ? 'rgba(255,100,100,0.2)' : 'rgba(0,255,200,0.15)';
            toast.style.color = err ? '#ffb0b0' : '#c0fff0';
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
        };
        const showLoader = (btn) => { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; };
        const hideLoader = (btn, txt) => { btn.disabled = false; btn.textContent = txt; };
        const isOnline = () => navigator.onLine;

        const closeModal = (modal) => { if (modal) modal.classList.remove('active'); };
        const closeAllModals = () => {
            [modalInscription, modalConnexion, modalCreateCourse, modalAdminEdit, modalAdminSpots].forEach(m => closeModal(m));
            if (adminEditCarCropper) { adminEditCarCropper.destroy();
                adminEditCarCropper = null; }
            if (adminEditProfileCropper) { adminEditProfileCropper.destroy();
                adminEditProfileCropper = null; }
            adminEditCarCropContainer.style.display = 'none';
            adminEditProfileCropContainer.style.display = 'none';
            adminEditTargetEmail = null;
        };

        const showHome = () => {
            homeScreen.style.display = 'block';
            mainInterface.classList.remove('active');
            mainInterface.style.display = 'none';
            updateStats();
            tooltip.style.display = 'none';
            btnStartRide.style.display = 'none';
            if (watchId) { navigator.geolocation.clearWatch(watchId);
                watchId = null; }
            if (ridesUnsubscribe) { ridesUnsubscribe();
                ridesUnsubscribe = null; }
            if (usersUnsubscribe) { usersUnsubscribe();
                usersUnsubscribe = null; }
        };

        const showMain = (user) => {
            homeScreen.style.display = 'none';
            mainInterface.style.display = 'block';
            requestAnimationFrame(() => mainInterface.classList.add('active'));
            const roleFr = user.role === 'admin' ? 'Admin' : (user.role === 'chauffeur' ? 'Chauffeur' : 'Passager');
            welcomeMessage.textContent = `👋 Bonjour ${user.nom || 'Admin'}`;
            userRoleBadge.textContent = `Rôle : ${roleFr}`;
            creditsBadge.textContent = `🪙 ${user.credits || 0}`;
            btnCreateCourse.style.display = 'none';
            if (user.role === 'admin') {
                coursesContainer.style.display = 'none';
                adminPanel.style.display = 'block';
                renderAdminLists();
            } else {
                coursesContainer.style.display = 'block';
                adminPanel.style.display = 'none';
                setupRealtimeRides(user);
            }
        };

        // ============================================================
        // 5. FIRESTORE HELPERS
        // ============================================================
        const dbGet = (col, id = null) => {
            if (!isOnline()) throw new Error('Offline');
            const ref = id ? db.collection(col).doc(id) : db.collection(col);
            return ref.get();
        };
        const dbSet = (col, id, data) => {
            if (!isOnline()) throw new Error('Offline');
            return db.collection(col).doc(id).set(data, { merge: true });
        };
        const dbAdd = (col, data) => {
            if (!isOnline()) throw new Error('Offline');
            return db.collection(col).add(data);
        };
        const dbUpdate = (col, id, data) => {
            if (!isOnline()) throw new Error('Offline');
            return db.collection(col).doc(id).update(data);
        };
        const dbDelete = (col, id) => {
            if (!isOnline()) throw new Error('Offline');
            return db.collection(col).doc(id).delete();
        };
        const fetchAll = async (col) => {
            try { const snap = await dbGet(col); const arr = []; snap.forEach(d => arr.push({ id: d.id, ...d.data() })); return arr; } catch { return []; }
        };
        const fetchUsers = () => fetchAll('users');
        const fetchRides = () => fetchAll('rides');
        const fetchSpots = () => fetchAll('spots');

        // ============================================================
        // 6. GEOLOCATION
        // ============================================================
        const getCurrentPos = () => new Promise((res, rej) => {
            if (!navigator.geolocation) rej(new Error('Geo not supported'));
            navigator.geolocation.getCurrentPosition(
                p => res({ lat: p.coords.latitude, lon: p.coords.longitude }),
                e => rej(e), { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
            );
        });
        const updateUserLocation = async (email) => {
            try { const { lat, lon } = await getCurrentPos(); await dbUpdate('users', email, { lastLatitude: lat, lastLongitude: lon, lastLocationUpdate: new Date().toISOString() }); } catch (e) { console.warn('Geo fail:', e.message); }
        };
        const haversine = (lat1, lon1, lat2, lon2) => {
            const R = 6371000,
                dLat = (lat2 - lat1) * Math.PI / 180,
                dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };

        // ============================================================
        // 7. REAL-TIME RIDES
        // ============================================================
        function setupRealtimeRides(user) {
            if (ridesUnsubscribe) {
                ridesUnsubscribe();
                ridesUnsubscribe = null;
            }
            if (usersUnsubscribe) {
                usersUnsubscribe();
                usersUnsubscribe = null;
            }
            // Écouter les changements sur la collection rides
            ridesUnsubscribe = db.collection('rides').onSnapshot(async (snapshot) => {
                // Récupérer la liste des utilisateurs à jour
                const allUsers = await fetchUsers();
                const userMap = {};
                allUsers.forEach(u => userMap[u.email] = u);
                // On reconstruit les données pour les passer à renderCoursesWithData
                const rides = [];
                snapshot.forEach(doc => rides.push({ id: doc.id, ...doc.data() }));
                renderCoursesWithData(rides, userMap, user);
            }, (error) => {
                console.error('Snapshot error:', error);
                showToast('Erreur de synchronisation en temps réel', true);
            });

            // Écouter aussi les changements sur les utilisateurs (pour les photos / crédits)
            usersUnsubscribe = db.collection('users').onSnapshot(async () => {
                // Re-fetch et re-render si besoin – on laisse le listener rides gérer le re-render
                // Mais on peut rafraîchir les crédits et photos de profil
                if (currentUser) {
                    const doc = await dbGet('users', currentUser.email);
                    if (doc.exists) {
                        const data = doc.data();
                        currentUser.credits = data.credits || 0;
                        currentUser.photoURL = data.photoURL || null;
                        currentUser.profilePhotoURL = data.profilePhotoURL || null;
                        creditsBadge.textContent = `🪙 ${currentUser.credits}`;
                    }
                }
            });
        }

        // ============================================================
        // 8. RENDER COURSES WITH DATA (utilisée par le snapshot)
        // ============================================================
        async function renderCoursesWithData(rides, userMap, user) {
            if (!user) user = currentUser;
            if (!user) return;

            // Filtrer les courses selon le rôle
            let ridesToShow = user.role === 'chauffeur' ? rides.filter(r => r.chauffeurEmail === user.email) : rides;

            // Vérifier si le chauffeur a un trajet actif (non commencé et dans le futur)
            let activeRide = null;
            let hasActive = false;
            if (user.role === 'chauffeur') {
                const now = new Date();
                const today = now.toISOString().split('T')[0];
                for (const r of ridesToShow) {
                    if (r.date && r.heure) {
                        // Comparer date + heure
                        const [h, m] = r.heure.split(':').map(Number);
                        const rideDate = new Date(r.date + 'T' + r.heure);
                        if (rideDate > now && !r.started) {
                            hasActive = true;
                            activeRide = r;
                            break;
                        }
                    }
                }
            }
            btnCreateCourse.style.display = (user.role === 'chauffeur' && hasActive) ? 'none' : (user.role === 'chauffeur' ?
                'inline-block' : 'none');

            // Démarrer / arrêter la géolocalisation
            if (user.role === 'chauffeur' && activeRide && activeRide.departLat && activeRide.departLon) {
                if (!watchId) {
                    watchId = navigator.geolocation.watchPosition(
                        (pos) => {
                            const dist = haversine(pos.coords.latitude, pos.coords.longitude, activeRide.departLat,
                                activeRide.departLon);
                            if (dist < 20) {
                                btnStartRide.style.display = 'block';
                                btnStartRide.dataset.rideId = activeRide.id;
                            } else btnStartRide.style.display = 'none';
                        },
                        () => btnStartRide.style.display = 'none', { enableHighAccuracy: true, timeout: 5000,
                            maximumAge: 10000 }
                    );
                }
            } else {
                if (watchId) { navigator.geolocation.clearWatch(watchId);
                    watchId = null; }
                btnStartRide.style.display = 'none';
            }

            // Mettre à jour le crédit
            creditsBadge.textContent = `🪙 ${user.credits || 0}`;

            coursesList.innerHTML = '';
            if (!ridesToShow.length) {
                noCoursesMsg.style.display = 'block';
                coursesList.style.display = 'none';
                return;
            }
            noCoursesMsg.style.display = 'none';
            coursesList.style.display = 'flex';

            const now = new Date();
            const today = now.toISOString().split('T')[0];

            ridesToShow.forEach(course => {
                const chauffeur = userMap[course.chauffeurEmail] || {};
                const carPhoto = chauffeur.photoURL || null;
                const profilePhoto = chauffeur.profilePhotoURL || null;

                const card = document.createElement('div');
                card.className = 'course-card' + (course.started ? ' course-started' : '');
                card.dataset.courseId = course.id;

                // Temps restant basé sur la date + heure
                let temps = '';
                if (course.date && course.heure) {
                    const rideDate = new Date(course.date + 'T' + course.heure);
                    const diffMs = rideDate - now;
                    if (diffMs > 0) {
                        const diffMin = Math.floor(diffMs / 60000);
                        if (diffMin < 60) temps = ` (dans ${diffMin} min)`;
                        else {
                            const h = Math.floor(diffMin / 60);
                            const m = diffMin % 60;
                            temps = ` (dans ${h}h${m ? m + 'min' : ''})`;
                        }
                    } else if (diffMs === 0) temps = ' (maintenant)';
                    else temps = ' (passé)';
                }

                const total = course.places + 1;
                const reserved = (course.reservations || []).length;
                const avail = Math.max(0, course.places - reserved);
                const placesTxt = ` (${avail} place${avail>1?'s':''} restante${avail>1?'s':''})`;

                const info = document.createElement('div');
                info.className = 'course-info';
                const titre = document.createElement('span');
                titre.className = 'titre';
                titre.textContent = `${course.depart} → ${course.arrivee}`;
                info.appendChild(titre);
                const dateHeure = document.createElement('span');
                dateHeure.className = 'heure';
                dateHeure.textContent = `📅 ${course.date || ''} 🕐 ${course.heure || ''}`;
                info.appendChild(dateHeure);
                if (temps) { const ts = document.createElement('span');
                    ts.className = 'temps-restant';
                    ts.textContent = temps;
                    info.appendChild(ts); }
                const ps = document.createElement('span');
                ps.className = 'places-restantes';
                ps.textContent = placesTxt;
                info.appendChild(ps);
                const prixSpan = document.createElement('span');
                prixSpan.className = 'prix';
                prixSpan.textContent = `🪙 ${course.prix}`;
                info.appendChild(prixSpan);
                card.appendChild(info);

                const row = document.createElement('div');
                row.className = 'course-row';
                const grid = document.createElement('div');
                grid.className = 'seat-grid';
                const totalSeats = 8,
                    eff = Math.min(total, totalSeats),
                    res = course.reservations || [];
                const status = [];
                status[0] = 'driver';
                for (let i = 1; i < eff; i++) {
                    const r = res.find(r => r.placeIndex === i);
                    status[i] = r ? { type: 'reserved', email: r.email, nom: r.nom } : { type: 'available' };
                }
                for (let i = eff; i < totalSeats; i++) status[i] = { type: 'disabled' };
                const order = [0, 1, 2, 3, 4, 5, 6, 7];
                for (const idx of order) {
                    const seat = document.createElement('div');
                    seat.className = 'seat';
                    seat.dataset.placeIndex = idx;
                    seat.dataset.courseId = course.id;
                    const s = status[idx];
                    if (idx === 0 && profilePhoto) {
                        seat.classList.add('driver', 'has-profile');
                        seat.style.backgroundImage = `url(${profilePhoto})`;
                        seat.style.backgroundColor = 'rgba(0,0,0,0.3)';
                        seat.dataset.status = 'driver';
                    } else if (typeof s === 'string') {
                        if (s === 'driver') seat.classList.add('driver');
                        else if (s === 'disabled') seat.classList.add('disabled');
                        seat.dataset.status = s;
                    } else if (s.type === 'available') { seat.classList.add('available');
                        seat.dataset.status = 'available'; } else if (s.type === 'reserved') { seat.classList.add(
                            'reserved');
                        seat.dataset.status = 'reserved';
                        seat.dataset.reservedEmail = s.email;
                        seat.dataset.reservedNom = s.nom; }
                    grid.appendChild(seat);
                }
                row.appendChild(grid);

                const photoContainer = document.createElement('div');
                photoContainer.className = 'car-photo' + (carPhoto ? '' : ' default');
                photoContainer.dataset.courseId = course.id;
                if (carPhoto) { const img = document.createElement('img');
                    img.src = carPhoto;
                    img.alt = 'Voiture';
                    photoContainer.appendChild(img); } else photoContainer.textContent = '🚗';

                // Long press delete
                let timer = null;
                const start = () => { timer = setTimeout(() => { if (currentUser && currentUser.role === 'chauffeur' &&
                                confirm('Supprimer cette course ?')) dbDelete('rides', course.id).then(() => { showToast(
                                '🗑️ Course supprimée');
                                // Le snapshot mettra à jour
                            }).catch(e => showToast('❌ Erreur', true)); }, 600); };
                const cancel = () => { if (timer) clearTimeout(timer);
                    timer = null; };
                photoContainer.addEventListener('mousedown', start);
                photoContainer.addEventListener('mouseup', cancel);
                photoContainer.addEventListener('mouseleave', cancel);
                photoContainer.addEventListener('touchstart', start, { passive: true });
                photoContainer.addEventListener('touchend', cancel, { passive: true });
                photoContainer.addEventListener('touchmove', cancel, { passive: true });
                photoContainer.addEventListener('contextmenu', e => e.preventDefault());
                row.appendChild(photoContainer);
                card.appendChild(row);
                coursesList.appendChild(card);
            });
        }

        // ============================================================
        // 9. ADMIN LISTS
        // ============================================================
        const renderAdminLists = async () => {
            try {
                const users = await fetchUsers();
                const chauffeurs = users.filter(u => u.role === 'chauffeur');
                const passagers = users.filter(u => u.role === 'passager');

                    div.addEventListener('click', () => openAdminEdit(c));
                    adminChauffeursList.appendChild(div);
                });
                adminPassagersList.innerHTML = '';

                else passagers.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerHTML = `<span>${p.nom} (${p.telephone})</span><span class="email">${p.email}</span>`;
                    div.addEventListener('click', () => openAdminEdit(p));
                    adminPassagersList.appendChild(div);
                });
                await renderSpotsList();
            } catch (e) { showToast('❌ Erreur chargement utilisateurs', true);
                console.error(e); }
        };

        const renderSpotsList = async () => {
            try {
                const spots = await fetchSpots();
                adminSpotsList.innerHTML = '';
                if (!spots.length) adminSpotsList.innerHTML = '<div class="item">Aucun spot</div>';
                else spots.forEach(s => {

                                console.error(err); }

                    };
                    div.appendChild(del);
                    adminSpotsList.appendChild(div);
                });
            } catch (e) { showToast('❌ Erreur chargement spots', true);
                console.error(e); }
        };

        // ============================================================
        // 10. ADMIN EDIT MODAL
        // ============================================================
        const openAdminEdit = (user) => {
            adminEditTargetEmail = user.email;
            adminEditUserInfo.textContent = `Édition de ${user.nom} (${user.email})`;

            if (adminEditCarCropper) { adminEditCarCropper.destroy();
                adminEditCarCropper = null; }
            if (adminEditProfileCropper) { adminEditProfileCropper.destroy();
                adminEditProfileCropper = null; }
            adminEditCarCropContainer.style.display = 'none';

            adminEditCarPhotoInput.value = '';
            adminEditProfilePhotoInput.value = '';
            modalAdminEdit.classList.add('active');
        };

        adminEditCarPhotoInput.addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                adminEditCarCropImage.src = ev.target.result;
                adminEditCarCropContainer.style.display = 'block';
                if (adminEditCarCropper) adminEditCarCropper.destroy();
                adminEditCarCropper = new Cropper(adminEditCarCropImage, { aspectRatio: 3 / 2, viewMode: 1, dragMode: 'move',
                    autoCropArea: 0.8, restore: false, guides: true, center: true, highlight: false,
                    cropBoxMovable: true, cropBoxResizable: false, toggleDragModeOnDblclick: false,

                    minContainerHeight: 150 });

            reader.readAsDataURL(file);

        adminEditProfilePhotoInput.addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                adminEditProfileCropImage.src = ev.target.result;
                adminEditProfileCropContainer.style.display = 'block';
                if (adminEditProfileCropper) adminEditProfileCropper.destroy();
                adminEditProfileCropper = new Cropper(adminEditProfileCropImage, { aspectRatio: 1 / 1, viewMode: 1,
                    dragMode: 'move', autoCropArea: 0.8, restore: false, guides: true, center: true,
                    highlight: false, cropBoxMovable: true, cropBoxResizable: false, toggleDragModeOnDblclick: false,
                    zoomOnWheel: true, zoomOnTouch: true, wheelZoomRatio: 0.1, minContainerWidth: 200,
                    minContainerHeight: 150 });
            };
            reader.readAsDataURL(file);
        });

        const saveAdminEdit = async () => {
            if (!adminEditTargetEmail) return showToast('⚠️ Aucun utilisateur', true);
            const nom = adminEditNom.value.trim(),
                tel = adminEditTelephone.value.trim(),
                credits = parseInt(adminEditCredits.value);
            if (!nom || !tel || isNaN(credits) || credits < 0) return showToast('⚠️ Nom, téléphone, crédits valides', true);
            const btn = btnAdminEditSave,
                orig = btn.textContent;
            showLoader(btn);
            try {
                await dbUpdate('users', adminEditTargetEmail, { nom, telephone: tel, credits });
                let carURL = null,
                    profURL = null;
                if (adminEditCarCropper) {
                    const canvas = adminEditCarCropper.getCroppedCanvas({ width: 800, height: 533, imageSmoothingQuality: 'high' });
                    if (canvas) {
                        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
                        if (blob) {

                            const res = await fetch('https://api.cloudinary.com/v1_1/y6u9peta/image/upload', { method: 'POST',
                                body: fd });
                            const data = await res.json();
                            if (res.ok) carURL = data.secure_url;
                        }
                    }
                }
                if (adminEditProfileCropper) {
                    const canvas = adminEditProfileCropper.getCroppedCanvas({ width: 400, height: 400, imageSmoothingQuality: 'high' });
                    if (canvas) {
                        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
                        if (blob) {
                            const fd = new FormData();
                            fd.append('file', blob, 'profile.jpg');
                            fd.append('upload_preset', 'machikey');
                            fd.append('folder', 'machi');
                            fd.append('cloud_name', 'y6u9peta');
                            const res = await fetch('https://api.cloudinary.com/v1_1/y6u9peta/image/upload', { method: 'POST',
                                body: fd });
                            const data = await res.json();
                            if (res.ok) profURL = data.secure_url;
                        }
                    }
                }
                if (carURL) await dbUpdate('users', adminEditTargetEmail, { photoURL: carURL });
                if (profURL) await dbUpdate('users', adminEditTargetEmail, { profilePhotoURL: profURL });
                if (currentUser && currentUser.email === adminEditTargetEmail) { currentUser.credits = credits;
                    creditsBadge.textContent = `🪙 ${credits}`; }
                showToast('✅ Utilisateur mis à jour');
                closeModal(modalAdminEdit);
                renderAdminLists();
                // Le snapshot rafraîchira les courses
            } catch (e) { showToast('❌ Erreur : ' + e.message, true);
                console.error(e); }
            hideLoader(btn, orig);
        };

        // ============================================================
        // 11. SPOTS MODAL
        // ============================================================
        const renderSpotsListModal = async () => {
            const container = adminSpotsListContainer;
            container.innerHTML = '';
            const spots = await fetchSpots();
            if (!spots.length) container.innerHTML = '<div class="item">Aucun spot</div>';
            else spots.forEach(s => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span>${s.nom}</span><span class="email">${s.latitude}, ${s.longitude}</span>`;
                const del = document.createElement('button');
                del.textContent = '✕';
                del.style.cssText = 'background:none;border:none;color:#ff6b6b;cursor:pointer';
                del.onclick = async (e) => {
                    e.stopPropagation();
                    if (confirm(`Supprimer le spot "${s.nom}" ?`)) {
                        try { await dbDelete('spots', s.id);
                            showToast('🗑️ Spot supprimé');
                            renderSpotsListModal();
                            renderSpotsList(); } catch (err) { showToast('❌ Erreur suppression', true);
                            console.error(err); }
                    }
                };
                div.appendChild(del);
                container.appendChild(div);
            });
        };

        const openSpotsModal = async () => {
            modalAdminSpots.classList.add('active');
            adminSpotNom.value = '';
            adminSpotLat.value = '';
            adminSpotLon.value = '';
            await renderSpotsListModal();
        };
        const addSpot = async () => {
            const nom = adminSpotNom.value.trim(),
                lat = parseFloat(adminSpotLat.value.trim()),
                lon = parseFloat(adminSpotLon.value.trim());
            if (!nom || isNaN(lat) || isNaN(lon)) return showToast('⚠️ Remplissez tous les champs', true);
            try {
                await dbAdd('spots', { nom, latitude: lat, longitude: lon });
                showToast('✅ Spot ajouté');
                renderSpotsListModal();
                renderSpotsList();
                adminSpotNom.value = '';
                adminSpotLat.value = '';
                adminSpotLon.value = '';
            } catch (e) { showToast('❌ Erreur : ' + e.message, true);
                console.error(e); }
        };

        btnGetLocation.addEventListener('click', async function() {
            const orig = this.textContent;
            this.textContent = '⏳ Localisation…';
            this.classList.add('pulsing');
            this.disabled = true;
            try {
                const { lat, lon } = await getCurrentPos();
                adminSpotLat.value = lat.toFixed(6);
                adminSpotLon.value = lon.toFixed(6);
                showToast('✅ Coordonnées mises à jour');
            } catch (e) {
                let msg = 'Erreur de géolocalisation';
                if (e.code === 1) msg = 'Permission refusée';
                else if (e.code === 2) msg = 'Position indisponible';
                else if (e.code === 3) msg = 'Délai dépassé';
                else msg = e.message;
                showToast('❌ ' + msg, true);
            } finally {
                this.textContent = orig;
                this.classList.remove('pulsing');
                this.disabled = false;
            }
        });
        btnAdminSpotAdd.addEventListener('click', addSpot);
        btnAdminSpotCancel.addEventListener('click', () => closeModal(modalAdminSpots));
        modalAdminSpots.addEventListener('click', (e) => { if (e.target === modalAdminSpots) closeModal(modalAdminSpots); });

        // ============================================================
        // 12. SEAT CLICK & RESERVATION (modifié pour utiliser le snapshot)
        // ============================================================
        coursesList.addEventListener('click', async (e) => {
            const seat = e.target.closest('.seat');
            if (!seat) return;
            const status = seat.dataset.status,
                courseId = seat.dataset.courseId,
                placeIndex = parseInt(seat.dataset.placeIndex);
            if (!currentUser || currentUser.role === 'admin') return;

            if (currentUser.role === 'chauffeur') {
                if (status === 'reserved') {
                    const nom = seat.dataset.reservedNom;
                    if (nom) {
                        tooltipCourseId = courseId;
                        tooltipPlaceIndex = placeIndex;
                        const rect = seat.getBoundingClientRect();
                        tooltip.style.left = (rect.left + rect.width / 2 - 75) + 'px';
                        tooltip.style.top = (rect.top - 10) + 'px';
                        tooltip.style.display = 'flex';
                        tooltip.querySelector('.nom').textContent = `👤 ${nom}`;
                    } else tooltip.style.display = 'none';
                } else tooltip.style.display = 'none';
            } else if (currentUser.role === 'passager') {
                if (status === 'available') {
                    try {
                        const rides = await fetchRides();
                        const course = rides.find(r => r.id === courseId);
                        if (!course) return;
                        const reservations = course.reservations || [];
                        if (reservations.some(r => r.email === currentUser.email)) return showToast('❌ Déjà réservé', true);
                        reservations.push({ email: currentUser.email, nom: currentUser.nom, placeIndex });
                        await dbUpdate('rides', courseId, { reservations });
                        showToast(`✅ Place réservée pour ${currentUser.nom}`);
                        // Le snapshot mettra à jour
                    } catch (err) { showToast('❌ Erreur réservation', true);
                        console.error(err); }
                } else if (status === 'reserved') {
                    const reservedEmail = seat.dataset.reservedEmail;
                    if (reservedEmail === currentUser.email) {
                        try {
                            const rides = await fetchRides();
                            const course = rides.find(r => r.id === courseId);
                            if (!course) return;
                            const reservations = course.reservations || [];
                            const idx = reservations.findIndex(r => r.placeIndex === placeIndex && r.email === currentUser
                            .email);
                            if (idx !== -1) { reservations.splice(idx, 1);
                                await dbUpdate('rides', courseId, { reservations });
                                showToast('🗑️ Réservation annulée'); }
                        } catch (err) { showToast('❌ Erreur annulation', true);
                            console.error(err); }
                    } else showToast('ℹ️ Réservé par un autre', false);
                }
            }
        });

        btnSupprimerResa.addEventListener('click', async () => {
            if (!tooltipCourseId || tooltipPlaceIndex === null) return;
            try {
                const rides = await fetchRides();
                const course = rides.find(r => r.id === tooltipCourseId);
                if (!course) return;
                const reservations = course.reservations || [];
                const idx = reservations.findIndex(r => r.placeIndex === tooltipPlaceIndex);
                if (idx !== -1) { reservations.splice(idx, 1);
                    await dbUpdate('rides', tooltipCourseId, { reservations });
                    showToast('🗑️ Place libérée');
                    tooltip.style.display = 'none'; }
            } catch (e) { showToast('❌ Erreur suppression réservation', true);
                console.error(e); }
        });

        // ============================================================
        // 13. START RIDE
        // ============================================================
        btnStartRide.addEventListener('click', async function() {
            const rideId = this.dataset.rideId;
            if (!rideId) return;
            try {
                await dbUpdate('rides', rideId, { started: true, startedAt: new Date().toISOString() });
                showToast('🚀 Trajet commencé !');
                btnStartRide.style.display = 'none';
                if (watchId) { navigator.geolocation.clearWatch(watchId);
                    watchId = null; }
                // Le snapshot mettra à jour
            } catch (e) { showToast('❌ Erreur démarrage', true);
                console.error(e); }
        });

        // ============================================================
        // 14. TOGGLE ADMIN LISTS
        // ============================================================
        const toggleList = (el) => {
            if (el.style.display === 'block') el.style.display = 'none';
            else { [adminChauffeursList, adminPassagersList, adminSpotsList].forEach(l => l.style.display = 'none');
                el.style.display = 'block'; }
        };
        btnAdminChauffeurs.addEventListener('click', () => { renderAdminLists();
            toggleList(adminChauffeursList); });
        btnAdminPassagers.addEventListener('click', () => { renderAdminLists();
            toggleList(adminPassagersList); });
        btnAdminSpots.addEventListener('click', openSpotsModal);

        // ============================================================
        // 15. AUTH HANDLERS
        // ============================================================
        const handleLogin = async () => {
            const email = loginEmail.value.trim(),
                pw = loginPassword.value.trim();
            if (!email || !pw) return showToast('⚠️ Remplissez tous les champs', true);
            if (email === 'admin@gmail.com' && pw === 'admin123') {
                currentUser = { nom: 'Admin', email: 'admin@gmail.com', role: 'admin' };
                showToast('✅ Bienvenue Admin');
                closeModal(modalConnexion);
                showMain(currentUser);
                return;
            }
            if (!isOnline()) return showToast('📡 Pas de connexion', true);
            const btn = btnValiderConnexion,
                orig = btn.textContent;
            showLoader(btn);
            try {
                await auth.signInWithEmailAndPassword(email, pw);
                closeModal(modalConnexion);
                showToast('✅ Connexion réussie');
            } catch (e) {
                let msg = e.message;
                if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password') msg = 'Email ou mot de passe incorrect.';
                else if (e.message.includes('offline')) msg = 'Problème de connexion réseau.';
                showToast('❌ ' + msg, true);
                console.error(e);
            }
            hideLoader(btn, orig);
        };

        const handleInscription = async () => {
            const role = roleSelect.value,
                nom = nomInput.value.trim(),
                tel = telInput.value.trim(),
                email = emailInput.value.trim(),
                pw = pwdInput.value.trim();
            if (!nom || !tel || !email || !pw) return showToast('⚠️ Tous les champs obligatoires', true);
            if (!/^\d[\d\s]{7,}$/.test(tel.replace(/\s/g, ''))) return showToast('📞 Téléphone invalide', true);
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showToast('✉️ Email invalide', true);
            if (pw.length < 4) return showToast('🔒 Mot de passe : au moins 4 caractères', true);
            if (!isOnline()) return showToast('📡 Pas de connexion', true);
            const btn = btnValiderInscription,
                orig = btn.textContent;
            showLoader(btn);
            try {
                await auth.createUserWithEmailAndPassword(email, pw);
                await dbSet('users', email, { nom, telephone: tel, email, role, credits: 100, dateInscription: new Date()
                        .toISOString() });
                showToast(`✅ Compte ${role} « ${nom} » créé !`);
                closeModal(modalInscription);
            } catch (e) {
                let msg = e.message;
                if (e.code === 'auth/email-already-in-use') msg = 'Cet email est déjà utilisé.';
                else if (e.code === 'auth/weak-password') msg = 'Mot de passe trop faible (min 6 caractères).';
                else if (e.message.includes('offline') || e.message.includes('network')) msg = 'Problème de connexion réseau.';
                showToast('❌ ' + msg, true);
                console.error(e);
            }
            hideLoader(btn, orig);
        };

        const logout = async () => {
            try {
                await auth.signOut();
                currentUser = null;
                showHome();
                showToast('🔓 Déconnecté');
                tooltip.style.display = 'none';
                if (watchId) { navigator.geolocation.clearWatch(watchId);
                    watchId = null; }
                btnStartRide.style.display = 'none';
                if (ridesUnsubscribe) { ridesUnsubscribe();
                    ridesUnsubscribe = null; }
                if (usersUnsubscribe) { usersUnsubscribe();
                    usersUnsubscribe = null; }
            } catch (e) { showToast('❌ Erreur déconnexion', true);
                console.error(e); }
        };

        // ============================================================
        // 16. CREATE COURSE (avec date)
        // ============================================================
        const populateSpotSelects = async () => {
            const spots = await fetchSpots();
            [courseDepart, courseArrivee].forEach(sel => {
                sel.innerHTML = '<option value="">-- Choisir --</option>';
                spots.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.nom;
                    opt.dataset.lat = s.latitude;
                    opt.dataset.lon = s.longitude;
                    opt.textContent = s.nom;
                    sel.appendChild(opt);
                });
            });
        };

        btnCreateCourse.addEventListener('click', async () => {
            await populateSpotSelects();
            modalCreateCourse.classList.add('active');
            courseDate.value = new Date().toISOString().split('T')[0];
            courseHeure.value = '';
            coursePrix.value = '';
            coursePlaces.value = '';
            courseDepart.value = '';
            courseArrivee.value = '';
        });

        const handleCreateCourse = async () => {
            const date = courseDate.value,
                dep = courseDepart.value,
                arr = courseArrivee.value,
                heure = courseHeure.value,
                prix = parseInt(coursePrix.value),
                places = parseInt(coursePlaces.value);
            if (!date || !dep || !arr || !heure || isNaN(prix) || isNaN(places))
                return showToast('⚠️ Tous les champs requis', true);
            if (prix < 1) return showToast('💰 Prix invalide', true);
            if (places < 1 || places > 7) return showToast('👥 Places entre 1 et 7', true);
            const depOpt = courseDepart.querySelector(`option[value="${dep}"]`),
                arrOpt = courseArrivee.querySelector(`option[value="${arr}"]`);
            if (!depOpt || !arrOpt) return showToast('⚠️ Spots invalides', true);
            if (!currentUser) return showToast('❌ Connectez-vous', true);
            if (!isOnline()) return showToast('📡 Pas de connexion', true);
            const btn = btnValiderCourse,
                orig = btn.textContent;
            showLoader(btn);
            try {
                const data = {
                    chauffeurEmail: currentUser.email,
                    date: date,
                    depart: dep,
                    arrivee: arr,
                    departLat: parseFloat(depOpt.dataset.lat),
                    departLon: parseFloat(depOpt.dataset.lon),
                    arriveeLat: parseFloat(arrOpt.dataset.lat),
                    arriveeLon: parseFloat(arrOpt.dataset.lon),
                    heure: heure,
                    prix: prix,
                    places: places,
                    reservations: [],
                    started: false,
                    dateCreation: new Date().toISOString()
                };
                await dbAdd('rides', data);
                showToast(`✅ Course créée : ${dep} → ${arr}`);
                closeModal(modalCreateCourse);
                // Le snapshot mettra à jour
            } catch (e) { showToast('❌ Erreur : ' + e.message, true);
                console.error(e); }
            hideLoader(btn, orig);
        };

        // ============================================================
        // 17. STATS
        // ============================================================
        const updateStats = async () => {
            try { const snap = await dbGet('users');
                stats.textContent = `👤 ${snap.size} inscrit${snap.size > 1 ? 's' : ''}`; } catch { stats.textContent =
                    '👤 ? inscrits (hors ligne)'; }
        };

        // ============================================================
        // 18. SESSION
        // ============================================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const doc = await dbGet('users', user.email);
                    if (doc.exists) {
                        const data = doc.data();
                        currentUser = { ...data, email: user.email };
                        updateUserLocation(user.email);
                        showMain(currentUser);
                    } else {
                        await auth.signOut();
                        currentUser = null;
                        showHome();
                        showToast('❌ Utilisateur introuvable dans la base', true);
                    }
                } catch (e) {
                    console.error(e);
                    currentUser = { email: user.email, nom: user.displayName || 'Utilisateur', role: 'passager' };
                    showMain(currentUser);
                    showToast('📡 Profil minimal (hors ligne)', false);
                }
            } else {
                currentUser = null;
                showHome();
            }
        });

        // ============================================================
        // 19. SEED DEMO USERS
        // ============================================================
        (async () => {
            const demos = [
                { email: 'chauffeur@gmail.com', password: 'chauffeur123', nom: 'Chauffeur Test', telephone: '0555000001',
                    role: 'chauffeur' },
                { email: 'passager@gmail.com', password: 'passager123', nom: 'Passager Test', telephone: '0555000002',
                    role: 'passager' }
            ];
            for (const u of demos) {
                try {
                    const doc = await dbGet('users', u.email);
                    if (!doc.exists) {
                        await auth.createUserWithEmailAndPassword(u.email, u.password);
                        await dbSet('users', u.email, { nom: u.nom, telephone: u.telephone, email: u.email, role: u.role,
                            credits: 100, dateInscription: new Date().toISOString() });
                    }
                } catch (e) { if (e.code === 'auth/email-already-in-use') {
                        const doc = await dbGet('users', u.email);
                        if (!doc.exists) await dbSet('users', u.email, { nom: u.nom, telephone: u.telephone, email: u.email,
                                role: u.role, credits: 100, dateInscription: new Date().toISOString() });
                    } }
            }
        })();

        // ============================================================
        // 20. EVENT LISTENERS
        // ============================================================
        btnInscription.addEventListener('click', () => { modalInscription.classList.add('active');
            nomInput.value = '';
            telInput.value = '';
            emailInput.value = '';
            pwdInput.value = '';
            roleSelect.value = 'passager';
            nomInput.focus(); });
        btnAnnulerInscription.addEventListener('click', () => closeModal(modalInscription));
        modalInscription.addEventListener('click', (e) => { if (e.target === modalInscription) closeModal(modalInscription); });
        [nomInput, telInput, emailInput, pwdInput, roleSelect].forEach(el => el.addEventListener('keydown', (e) => { if (e
                    .key === 'Enter') handleInscription(); }));
        btnValiderInscription.addEventListener('click', handleInscription);

        btnConnexion.addEventListener('click', () => { modalConnexion.classList.add('active');
            loginEmail.value = '';
            loginPassword.value = '';
            loginEmail.focus(); });
        btnAnnulerConnexion.addEventListener('click', () => closeModal(modalConnexion));
        modalConnexion.addEventListener('click', (e) => { if (e.target === modalConnexion) closeModal(modalConnexion); });
        [loginEmail, loginPassword].forEach(el => el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); }));
        btnValiderConnexion.addEventListener('click', handleLogin);

        btnLogout.addEventListener('click', logout);

        btnAnnulerCourse.addEventListener('click', () => closeModal(modalCreateCourse));
        modalCreateCourse.addEventListener('click', (e) => { if (e.target === modalCreateCourse) closeModal(modalCreateCourse); });
        [courseDate, courseHeure, coursePrix, coursePlaces, courseDepart, courseArrivee].forEach(el => el.addEventListener('keydown',
            (e) => { if (e.key === 'Enter') handleCreateCourse(); }));
        btnValiderCourse.addEventListener('click', handleCreateCourse);

        btnAdminEditSave.addEventListener('click', saveAdminEdit);
        btnAdminEditCancel.addEventListener('click', () => closeModal(modalAdminEdit));
        modalAdminEdit.addEventListener('click', (e) => { if (e.target === modalAdminEdit) closeModal(modalAdminEdit); });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (modalInscription.classList.contains('active')) closeModal(modalInscription);
                else if (modalConnexion.classList.contains('active')) closeModal(modalConnexion);
                else if (modalCreateCourse.classList.contains('active')) closeModal(modalCreateCourse);
                else if (modalAdminEdit.classList.contains('active')) closeModal(modalAdminEdit);
                else if (modalAdminSpots.classList.contains('active')) closeModal(modalAdminSpots);
            }
        });

        setInterval(updateStats, 30000);
        console.log('✅ Machi ready – realtime + date');
    </script>
</body>
</html>
