<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Machi – Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0a0d1a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
        }
        .glass-card, #mainInterface {
            background: rgba(20, 25, 45, 0.6);
            backdrop-filter: blur(12px) saturate(160%);
            -webkit-backdrop-filter: blur(12px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            padding: 1rem 0.6rem;
            width: 100%;
            max-width: 480px;
            transition: opacity 0.3s ease;
        }
        #mainInterface {
            display: none;
            max-width: 480px;
            min-height: 60vh;
            position: relative;
            padding-bottom: 5rem;
        }
        #mainInterface.active { display: block; }
        .btn-led {
            background: #1e2a4a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 0.4rem 1rem;
            font-weight: 600;
            font-size: 0.8rem;
            color: #d6eaff;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            text-align: center;
            display: inline-block;
        }
        .btn-led:hover { background: #2b3b66; color: #fff; }
        .btn-led:active { background: #16203a; }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 0.6rem;
            flex-wrap: wrap;
        }
        .header-actions .btn-logout,
        .header-actions .btn-create {
            background: rgba(255,70,70,0.10);
            border: 1px solid rgba(255,70,70,0.15);
            border-radius: 40px;
            padding: 0.15rem 0.6rem;
            color: #ffb0b0;
            font-size: 0.65rem;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
        }
        .header-actions .btn-create {
            background: rgba(0,180,170,0.10);
            border-color: rgba(0,180,170,0.15);
            color: #a0f0e8;
        }
        .header-actions .btn-logout:hover { background: rgba(255,70,70,0.2); }
        .header-actions .btn-create:hover { background: rgba(0,180,170,0.2); }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: rgba(18,24,44,0.85);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1.5rem;
            padding: 1.2rem 0.8rem;
            max-width: 420px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content label {
            color: #b0c8e8;
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 0.4rem;
            display: block;
        }
        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 0.3rem 0.7rem;
            margin-top: 0.1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: #e8f0ff;
            font-size: 0.85rem;
            outline: none;
            transition: border 0.15s;
        }
        .modal-content input:focus { border-color: #4a8cff; }
        .modal-content input::placeholder { color: #6a7a9a; }
        .btn-validate { background: #00807a; border-color: #00a39a; color: #fff; }
        .btn-validate:hover { background: #00a39a; }
        .btn-cancel { background: rgba(255,70,70,0.12); border-color: rgba(255,70,70,0.2); color: #ffb0b0; }
        .btn-cancel:hover { background: rgba(255,70,70,0.22); }

        .courses-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-top: 0.6rem;
        }
        .course-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 0.8rem;
            padding: 0.4rem 0.6rem;
            width: 100%;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
            position: relative;
        }
        .course-card:hover { background: rgba(255,255,255,0.06); }
        .course-info {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.2rem 0.4rem;
            margin-bottom: 0.2rem;
        }
        .course-info .titre {
            font-weight: 600;
            font-size: 0.8rem;
            color: #d6eaff;
            flex: 1 1 auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .course-info .heure {
            font-size: 0.65rem;
            color: #8aa0c8;
            white-space: nowrap;
        }
        .course-info .heure .temps-restant {
            color: #fbbf24; /* jaune ambre */
            font-weight: 500;
            margin-left: 0.2rem;
        }
        .course-info .prix {
            font-size: 0.65rem;
            color: #b0c8e8;
            white-space: nowrap;
            font-weight: 500;
        }
        .course-info .places-restantes {
            font-size: 0.65rem;
            color: #6ee7b7; /* vert clair */
            white-space: nowrap;
            font-weight: 500;
            margin-left: 0.2rem;
        }

        /* --- Rangée : carreaux + image --- */
        .course-row {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            width: 100%;
        }

        /* --- GRILLE 4×2 AVEC REMPLISSAGE PAR COLONNES --- */
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 0.15rem;
            flex: 4;
            grid-auto-flow: column;
        }
        .seat {
            aspect-ratio: 1 / 1;
            border-radius: 4px;
            border: 1.5px solid rgba(255,255,255,0.10);
            width: 100%;
            cursor: default;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        .seat.driver {
            background-color: #00b8b0;
            border-color: #00d4cc;
            box-shadow: 0 0 6px rgba(0,200,180,0.2);
            cursor: default;
        }
        .seat.driver.has-profile {
            background-color: transparent;
            border-color: #00d4cc;
        }
        .seat.available {
            background: transparent;
            border-color: rgba(255,255,255,0.25);
            cursor: pointer;
        }
        .seat.available:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.5);
        }
        .seat.reserved {
            background: #b44cff;
            border-color: #b44cff;
            box-shadow: 0 0 6px rgba(180,76,255,0.3);
            cursor: pointer;
        }
        .seat.reserved:hover {
            filter: brightness(1.15);
        }
        .seat.disabled {
            background: rgba(255,255,255,0.02);
            border-color: rgba(255,255,255,0.03);
            opacity: 0.15;  /* ← encore plus discret */
            cursor: default;
        }

        .car-photo {
            flex: 3;
            border-radius: 6px;
            overflow: hidden;
            background: rgba(255,255,255,0.03);
            border: 1.5px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #6a7a9a;
            cursor: default;
            position: relative;
            min-height: 40px;
        }
        .car-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .car-photo.default {
            font-size: 1.6rem;
            background: rgba(255,255,255,0.02);
        }
        @media (max-width: 380px) {
            .car-photo { font-size: 1.2rem; }
            .course-row { gap: 0.6rem; }
            .seat-grid { gap: 0.1rem; }
            .seat { border-width: 1px; }
        }

        /* --- Admin --- */
        .admin-panel { margin-top: 0.6rem; }
        .admin-panel .btn-admin {
            background: #1e2a4a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 60px;
            padding: 0.4rem 1rem;
            color: #d6eaff;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            text-align: center;
            font-weight: 600;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
        }
        .admin-panel .btn-admin:hover { background: #2b3b66; }
        .admin-panel .btn-admin.active { background: #2b3b66; border-color: #4a8cff; }
        .admin-list {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 0.6rem;
            padding: 0.4rem;
            margin-top: 0.3rem;
            max-height: 150px;
            overflow-y: auto;
        }
        .admin-list .item {
            display: flex;
            justify-content: space-between;
            padding: 0.2rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.75rem;
            color: #b0c8e8;
            cursor: pointer;
            transition: background 0.2s;
        }
        .admin-list .item:hover { background: rgba(255,255,255,0.05); }
        .admin-list .item:last-child { border-bottom: none; }
        .admin-list .item .email { color: #8aa0c8; font-size: 0.65rem; }

        /* --- Cropper --- */
        .crop-container {
            width: 100%;
            margin: 0.3rem 0;
            display: none;
            min-height: 150px;
        }
        .crop-container img {
            max-width: 100%;
            display: block;
        }

        /* --- Tooltip --- */
        .tooltip-reservation {
            position: fixed;
            background: rgba(18,24,44,0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.4rem 0.6rem;
            color: #e8f0ff;
            font-size: 0.75rem;
            display: none;
            z-index: 60;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            min-width: 120px;
            align-items: center;
            gap: 0.4rem;
            pointer-events: auto;
        }
        .tooltip-reservation .nom { flex: 1; }
        .tooltip-reservation .btn-supprimer {
            background: rgba(255,70,70,0.2);
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            color: #ffb0b0;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .tooltip-reservation .btn-supprimer:hover { background: rgba(255,70,70,0.4); }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,180,170,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,255,200,0.15);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            color: #c0fff0;
            font-weight: 500;
            display: none;
            z-index: 100;
            font-size: 0.8rem;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { display: block; }
        #homeScreen .btn-led { flex: 1; text-align: center; }
        .spinner {
            display: inline-block;
            width: 0.8rem;
            height: 0.8rem;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #00b8b0;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) {
            body { padding: 0.3rem; }
            .glass-card, #mainInterface { padding: 0.6rem 0.4rem; border-radius: 1rem; }
            .modal-content { padding: 1rem 0.6rem; }
            .course-info .titre { font-size: 0.75rem; }
            .header-actions .btn-logout,
            .header-actions .btn-create { font-size: 0.6rem; padding: 0.15rem 0.5rem; }
        }
    </style>
</head>
<body>
    <!-- ========== ÉCRAN D'ACCUEIL ========== -->
    <div id="homeScreen" class="glass-card">
        <h1 class="text-xl font-bold text-center text-cyan-200 mb-0.5">Machi</h1>
        <p class="text-center text-slate-400 text-xs mb-4 tracking-wider">⚡ mobilité en circuit fermé</p>
        <div class="flex flex-col sm:flex-row gap-2">
            <button id="btnInscription" class="btn-led">✨ S'inscrire</button>
            <button id="btnConnexion" class="btn-led">🔐 Se connecter</button>
        </div>
        <div class="mt-3 text-center text-xs text-slate-500">
            <span id="stats">👤 0 inscrits</span>
        </div>
    </div>

    <!-- ========== INTERFACE PRINCIPALE ========== -->
    <div id="mainInterface">
        <div class="header-actions">
            <div class="text-slate-400 text-xs truncate" id="userRoleBadge">Rôle : —</div>
            <div style="display:flex; gap:0.3rem; flex-wrap:wrap;">
                <button id="btnCreateCourse" class="btn-create" style="display:none;">➕ Créer</button>
                <button id="btnLogout" class="btn-logout">✕ Déconnexion</button>
            </div>
        </div>

        <h2 id="welcomeMessage" class="text-base font-semibold text-cyan-200 mb-0.5">Bienvenue</h2>
        <hr class="border-white/5 my-1.5" />

        <div id="mainContent">
            <div id="coursesContainer">
                <p class="text-slate-500 text-center text-xs" id="noCoursesMsg">Aucune course pour le moment.</p>
                <div id="coursesList" class="courses-list"></div>
            </div>
            <div id="adminPanel" class="admin-panel" style="display:none;">
                <button id="btnAdminChauffeurs" class="btn-admin">🚗 Chauffeurs</button>
                <div id="adminChauffeursList" class="admin-list" style="display:none;"></div>
                <button id="btnAdminPassagers" class="btn-admin">🚶 Passagers</button>
                <div id="adminPassagersList" class="admin-list" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- ========== MODALE ADMIN ÉDITION ========== -->
    <div id="modalAdminEdit" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">✏️ Modifier l'utilisateur</h2>
            <div id="adminEditUserInfo" class="text-xs text-slate-400 mb-2">Chargement...</div>

            <label>Nom</label>
            <input type="text" id="adminEditNom" placeholder="Nom" />

            <label>Téléphone</label>
            <input type="tel" id="adminEditTelephone" placeholder="0555 12 34 56" />

            <label>Email (non modifiable)</label>
            <input type="email" id="adminEditEmail" disabled />

            <label>Rôle</label>
            <input type="text" id="adminEditRole" disabled />

            <div class="mt-3 border-t border-white/5 pt-2">
                <p class="text-xs text-cyan-200 font-medium mb-1">📸 Photos</p>

                <label class="text-xs">Photo de la voiture (3:2)</label>
                <input type="file" id="adminEditCarPhotoInput" accept="image/*" />
                <div id="adminEditCarCropContainer" class="crop-container">
                    <img id="adminEditCarCropImage" src="#" alt="Rogner" />
                </div>

                <label class="text-xs mt-2">Photo de profil (1:1)</label>
                <input type="file" id="adminEditProfilePhotoInput" accept="image/*" />
                <div id="adminEditProfileCropContainer" class="crop-container">
                    <img id="adminEditProfileCropImage" src="#" alt="Rogner" />
                </div>
            </div>

            <div class="flex gap-2 mt-4">
                <button id="btnAdminEditSave" class="btn-led btn-validate flex-1">💾 Enregistrer</button>
                <button id="btnAdminEditCancel" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <!-- ========== TOOLTIP ========== -->
    <div id="tooltipReservation" class="tooltip-reservation">
        <span class="nom">Passager</span>
        <button class="btn-supprimer" id="btnSupprimerResa">✕</button>
    </div>

    <!-- ========== MODALES AUTH & COURSES ========== -->
    <div id="modalInscription" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">Créer un compte</h2>
            <label>Je suis</label>
            <select id="role">
                <option value="passager">🚶 Passager</option>
                <option value="chauffeur">🚗 Chauffeur</option>
            </select>
            <label>Nom complet</label>
            <input type="text" id="nom" placeholder="ex: Karim Benali" />
            <label>Téléphone</label>
            <input type="tel" id="telephone" placeholder="0555 12 34 56" />
            <label>Email</label>
            <input type="email" id="email" placeholder="ex: farid@gmail.com" />
            <label>Mot de passe</label>
            <input type="password" id="motDePasse" placeholder="••••••••" />
            <div class="flex gap-2 mt-3">
                <button id="btnValiderInscription" class="btn-led btn-validate flex-1">✔ Valider</button>
                <button id="btnAnnulerInscription" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="modalConnexion" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">🔐 Se connecter</h2>
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="ex: farid@gmail.com" />
            <label>Mot de passe</label>
            <input type="password" id="loginPassword" placeholder="••••••••" />
            <div class="flex gap-2 mt-3">
                <button id="btnValiderConnexion" class="btn-led btn-validate flex-1">✔ Se connecter</button>
                <button id="btnAnnulerConnexion" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="modalCreateCourse" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-base font-semibold text-center text-cyan-200 mb-2">🚗 Nouvelle course</h2>
            <label>Départ</label>
            <input type="text" id="courseDepart" placeholder="ex: Tiaret" />
            <label>Arrivée</label>
            <input type="text" id="courseArrivee" placeholder="ex: Mahdia" />
            <label>Heure de départ</label>
            <input type="time" id="courseHeure" />
            <label>Prix (unités)</label>
            <input type="number" id="coursePrix" placeholder="ex: 12" min="1" />
            <label>Places (hors chauffeur, max 7)</label>
            <input type="number" id="coursePlaces" placeholder="ex: 3" min="1" max="7" />
            <div class="flex gap-2 mt-3">
                <button id="btnValiderCourse" class="btn-led btn-validate flex-1">✔ Confirmer</button>
                <button id="btnAnnulerCourse" class="btn-led btn-cancel flex-1">✖ Annuler</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ========================================================================
        // FIREBASE
        // ========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyACgeZXog1KZGU29HpjM4qpKTBt54KbJFg",
            authDomain: "machi-51024.firebaseapp.com",
            projectId: "machi-51024",
            storageBucket: "machi-51024.firebasestorage.app",
            messagingSenderId: "984764801380",
            appId: "1:984764801380:web:c082a0988bba3f899fda71",
            measurementId: "G-EDZXP8QF9Q"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        db.enablePersistence().catch(() => {});

        // ========================================================================
        // COMPTES DE TEST
        // ========================================================================
        async function seedDemoUsers() {
            const demoUsers = [
                { email: 'chauffeur@gmail.com', password: 'chauffeur123', nom: 'Chauffeur Test', telephone: '0555000001',
                    role: 'chauffeur' },
                { email: 'passager@gmail.com', password: 'passager123', nom: 'Passager Test', telephone: '0555000002',
                    role: 'passager' }
            ];
            for (const user of demoUsers) {
                try {
                    const doc = await db.collection('users').doc(user.email).get();
                    if (doc.exists) continue;
                    await auth.createUserWithEmailAndPassword(user.email, user.password);
                    await db.collection('users').doc(user.email).set({
                        nom: user.nom,
                        telephone: user.telephone,
                        email: user.email,
                        role: user.role,
                        dateInscription: new Date().toISOString()
                    }, { merge: true });
                } catch (error) {
                    if (error.code === 'auth/email-already-in-use') {
                        try {
                            const doc = await db.collection('users').doc(user.email).get();
                            if (!doc.exists) {
                                await db.collection('users').doc(user.email).set({
                                    nom: user.nom,
                                    telephone: user.telephone,
                                    email: user.email,
                                    role: user.role,
                                    dateInscription: new Date().toISOString()
                                }, { merge: true });
                            }
                        } catch (e) {}
                    }
                }
            }
        }

        // ========================================================================
        // RÉFÉRENCES DOM
        // ========================================================================
        const homeScreen = document.getElementById('homeScreen');
        const mainInterface = document.getElementById('mainInterface');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const userRoleBadge = document.getElementById('userRoleBadge');
        const stats = document.getElementById('stats');
        const coursesList = document.getElementById('coursesList');
        const noCoursesMsg = document.getElementById('noCoursesMsg');
        const coursesContainer = document.getElementById('coursesContainer');
        const adminPanel = document.getElementById('adminPanel');
        const btnAdminChauffeurs = document.getElementById('btnAdminChauffeurs');

            toast.style.color = isError ? '#ffb0b0' : '#c0fff0';
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showLoader(btn) {

            btn.disabled = false;

        // ========================================================================
        // FIRESTORE (CRUD)
        // ========================================================================
        async function firestoreGet(collection, docId = null) {
            try {
                if (!isOnline()) throw new Error('Hors ligne');
                const ref = docId ? db.collection(collection).doc(docId) : db.collection(collection);
                const snap = await ref.get();
                return snap;
            } catch (error) { throw error; }
        }

        async function firestoreSet(collection, docId, data) {
            try {
                if (!isOnline()) throw new Error('Hors ligne');
                await db.collection(collection).doc(docId).set(data, { merge: true });
            } catch (error) { throw error; }
        }

        async function firestoreAdd(collection, data) {
            try {
                if (!isOnline()) throw new Error('Hors ligne');
                const ref = await db.collection(collection).add(data);
                return ref.id;
            } catch (error) { throw error; }
        }

        async function firestoreUpdate(collection, docId, data) {
            try {
                if (!isOnline()) throw new Error('Hors ligne');
                await db.collection(collection).doc(docId).update(data);
            } catch (error) { throw error; }
        }

        async function firestoreDelete(collection, docId) {
            try {
                if (!isOnline()) throw new Error('Hors ligne');
                await db.collection(collection).doc(docId).delete();
            } catch (error) { throw error; }
        }

        async function fetchUsers() {
            try {
                const snap = await firestoreGet('users');
                const users = [];
                snap.forEach(doc => users.push({ id: doc.id, ...doc.data() }));
                return users;
            } catch { return []; }
        }

        async function fetchRides() {
            try {
                const snap = await firestoreGet('rides');
                const rides = [];
                snap.forEach(doc => rides.push({ id: doc.id, ...doc.data() }));
                return rides;
            } catch { return []; }
        }

        async function createRide(rideData) { return await firestoreAdd('rides', rideData); }
        async function updateRide(rideId, rideData) { await firestoreUpdate('rides', rideId, rideData); }
        async function deleteRide(rideId) { await firestoreDelete('rides', rideId); }

        async function countUsers() {
            try {
                const snap = await firestoreGet('users');
                return snap.size;
            } catch { return 0; }
        }

        async function updateStats() {
            try {
                const count = await countUsers();
                stats.textContent = `👤 ${count} inscrit${count > 1 ? 's' : ''}`;
            } catch {
                stats.textContent = '👤 ? inscrits (hors ligne)';
            }
        }

        // ========================================================================
        // RENDU DES COURSES (avec photo de profil sur le siège chauffeur)
        // ========================================================================
        async function renderCourses(user) {
            try {
                const allRides = await fetchRides();
                const allUsers = await fetchUsers();
                const userMap = {};
                allUsers.forEach(u => { userMap[u.email] = u; });

                let ridesToShow = [];
                if (user.role === 'chauffeur') {
                    ridesToShow = allRides.filter(r => r.chauffeurEmail === user.email);
                } else {
                    ridesToShow = allRides;
                }

                coursesList.innerHTML = '';
                if (ridesToShow.length === 0) {
                    noCoursesMsg.style.display = 'block';
                    coursesList.style.display = 'none';
                    return;
                }
                noCoursesMsg.style.display = 'none';
                coursesList.style.display = 'flex';

                // Calcul du temps restant pour chaque course
                const now = new Date();
                const todayStr = now.toISOString().split('T')[0];

                ridesToShow.forEach(course => {
                    const chauffeurData = userMap[course.chauffeurEmail] || {};
                    const carPhotoURL = chauffeurData.photoURL || null;
                    const profilePhotoURL = chauffeurData.profilePhotoURL || null;

                    const card = document.createElement('div');
                    card.className = 'course-card';
                    card.dataset.courseId = course.id;

                    // --- Calcul du temps restant ---
                    let tempsRestantStr = '';
                    let tempsRestantCouleur = '#fbbf24'; // ambre par défaut
                    if (course.heure) {
                        const [h, m] = course.heure.split(':').map(Number);
                        const departDate = new Date();
                        departDate.setHours(h, m, 0, 0);
                        const diffMs = departDate - now;
                        if (diffMs > 0) {
                            const diffMin = Math.floor(diffMs / 60000);
                            if (diffMin < 60) {
                                tempsRestantStr = `(${diffMin}min)`;
                            } else {
                                const diffH = Math.floor(diffMin / 60);
                                const diffM = diffMin % 60;
                                tempsRestantStr = `(${diffH}h${diffM > 0 ? diffM + 'min' : ''})`;
                            }
                        } else if (diffMs > -60000) {
                            tempsRestantStr = '(maintenant)';
                            tempsRestantCouleur = '#f87171'; // rouge si passé
                        } else {
                            tempsRestantStr = '(passée)';
                            tempsRestantCouleur = '#f87171'; // rouge
                        }
                    }

                    // --- Calcul des places restantes ---
                    const reservations = course.reservations || [];
                    const placesRestantes = course.places - reservations.length;
                    const placesStr = placesRestantes > 0 ? `🟢 ${placesRestantes}` : '🔴 complet';

                    // Info
                    const info = document.createElement('div');
                    info.className = 'course-info';
                    const titre = document.createElement('span');
                    titre.className = 'titre';
                    titre.textContent = `${course.depart} → ${course.arrivee}`;
                    info.appendChild(titre);

                    const heure = document.createElement('span');
                    heure.className = 'heure';
                    heure.textContent = `🕐 ${course.heure}`;
                    if (tempsRestantStr) {
                        const tempsSpan = document.createElement('span');
                        tempsSpan.className = 'temps-restant';
                        tempsSpan.textContent = tempsRestantStr;
                        tempsSpan.style.color = tempsRestantCouleur;
                        heure.appendChild(tempsSpan);
                    }
                    info.appendChild(heure);

                    const prix = document.createElement('span');
                    prix.className = 'prix';
                    prix.textContent = `💰 ${course.prix}`;
                    info.appendChild(prix);

                    const placesSpan = document.createElement('span');
                    placesSpan.className = 'places-restantes';
                    placesSpan.textContent = `👥 ${placesRestantes}`;
                    placesSpan.style.color = placesRestantes > 2 ? '#6ee7b7' : (placesRestantes > 0 ? '#fbbf24' : '#f87171');
                    info.appendChild(placesSpan);

                    card.appendChild(info);

                    // Ligne horizontale
                    const row = document.createElement('div');
                    row.className = 'course-row';

                    const grid = document.createElement('div');
                    grid.className = 'seat-grid';

                    const totalPlaces = course.places + 1;
                    const placesEffectives = Math.min(totalPlaces, 8);
                    const disabledCount = 8 - placesEffectives;
                    // reservations déjà récupérées

                    const placeStatus = [];
                    placeStatus[0] = 'driver';
                    for (let i = 1; i < placesEffectives; i++) {
                        const resa = reservations.find(r => r.placeIndex === i);
                        if (resa) {
                            placeStatus[i] = { type: 'reserved', email: resa.email, nom: resa.nom };
                        } else {
                            placeStatus[i] = { type: 'available' };
                        }
                    }
                    for (let i = placesEffectives; i < 8; i++) {
                        placeStatus[i] = { type: 'disabled' };
                    }

                    // Ordre naturel pour le remplissage des colonnes
                    const colonneOrdre = [0, 1, 2, 3, 4, 5, 6, 7];

                    for (let idx of colonneOrdre) {
                        const seat = document.createElement('div');
                        seat.className = 'seat';
                        seat.dataset.placeIndex = idx;
                        seat.dataset.courseId = course.id;

                        const status = placeStatus[idx];

                        if (idx === 0 && profilePhotoURL) {
                            seat.classList.add('driver', 'has-profile');
                            seat.style.backgroundImage = `url(${profilePhotoURL})`;
                            seat.style.backgroundColor = 'rgba(0,0,0,0.3)';
                            seat.dataset.status = 'driver';
                        } else if (typeof status === 'string') {
                            if (status === 'driver') {
                                seat.classList.add('driver');
                                seat.dataset.status = 'driver';
                            } else if (status === 'disabled') {
                                seat.classList.add('disabled');
                                seat.dataset.status = 'disabled';
                            }
                        } else if (status.type === 'available') {
                            seat.classList.add('available');
                            seat.dataset.status = 'available';
                        } else if (status.type === 'reserved') {
                            seat.classList.add('reserved');
                            seat.dataset.status = 'reserved';
                            seat.dataset.reservedEmail = status.email;
                            seat.dataset.reservedNom = status.nom;
                        }
                        grid.appendChild(seat);
                    }

                    row.appendChild(grid);

                    // Image de la voiture
                    const photoContainer = document.createElement('div');
                    photoContainer.className = 'car-photo' + (carPhotoURL ? '' : ' default');
                    photoContainer.dataset.courseId = course.id;
                    if (carPhotoURL) {
                        const img = document.createElement('img');
                        img.src = carPhotoURL;
                        img.alt = 'Voiture';
                        photoContainer.appendChild(img);
                    } else {
                        photoContainer.textContent = '🚗';
                    }

                    // Long-press pour supprimer
                    let longPressTimer = null;
                    const startLongPress = (e) => {
                        longPressTimer = setTimeout(() => {
                            handleLongPress(course.id, photoContainer);
                        }, 600);
                    };
                    const cancelLongPress = () => {
                        if (longPressTimer) {
                            clearTimeout(longPressTimer);
                            longPressTimer = null;
                        }
                    };
                    photoContainer.addEventListener('mousedown', startLongPress);
                    photoContainer.addEventListener('mouseup', cancelLongPress);
                    photoContainer.addEventListener('mouseleave', cancelLongPress);
                    photoContainer.addEventListener('touchstart', startLongPress, { passive: true });
                    photoContainer.addEventListener('touchend', cancelLongPress, { passive: true });
                    photoContainer.addEventListener('touchmove', cancelLongPress, { passive: true });
                    photoContainer.addEventListener('contextmenu', (e) => e.preventDefault());

                    row.appendChild(photoContainer);

                    card.appendChild(row);
                    coursesList.appendChild(card);
                });
            } catch (error) {
                showToast('❌ Erreur chargement des courses', true);
                console.error('renderCourses error:', error);
            }
        }

        // ========================================================================

                    })
                    .catch(err => {
                        showToast('❌ Erreur lors de la suppression', true);
                        console.error(err);
                    });
            }
        }

        async function saveAdminEdit() {
            if (!adminEditTargetEmail) {
                showToast('⚠️ Aucun utilisateur ciblé', true);
                return;
            }

            const nom = adminEditNom.value.trim();
            const telephone = adminEditTelephone.value.trim();
            if (!nom || !telephone) {
                showToast('⚠️ Nom et téléphone requis', true);
                return;
            }

            const btn = btnAdminEditSave;
            const originalText = btn.textContent;
            showLoader(btn);

            try {
                await db.collection('users').doc(adminEditTargetEmail).update({
                    nom: nom,
                    telephone: telephone
                });

                let carPhotoURL = null;
                let profilePhotoURL = null;

                if (adminEditCarCropper) {
                    const canvas = adminEditCarCropper.getCroppedCanvas({ width: 800, height: 533, imageSmoothingQuality: 'high' });
                    if (canvas) {
                        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.92));
                        if (blob) {
                            const formData = new FormData();
                            formData.append('file', blob, 'car_photo.jpg');
                            formData.append('upload_preset', 'machikey');
                            formData.append('folder', 'machi');
                            formData.append('cloud_name', 'y6u9peta');
                            const response = await fetch('https://api.cloudinary.com/v1_1/y6u9peta/image/upload', {
                                method: 'POST',
                                body: formData
                            });
                            const data = await response.json();
                            if (response.ok) {
                                carPhotoURL = data.secure_url;
                            }
                        }
                    }
                }

                if (adminEditProfileCropper) {
                    const canvas = adminEditProfileCropper.getCroppedCanvas({ width: 400, height: 400, imageSmoothingQuality: 'high' });
                    if (canvas) {
                        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.92));
                        if (blob) {
                            const formData = new FormData();
                            formData.append('file', blob, 'profile_photo.jpg');
                            formData.append('upload_preset', 'machikey');
                            formData.append('folder', 'machi');
                            formData.append('cloud_name', 'y6u9peta');
                            const response = await fetch('https://api.cloudinary.com/v1_1/y6u9peta/image/upload', {
                                method: 'POST',
                                body: formData
                            });
                            const data = await response.json();
                            if (response.ok) {
                                profilePhotoURL = data.secure_url;
                            }
                        }
                    }
                }

                const updateData = {};
                if (carPhotoURL) updateData.photoURL = carPhotoURL;
                if (profilePhotoURL) updateData.profilePhotoURL = profilePhotoURL;
                if (Object.keys(updateData).length > 0) {
                    await db.collection('users').doc(adminEditTargetEmail).update(updateData);

                showToast('✅ Utilisateur mis à jour');
                closeModalAdminEdit();

                if (currentUser && currentUser.role !== 'admin') {

                showToast('❌ Erreur : ' + error.message, true);
            }
            hideLoader(btn, originalText);
        }

        // ========================================================================
        // GESTION DES CLICS SUR LES PLACES
        // ========================================================================
        async function handleSeatClick(e) {
            const seat = e.target.closest('.seat');
            if (!seat) return;
            const status = seat.dataset.status;
            const courseId = seat.dataset.courseId;
            const placeIndex = parseInt(seat.dataset.placeIndex);
            if (!currentUser) return;
            if (currentUser.role === 'admin') return;

            if (currentUser.role === 'chauffeur') {
                if (status === 'reserved') {
                    const nom = seat.dataset.reservedNom;
                    if (nom) {
                        tooltipCourseId = courseId;
                        tooltipPlaceIndex = placeIndex;
                        const rect = seat.getBoundingClientRect();
                        tooltip.style.left = (rect.left + rect.width / 2 - 75) + 'px';
                        tooltip.style.top = (rect.top - 10) + 'px';
                        tooltip.style.display = 'flex';
                        tooltip.querySelector('.nom').textContent = `👤 ${nom}`;
                    } else {
                        tooltip.style.display = 'none';
                    }
                } else {
                    tooltip.style.display = 'none';
                }
            } else if (currentUser.role === 'passager') {
                if (status === 'available') {
                    try {
                        const allRides = await fetchRides();
                        const course = allRides.find(r => r.id === courseId);
                        if (!course) return;
                        const reservations = course.reservations || [];
                        const dejaReserve = reservations.some(r => r.email === currentUser.email);
                        if (dejaReserve) {
                            showToast('❌ Vous avez déjà réservé une place dans ce trajet', true);
                            return;
                        }
                        reservations.push({ email: currentUser.email, nom: currentUser.nom, placeIndex });
                        await updateRide(courseId, { reservations });
                        showToast(`✅ Place réservée pour ${currentUser.nom}`);
                        await renderCourses(currentUser);
                    } catch (error) {
                        showToast('❌ Erreur lors de la réservation', true);
                        console.error('Reservation error:', error);
                    }
                } else if (status === 'reserved') {
                    const reservedEmail = seat.dataset.reservedEmail;
                    if (reservedEmail === currentUser.email) {
                        try {
                            const allRides = await fetchRides();
                            const course = allRides.find(r => r.id === courseId);
                            if (!course) return;
                            const reservations = course.reservations || [];
                            const idx = reservations.findIndex(r => r.placeIndex === placeIndex && r.email === currentUser
                            .email);
                            if (idx !== -1) {
                                reservations.splice(idx, 1);
                                await updateRide(courseId, { reservations });
                                showToast('🗑️ Réservation annulée');
                                await renderCourses(currentUser);
                            }
                        } catch (error) {
                            showToast('❌ Erreur lors de l\'annulation', true);
                            console.error('Cancel reservation error:', error);
                        }
                    } else {
                        showToast('ℹ️ Cette place est réservée par un autre passager', false);
                    }
                }
            }
        }

        // ========================================================================
        // SUPPRIMER RÉSERVATION (CHAUFFEUR)
        // ========================================================================
        async function handleSupprimerResa() {
            if (!tooltipCourseId || tooltipPlaceIndex === null) return;
            try {
                const allRides = await fetchRides();
                const course = allRides.find(r => r.id === tooltipCourseId);
                if (!course) return;
                const reservations = course.reservations || [];
                const idx = reservations.findIndex(r => r.placeIndex === tooltipPlaceIndex);
                if (idx !== -1) {
                    reservations.splice(idx, 1);
                    await updateRide(tooltipCourseId, { reservations });
                    showToast('🗑️ Place libérée');
                    tooltip.style.display = 'none';
                    if (currentUser) await renderCourses(currentUser);
                } else {
                    tooltip.style.display = 'none';
                }
            } catch (error) {
                showToast('❌ Erreur lors de la suppression', true);
                console.error('Suppression error:', error);
            }
        }

        // ========================================================================
        // ADMIN : TOGGLES LISTES
        // ========================================================================
        function toggleAdminList(listElement) {
            if (listElement.style.display === 'block') {
                listElement.style.display = 'none';
            } else {
                adminChauffeursList.style.display = 'none';
                adminPassagersList.style.display = 'none';
                listElement.style.display = 'block';
            }
        }

        btnAdminChauffeurs.addEventListener('click', () => {
            renderAdminLists();
            toggleAdminList(adminChauffeursList);
        });
        btnAdminPassagers.addEventListener('click', () => {
            renderAdminLists();
            toggleAdminList(adminPassagersList);
        });

        // ========================================================================
        // AUTH
        // ========================================================================
        async function handleInscription() {
            const role = roleSelect.value;
            const nom = nomInput.value.trim();
            const tel = telInput.value.trim();
            const email = emailInput.value.trim();
            const motDePasse = pwdInput.value.trim();

            if (!nom || !tel || !email || !motDePasse) {
                showToast('⚠️ Tous les champs sont obligatoires', true);
                return;
            }
            if (!/^\d[\d\s]{7,}$/.test(tel.replace(/\s/g, ''))) {
                showToast('📞 Téléphone invalide (8+ chiffres)', true);
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showToast('✉️ Email invalide', true);
                return;
            }
            if (motDePasse.length < 4) {
                showToast('🔒 Mot de passe : au moins 4 caractères', true);
                return;
            }
            if (!isOnline()) {
                showToast('📡 Pas de connexion Internet.', true);
                return;
            }

            const btn = btnValiderInscription;
            const originalText = btn.textContent;
            showLoader(btn);

            try {
                await auth.createUserWithEmailAndPassword(email, motDePasse);
                await db.collection('users').doc(email).set({
                    nom,
                    telephone: tel,
                    email,
                    role,
                    dateInscription: new Date().toISOString()
                }, { merge: true });
                showToast(`✅ Compte ${role} « ${nom} » créé !`);
                closeModalInscription();
            } catch (error) {
                let msg = error.message;
                if (error.code === 'auth/email-already-in-use') msg = 'Cet email est déjà utilisé.';
                else if (error.code === 'auth/weak-password') msg = 'Mot de passe trop faible (min 6 caractères).';
                else if (error.message.includes('offline') || error.message.includes('network')) {
                    msg = 'Problème de connexion réseau.';
                }
                showToast(`❌ ${msg}`, true);
                console.error('Inscription error:', error);
            }
            hideLoader(btn, originalText);
        }

        async function handleLogin() {
            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();
            if (!email || !password) {
                showToast('⚠️ Remplissez tous les champs', true);
                return;
            }

            if (email === 'admin@gmail.com' && password === 'admin123') {
                const adminUser = { nom: 'Admin', email: 'admin@gmail.com', role: 'admin' };
                currentUser = adminUser;
                showToast('✅ Bienvenue Admin');
                closeModalConnexion();
                showMainInterface(adminUser);
                return;
            }

            if (!isOnline()) {
                showToast('📡 Pas de connexion Internet.', true);
                return;
            }

            const btn = btnValiderConnexion;
            const originalText = btn.textContent;
            showLoader(btn);

            try {
                await auth.signInWithEmailAndPassword(email, password);
                closeModalConnexion();
                showToast('✅ Connexion réussie');
            } catch (error) {
                let msg = error.message;
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    msg = 'Email ou mot de passe incorrect.';
                } else if (error.message.includes('offline')) {
                    msg = 'Problème de connexion réseau.';
                }
                showToast(`❌ ${msg}`, true);
                console.error('Login error:', error);
            }
            hideLoader(btn, originalText);
        }

        async function logout() {
            try {
                await auth.signOut();
                currentUser = null;
                showHomeScreen();
                showToast('🔓 Déconnecté');
                tooltip.style.display = 'none';
            } catch (error) {
                showToast('❌ Erreur déconnexion', true);
                console.error('Logout error:', error);
            }
        }

        async function handleCreateCourse() {
            const depart = courseDepart.value.trim();
            const arrivee = courseArrivee.value.trim();
            const heure = courseHeure.value;
            const prix = parseInt(coursePrix.value);
            const places = parseInt(coursePlaces.value);

            if (!depart || !arrivee || !heure || isNaN(prix) || isNaN(places)) {
                showToast('⚠️ Tous les champs sont requis', true);
                return;
            }
            if (prix < 1) { showToast('💰 Prix invalide', true); return; }
            if (places < 1 || places > 7) { showToast('👥 Places entre 1 et 7', true); return; }

            if (!currentUser) {
                showToast('❌ Vous devez être connecté', true);
                return;
            }
            if (!isOnline()) {
                showToast('📡 Pas de connexion Internet.', true);
                return;
            }

            const btn = btnValiderCourse;
            const originalText = btn.textContent;
            showLoader(btn);

            try {
                const nouvelleCourse = {
                    chauffeurEmail: currentUser.email,
                    depart,
                    arrivee,
                    heure,
                    prix,
                    places,
                    reservations: [],
                    dateCreation: new Date().toISOString()
                };
                await createRide(nouvelleCourse);
                showToast(`✅ Course créée : ${depart} → ${arrivee}`);
                closeModalCreateCourse();
                await renderCourses(currentUser);
            } catch (error) {
                let msg = error.message;
                if (error.message.includes('offline')) msg = 'Problème de connexion réseau.';
                showToast(`❌ ${msg}`, true);
                console.error('Create course error:', error);
            }
            hideLoader(btn, originalText);
        }

        // ========================================================================
        // SESSION
        // ========================================================================
        auth.onAuthStateChanged(async (firebaseUser) => {
            if (firebaseUser) {
                try {
                    const doc = await db.collection('users').doc(firebaseUser.email).get();
                    if (doc.exists) {
                        const userData = doc.data();
                        currentUser = { ...userData, email: firebaseUser.email };
                        showMainInterface(currentUser);
                    } else {
                        await auth.signOut();
                        currentUser = null;
                        showHomeScreen();
                        showToast('❌ Utilisateur introuvable dans la base', true);
                    }
                } catch (error) {
                    console.error('Erreur récupération utilisateur:', error);
                    currentUser = {
                        email: firebaseUser.email,
                        nom: firebaseUser.displayName || 'Utilisateur',
                        role: 'passager'
                    };
                    showMainInterface(currentUser);
                    showToast('📡 Profil minimal (hors ligne)', false);
                }
            } else {
                currentUser = null;
                showHomeScreen();
            }
        });

        // ========================================================================
        // ÉVÉNEMENTS
        // ========================================================================
        btnInscription.addEventListener('click', () => {
            modalInscription.classList.add('active');
            nomInput.value = '';
            telInput.value = '';
            emailInput.value = '';
            pwdInput.value = '';
            roleSelect.value = 'passager';
            nomInput.focus();
        });
        btnAnnulerInscription.addEventListener('click', closeModalInscription);
        modalInscription.addEventListener('click', (e) => {
            if (e.target === modalInscription) closeModalInscription();
        });
        [nomInput, telInput, emailInput, pwdInput, roleSelect].forEach(el => {
            el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleInscription(); });
        });
        btnValiderInscription.addEventListener('click', handleInscription);

        btnConnexion.addEventListener('click', () => {
            modalConnexion.classList.add('active');
            loginEmail.value = '';
            loginPassword.value = '';
            loginEmail.focus();
        });
        btnAnnulerConnexion.addEventListener('click', closeModalConnexion);
        modalConnexion.addEventListener('click', (e) => {
            if (e.target === modalConnexion) closeModalConnexion();
        });
        [loginEmail, loginPassword].forEach(el => {
            el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
        });
        btnValiderConnexion.addEventListener('click', handleLogin);

        btnLogout.addEventListener('click', logout);

        btnCreateCourse.addEventListener('click', () => {
            modalCreateCourse.classList.add('active');
            courseDepart.value = '';
            courseArrivee.value = '';
            courseHeure.value = '';
            coursePrix.value = '';
            coursePlaces.value = '';
            courseDepart.focus();
        });
        btnAnnulerCourse.addEventListener('click', closeModalCreateCourse);
        modalCreateCourse.addEventListener('click', (e) => {
            if (e.target === modalCreateCourse) closeModalCreateCourse();
        });
        [courseDepart, courseArrivee, courseHeure, coursePrix, coursePlaces].forEach(el => {
            el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleCreateCourse(); });
        });
        btnValiderCourse.addEventListener('click', handleCreateCourse);

        btnAdminEditSave.addEventListener('click', saveAdminEdit);
        btnAdminEditCancel.addEventListener('click', closeModalAdminEdit);
        modalAdminEdit.addEventListener('click', (e) => {
            if (e.target === modalAdminEdit) closeModalAdminEdit();
        });

        coursesList.addEventListener('click', handleSeatClick);
        btnSupprimerResa.addEventListener('click', handleSupprimerResa);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (modalInscription.classList.contains('active')) closeModalInscription();
                else if (modalConnexion.classList.contains('active')) closeModalConnexion();
                else if (modalCreateCourse.classList.contains('active')) closeModalCreateCourse();
                else if (modalAdminEdit.classList.contains('active')) closeModalAdminEdit();
            }
        });

        seedDemoUsers().catch(err => console.warn('Demo users:', err));
        setInterval(updateStats, 30000);
        console.log('✅ Machi prêt – améliorations UI');
    </script>
</body>
</html>
